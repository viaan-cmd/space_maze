<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPACE MAZE | DEFINITIVE</title>
    <style>
        body { background: #000; color: #0f4; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #overlay { position: absolute; z-index: 100; background: radial-gradient(circle, #0a0a1a 0%, #000 100%); width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .box { background: rgba(0,255,65,0.1); border: 1px solid #0f4; padding: 15px; border-radius: 10px; margin: 10px; width: 320px; }
        input { background: #000; color: #0f4; border: 1px solid #0f4; padding: 10px; margin: 10px; text-align: center; width: 80%; }
        button { background: transparent; border: 2px solid #0f4; color: #0f4; padding: 10px 20px; cursor: pointer; margin: 5px; font-family: inherit; }
        button.active { background: #0f4; color: #000; }
        #mobile-ui { position: absolute; inset: 0; display: none; pointer-events: none; z-index: 50; }
        .side { position: absolute; bottom: 40px; width: 180px; height: 220px; pointer-events: auto; display: flex; align-items: center; justify-content: center; }
        .left { left: 20px; } .right { right: 20px; }
        #joy-base { width: 120px; height: 120px; background: rgba(0,255,65,0.1); border: 2px solid #0f4; border-radius: 50%; position: relative; }
        #joy-stick { width: 50px; height: 50px; background: #0f4; border-radius: 50%; position: absolute; top: 35px; left: 35px; }
        #dpad { display: grid; grid-template-columns: repeat(3, 55px); gap: 5px; }
        .m-btn { width: 55px; height: 55px; border: 2px solid #0f4; background: rgba(0,255,65,0.1); display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .act-btn { width: 75px; height: 75px; border-radius: 50%; border: 3px solid #f05; color: #f05; display: flex; align-items: center; justify-content: center; font-weight: bold; background: rgba(255,0,85,0.1); margin-bottom: 10px; }
        #game-container { position: relative; width: 100%; height: 100%; display: none; }
        canvas { background: #000; display: block; margin: auto; border: 1px solid #0f4; max-width: 98vw; max-height: 70vh; }
        #stats { position: absolute; top: 10px; width: 100%; text-align: center; color: #0f4; font-size: 1.2rem; }
        #pause-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        #pause-btn { position: absolute; top: 10px; right: 10px; z-index: 210; padding: 5px 15px; background: #000; color: #0f4; border: 1px solid #0f4; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 id="title" style="font-size: 3rem; text-shadow: 0 0 15px #0f4;">SPACE MAZE</h1>
    <div id="lore" style="display:none; max-width: 500px; margin-bottom: 20px;">
        <p>THE ORIGIN: The neural net has been compromised by the DIDDY VIRUS.</p>
        <p>Reach SECTOR 21 to find the Mansion Gate. SECTOR 202 is the point of no return.</p>
    </div>
    <div id="setup">
        <input type="text" id="userIn" placeholder="PILOT NAME">
        <div class="box">
            <button id="pcB" class="active" onclick="setDev('pc')">PC</button>
            <button id="moB" onclick="setDev('mobile')">MOBILE</button>
        </div>
        <div id="mo-opts" style="display:none;">
            <button id="jB" onclick="setCtrl('joy')">JOYSTICK</button>
            <button id="dB" class="active" onclick="setCtrl('dpad')">DPAD</button>
        </div>
    </div>
    <button id="mainBtn" style="background:#0f4; color:#000; font-weight:bold;" onclick="goLore()">INITIALIZE</button>
    <div id="lb" style="margin-top:20px; color:#0cf;"></div>
</div>

<div id="pause-overlay">
    <h1>PAUSED</h1>
    <button onclick="togglePause()">RESUME</button>
</div>

<div id="game-container">
    <button id="pause-btn" onclick="togglePause()">||</button>
    <div id="stats">SEC: <span id="s-val">1</span> | <span id="u-val"></span> | O2: <span id="o-val">100</span>%</div>
    <canvas id="c" width="800" height="600"></canvas>
    <div id="mobile-ui">
        <div id="move-side" class="side right">
            <div id="joy-base" style="display:none;"><div id="joy-stick"></div></div>
            <div id="dpad">
                <div style="grid-column:2" class="m-btn" ontouchstart="keys.w=1" ontouchend="keys.w=0">↑</div>
                <div class="m-btn" ontouchstart="keys.a=1" ontouchend="keys.a=0">←</div>
                <div class="m-btn" ontouchstart="keys.s=1" ontouchend="keys.s=0">↓</div>
                <div class="m-btn" ontouchstart="keys.d=1" ontouchend="keys.d=0">→</div>
            </div>
        </div>
        <div class="side left">
            <div class="act-btn" style="border-color:#0cf; color:#0cf;" ontouchstart="warp()">WARP</div>
            <div class="act-btn" ontouchstart="shoot()">FIRE</div>
        </div>
    </div>
</div>

<script>
const cvs = document.getElementById('c'), ctx = cvs.getContext('2d');
const ROWS = 13, COLS = 19, CW = 800/COLS, CH = 600/ROWS;
let sec = 1, p, ens = [], bult = [], maze = [], items = [], boss = null;
let keys = {}, combo = "", dev = 'pc', ctrl = 'dpad', user = "", paused = false;

function setDev(d) { dev = d; document.getElementById('pcB').className = d==='pc'?'active':''; document.getElementById('moB').className = d==='mobile'?'active':''; document.getElementById('mo-opts').style.display = d==='mobile'?'block':'none'; }
function setCtrl(t) { ctrl = t; document.getElementById('jB').className = t==='joy'?'active':''; document.getElementById('dB').className = t==='dpad'?'active':''; }
function togglePause() { paused = !paused; document.getElementById('pause-overlay').style.display = paused ? 'flex' : 'none'; }

function goLore() {
    user = document.getElementById('userIn').value || "PILOT";
    document.getElementById('setup').style.display = 'none';
    document.getElementById('lore').style.display = 'block';
    document.getElementById('mainBtn').innerText = "LAUNCH MISSION";
    document.getElementById('mainBtn').onclick = launch;
}

function launch() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('game-container').style.display = 'block';
    if(dev === 'mobile') {
        document.getElementById('mobile-ui').style.display = 'block';
        document.getElementById('joy-base').style.display = ctrl==='joy'?'block':'none';
        document.getElementById('dpad').style.display = ctrl==='dpad'?'grid':'none';
        if(ctrl === 'joy') initJoy();
    }
    initLevel(1); loop();
}

function initLevel(n) {
    sec = n; ens = []; bult = []; items = []; boss = null;
    maze = Array.from({length: ROWS}, () => Array(COLS).fill(1));
    if(n == 202) {
        maze = maze.map(r => r.fill(0)); // OPEN SPACE
        boss = {x:400, y:300, hp:150, size:60, color: '#f00'};
    } else if(n == "?") {
        maze = maze.map(r => r.fill(0)); // MANSIO OPEN SPACE
        setTimeout(() => { alert("DIDDY: 'I've been watching you, " + user + "'"); initLevel(22); }, 5000);
    } else {
        genMaze(0,0);
        for(let i=0; i<Math.min(3+n, 12); i++) ens.push({x:Math.random()*700+50, y:Math.random()*500+50, dx:(Math.random()-0.5)*5, dy:(Math.random()-0.5)*5});
        ['shd','ox','spd','rpd'].forEach(t => items.push({x:Math.random()*700+50, y:Math.random()*500+50, type:t}));
    }
    if(!p) p = {x:CW/2, y:CH/2, r:10, ox:100, spd:4, shd:false, rpd:false};
    p.x = CW/2; p.y = CH/2;
    document.getElementById('s-val').innerText = n;
    document.getElementById('u-val').innerText = user;
}

function genMaze(r, c) {
    maze[r][c] = 0;
    let ds = [[0,2],[0,-2],[2,0],[-2,0]].sort(()=>Math.random()-0.5);
    ds.forEach(([dr, dc]) => {
        let nr=r+dr, nc=c+dc;
        if(nr>=0 && nr<ROWS && nc>=0 && nc<COLS && maze[nr][nc]==1) {
            maze[r+dr/2][c+dc/2]=0; genMaze(nr, nc);
        }
    });
}

function isWall(x, y) { let r=Math.floor(y/CH), c=Math.floor(x/CW); return (r<0||r>=ROWS||c<0||c>=COLS||maze[r][c]==1); }
function shoot() { bult.push({x:p.x, y:p.y, dx:12}); if(p.rpd) { bult.push({x:p.x, y:p.y-10, dx:12}); bult.push({x:p.x, y:p.y+10, dx:12}); } }
function warp() { let nx=p.x+100; if(!isWall(nx, p.y)) p.x=nx; p.ox-=5; }

window.onkeydown = e => {
    let k = e.key.toLowerCase(); keys[k] = 1;
    if(e.code === 'Space') { combo += "S"; shoot(); }
    if(e.code.includes('Shift')) { combo += "H"; warp(); }
    if(combo.endsWith("SHHS")) { combo=""; initLevel(202); }
};
window.onkeyup = e => keys[e.key.toLowerCase()] = 0;

function initJoy() {
    const b=document.getElementById('joy-base'), s=document.getElementById('joy-stick');
    b.ontouchmove = (e) => {
        e.preventDefault(); const r=b.getBoundingClientRect();
        const dx=e.touches[0].clientX-(r.left+60), dy=e.touches[0].clientY-(r.top+60);
        const d=Math.min(40, Math.hypot(dx,dy)), a=Math.atan2(dy,dx);
        s.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
        keys.a=dx<-20; keys.d=dx>20; keys.w=dy<-20; keys.s=dy>20;
    };
    b.ontouchend = () => { s.style.transform=''; keys.a=keys.d=keys.w=keys.s=0; };
}

function loop() {
    if(!paused) {
        let vx=0, vy=0;
        if(keys.w || keys.arrowup) vy=-p.spd; if(keys.s || keys.arrowdown) vy=p.spd;
        if(keys.a || keys.arrowleft) vx=-p.spd; if(keys.d || keys.arrowright) vx=p.spd;
        if(!isWall(p.x+vx, p.y)) p.x+=vx; if(!isWall(p.x, p.y+vy)) p.y+=vy;

        ens.forEach(e => {
            e.x+=e.dx; e.y+=e.dy; if(isWall(e.x, e.y)) { e.dx*=-1; e.dy*=-1; }
            if(Math.hypot(p.x-e.x, p.y-e.y)<20) { if(p.shd){p.shd=false; e.x=-100;} else location.reload(); }
        });

        if(boss) {
            let dx=p.x-boss.x, dy=p.y-boss.y, d=Math.hypot(dx,dy);
            boss.x+=(dx/d)*3; boss.y+=(dy/d)*3;
            if(d<boss.size) location.reload();
            if(boss.hp<=0) { alert("DIDDY NEUTRALIZED"); location.reload(); }
        }

        bult = bult.filter(b => {
            b.x+=b.dx;
            ens.forEach((e,i) => { if(Math.hypot(b.x-e.x, b.y-e.y)<20) ens.splice(i,1); });
            if(boss && Math.hypot(b.x-boss.x, b.y-boss.y)<boss.size) { boss.hp-=2; return false; }
            return !isWall(b.x, b.y);
        });

        items.forEach((it, i) => {
            if(Math.hypot(p.x-it.x, p.y-it.y)<25) {
                if(it.type=='shd') p.shd=true; if(it.type=='ox') p.ox=100;
                if(it.type=='spd') p.spd=7; if(it.type=='rpd') p.rpd=true;
                items.splice(i,1);
            }
        });

        if(p.x>750 && p.y>550) { if(sec==21) initLevel("?"); else initLevel(sec+1); }
        p.ox-=0.05; document.getElementById('o-val').innerText = Math.floor(p.ox);
        if(p.ox<=0) location.reload();
    }
    draw(); requestAnimationFrame(loop);
}

function draw() {
    ctx.clearRect(0,0,800,600); ctx.fillStyle="#0f4";
    for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) if(maze[r][c]) ctx.fillRect(c*CW, r*CH, CW-1, CH-1);
    ctx.fillStyle="#0cf"; ctx.fillRect(760, 560, 30, 30);
    items.forEach(it => {
        ctx.fillStyle = it.type=='shd'?'#ff0':it.type=='ox'?'#0cf':it.type=='spd'?'#00f':'#f0f';
        ctx.fillRect(it.x-10, it.y-10, 20, 20);
    });
    ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(p.x, p.y, 10, 0, 7); ctx.fill();
    if(p.shd) { ctx.strokeStyle="#ff0"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(p.x,p.y,15,0,7); ctx.stroke(); }
    ctx.fillStyle="#f00"; ens.forEach(e=>{ctx.beginPath(); ctx.arc(e.x,e.y,12,0,7); ctx.fill();});
    if(boss) { 
        ctx.beginPath(); ctx.arc(boss.x, boss.y, boss.size, 0, 7); ctx.fill(); 
        ctx.fillStyle="#fff"; ctx.fillText("BOSS HP: "+boss.hp, boss.x-25, boss.y-70);
    }
    ctx.fillStyle="#fff"; bult.forEach(b=>ctx.fillRect(b.x, b.y, 10, 4));
}
</script>
</body>
</html>
