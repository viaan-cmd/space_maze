<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPACE MAZE | COMPLEX ENGINE</title>
    <style>
        :root { --neon: #00ff41; --warp: #0cf; --danger: #f05; --gold: #ffd700; --bg: #050505; }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #000; color: var(--neon); font-family: 'Segoe UI', 'Courier New', monospace; 
            margin: 0; overflow: hidden; height: 100vh; width: 100vw;
            display: flex; align-items: center; justify-content: center;
        }
        
        /* UI LAYERS */
        .layer { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        #ui-layer { z-index: 100; background: radial-gradient(circle, #111 0%, #000 100%); }
        #game-layer { z-index: 50; display: none; }
        #admin-layer { z-index: 150; display: none; background: rgba(0, 10, 0, 0.9); backdrop-filter: blur(10px); }
        #cutscene-layer { z-index: 120; display: none; background: #000; }

        /* HUD */
        #hud { 
            position: absolute; top: 0; width: 100%; padding: 20px; 
            display: flex; justify-content: space-between; font-size: 1.2rem;
            text-shadow: 0 0 10px var(--neon); pointer-events: none;
        }
        .boss-container {
            position: absolute; bottom: 100px; width: 400px; height: 30px;
            border: 2px solid var(--gold); background: rgba(0,0,0,0.8); display: none;
        }
        #boss-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #f00, #ff0); transition: width 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        #boss-name { position: absolute; width: 100%; text-align: center; font-weight: bold; color: white; line-height: 30px; text-transform: uppercase; }

        /* SETTINGS & BUTTONS */
        .menu-card { background: rgba(0, 255, 65, 0.05); border: 1px solid var(--neon); padding: 20px; border-radius: 15px; width: 340px; margin: 10px; }
        .btn { 
            background: transparent; border: 2px solid var(--neon); color: var(--neon); 
            padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 8px;
            font-family: inherit; transition: 0.3s;
        }
        .btn:active, .btn.active { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }
        .start-btn { font-size: 1.5rem; width: 100%; margin-top: 20px; }

        /* CONTROLS */
        #mobile-controls { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; }
        .zone { position: absolute; bottom: 20px; width: 220px; height: 220px; pointer-events: auto; }
        .left-zone { left: 20px; } .right-zone { right: 20px; }
        
        #joystick-base { width: 120px; height: 120px; border: 2px solid var(--neon); border-radius: 50%; position: relative; margin: 50px auto; }
        #joystick-knob { width: 50px; height: 50px; background: var(--neon); border-radius: 50%; position: absolute; top: 35px; left: 35px; }
        
        #dpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; width: 180px; height: 180px; }
        .d-cell { border: 2px solid var(--neon); display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 10px; }
        
        .act-btn { width: 80px; height: 80px; border-radius: 50%; border: 4px solid var(--warp); color: var(--warp); display: flex; align-items: center; justify-content: center; font-weight: bold; margin: 10px; }
    </style>
</head>
<body>

    <div id="ui-layer" class="layer">
        <h1 style="font-size: 3rem; margin: 0; text-shadow: 0 0 20px var(--neon);">CORE_ENGINE.EXE</h1>
        <div class="menu-card">
            <h3>INPUT CONFIG</h3>
            <button class="btn active" id="pc-mode" onclick="setDevice('pc')">PC MASTER</button>
            <button class="btn" id="mo-mode" onclick="setDevice('mobile')">MOBILE UNIT</button>
            <div id="mo-settings" style="display:none; margin-top: 15px;">
                <button class="btn active" id="r-hand" onclick="setHandedness('right')">R-DRIVE</button>
                <button class="btn" id="l-hand" onclick="setHandedness('left')">L-DRIVE</button>
                <hr style="border:0.5px solid #222">
                <button class="btn active" id="j-type" onclick="setControl('joy')">JOYSTICK</button>
                <button class="btn" id="d-type" onclick="setControl('dpad')">DIAMOND</button>
            </div>
        </div>
        <button class="btn start-btn" onclick="Engine.boot()">INITIALIZE MISSION</button>
    </div>

    <div id="admin-layer" class="layer">
        <div class="menu-card">
            <h2 style="color:var(--danger)">ADMIN OVERRIDE</h2>
            <p>JUMP TO SECTOR:</p>
            <input type="number" id="warp-input" min="1" max="202" value="1" style="width:100%; padding:10px; background:#000; border:1px solid var(--neon); color:var(--neon);">
            <button class="btn start-btn" onclick="Engine.adminJump()">EXECUTE WARP</button>
            <button class="btn" onclick="Engine.adminRefill()" style="width:100%">REFILL OXYGEN</button>
            <button class="btn" onclick="Engine.adminGhost()" style="width:100%">GHOST_MODE: <span id="ghost-status">OFF</span></button>
            <button class="btn" onclick="Engine.toggleAdmin(false)" style="width:100%; border-color:var(--danger); color:var(--danger)">CLOSE CONSOLE</button>
        </div>
    </div>

    <div id="cutscene-layer" class="layer">
        <div id="cutscene-content" style="max-width: 80%; font-size: 1.5rem; line-height: 1.6;"></div>
        <button class="btn start-btn" onclick="Engine.closeCutscene()">PROCEED</button>
    </div>

    <div id="game-layer" class="layer">
        <div id="hud">
            <div>SECTOR: <span id="sector-val">1</span></div>
            <div>OXYGEN: <span id="ox-val">100</span>%</div>
        </div>
        <canvas id="main-canvas"></canvas>
        <div class="boss-container" id="boss-hud">
            <div id="boss-name">DIDDY</div>
            <div id="boss-fill"></div>
        </div>
        
        <div id="mobile-controls">
            <div id="move-zone" class="zone right-zone">
                <div id="joystick-base"><div id="joystick-knob"></div></div>
                <div id="dpad" style="display:none;">
                    <div class="d-cell" style="grid-column:2" ontouchstart="Engine.keys['ArrowUp']=true" ontouchend="Engine.keys['ArrowUp']=false">UP</div>
                    <div class="d-cell" style="grid-column:1; grid-row:2" ontouchstart="Engine.keys['ArrowLeft']=true" ontouchend="Engine.keys['ArrowLeft']=false">LFT</div>
                    <div class="d-cell" style="grid-column:3; grid-row:2" ontouchstart="Engine.keys['ArrowRight']=true" ontouchend="Engine.keys['ArrowRight']=false">RGT</div>
                    <div class="d-cell" style="grid-column:2; grid-row:3" ontouchstart="Engine.keys['ArrowDown']=true" ontouchend="Engine.keys['ArrowDown']=false">DWN</div>
                </div>
            </div>
            <div id="action-zone" class="zone left-zone" style="display:flex; flex-direction:column; align-items:center; justify-content:center;">
                <div class="act-btn" ontouchstart="Engine.player.warp()">WARP</div>
                <div class="act-btn" style="border-color:var(--danger); color:var(--danger)" ontouchstart="Engine.player.shoot()">FIRE</div>
            </div>
        </div>
    </div>

    <script>
        /**
         * ENGINE CONSTANTS & CONFIG
         */
        const CONFIG = {
            WIDTH: 800, HEIGHT: 600,
            ROWS: 13, COLS: 19,
            COLORS: { player: '#FFF', wall: '#00FF41', diddy: '#A020F0', enemy: '#FF0055', pwr: '#FFD700', bullet: '#FFFF00' },
            CHEAT: "SWWS"
        };

        /**
         * CORE GAME ENGINE
         */
        const Engine = {
            canvas: document.getElementById('main-canvas'),
            ctx: null,
            sector: 1,
            active: false,
            maze: [],
            entities: [],
            particles: [],
            keys: {},
            inputBuffer: "",
            settings: { device: 'pc', hand: 'right', ctrl: 'joy' },

            boot() {
                this.ctx = this.canvas.getContext('2d');
                this.canvas.width = CONFIG.WIDTH;
                this.canvas.height = CONFIG.HEIGHT;
                document.getElementById('ui-layer').style.display = 'none';
                document.getElementById('game-layer').style.display = 'flex';
                this.initSector(1);
                this.loop();
            },

            initSector(n) {
                this.sector = n;
                this.active = true;
                this.maze = this.generateMaze(CONFIG.ROWS, CONFIG.COLS);
                this.player = new Player(40, 40);
                this.entities = [];
                this.particles = [];
                
                document.getElementById('sector-val').innerText = n;
                document.getElementById('boss-hud').style.display = (n === 202) ? 'block' : 'none';

                if(n === 21) {
                    this.triggerCutscene("ENTERING DIDDY MANSION.<br>COLLECT THE INVITATIONS TO GAIN ACCESS.");
                    this.entities.push(new Item(160, 160), new Item(640, 160), new Item(400, 480));
                }

                if(n === 202) {
                    this.entities.push(new DiddyBoss(400, 300));
                } else if (n !== 21) {
                    for(let i=0; i<Math.min(2 + n/8, 12); i++) this.entities.push(new Enemy());
                }
            },

            generateMaze(r, c) {
                let m = Array.from({length:r}, () => Array(c).fill(1));
                let stack = [[0,0]]; m[0][0] = 0;
                while(stack.length > 0) {
                    let [cr, cc] = stack[stack.length-1];
                    let neighbors = [[cr-2,cc],[cr+2,cc],[cr,cc-2],[cr,cc+2]].filter(([nr,nc]) => 
                        nr>=0 && nr<r && nc>=0 && nc<c && m[nr][nc] === 1);
                    if(neighbors.length) {
                        let [nr, nc] = neighbors[Math.floor(Math.random()*neighbors.length)];
                        m[nr][nc] = 0; m[(cr+nr)/2][(cc+nc)/2] = 0; stack.push([nr,nc]);
                    } else stack.pop();
                }
                return m;
            },

            loop() {
                if(this.active) {
                    this.update();
                    this.render();
                }
                requestAnimationFrame(() => this.loop());
            },

            update() {
                this.player.update();
                this.entities.forEach((e, i) => {
                    e.update();
                    if(e.dead) this.entities.splice(i, 1);
                });
                this.particles = this.particles.filter(p => p.life > 0);
                this.particles.forEach(p => p.update());

                // Sector Clear Check
                if(this.player.x > CONFIG.WIDTH - 50 && this.player.y > CONFIG.HEIGHT - 50) {
                    if(this.sector === 21 && this.player.invites < 3) return;
                    if(this.sector === 202 && this.entities.length > 0) return;
                    this.initSector(this.sector + 1);
                }
                
                document.getElementById('ox-val').innerText = Math.floor(this.player.ox);
            },

            render() {
                this.ctx.clearRect(0,0,CONFIG.WIDTH, CONFIG.HEIGHT);
                
                // Draw Maze
                this.ctx.fillStyle = (this.sector === 21) ? "#1a001a" : CONFIG.COLORS.wall;
                let w = CONFIG.WIDTH/CONFIG.COLS, h = CONFIG.HEIGHT/CONFIG.ROWS;
                for(let r=0; r<CONFIG.ROWS; r++) {
                    for(let c=0; c<CONFIG.COLS; c++) {
                        if(this.maze[r][c]) this.ctx.fillRect(c*w, r*h, w-0.5, h-0.5);
                    }
                }

                // Exit
                this.ctx.fillStyle = (this.sector === 21 && this.player.invites < 3) ? "#222" : varColor('--warp');
                this.ctx.fillRect(CONFIG.WIDTH - w, CONFIG.HEIGHT - h, w, h);

                this.entities.forEach(e => e.draw(this.ctx));
                this.player.draw(this.ctx);
                this.particles.forEach(p => p.draw(this.ctx));
            },

            triggerCutscene(txt) {
                this.active = false;
                document.getElementById('cutscene-layer').style.display = 'flex';
                document.getElementById('cutscene-content').innerHTML = txt;
            },

            closeCutscene() {
                document.getElementById('cutscene-layer').style.display = 'none';
                this.active = true;
            },

            toggleAdmin(show) {
                this.active = !show;
                document.getElementById('admin-layer').style.display = show ? 'flex' : 'none';
            },

            adminJump() {
                let val = parseInt(document.getElementById('warp-input').value);
                this.initSector(val);
                this.toggleAdmin(false);
            },

            adminRefill() { this.player.ox = 100; this.toggleAdmin(false); },
            adminGhost() { 
                this.player.ghost = !this.player.ghost; 
                document.getElementById('ghost-status').innerText = this.player.ghost ? "ON" : "OFF";
            }
        };

        /**
         * ENTITY CLASSES
         */
        class Player {
            constructor(x, y) {
                this.x = x; this.y = y; this.ox = 100; this.invites = 0;
                this.radius = 10; this.ghost = false; this.spd = 6;
                this.trail = [];
            }
            update() {
                let mx = 0, my = 0;
                if(Engine.keys['ArrowUp'] || Engine.keys['KeyW']) my = -1;
                if(Engine.keys['ArrowDown'] || Engine.keys['KeyS']) my = 1;
                if(Engine.keys['ArrowLeft'] || Engine.keys['KeyA']) mx = -1;
                if(Engine.keys['ArrowRight'] || Engine.keys['KeyD']) mx = 1;

                if(joyActive) { mx = joyV.x; my = joyV.y; }

                if(mx || my) {
                    let nx = this.x + mx * this.spd, ny = this.y + my * this.spd;
                    if(this.ghost || !this.checkWall(nx, ny)) {
                        this.x = nx; this.y = ny;
                    }
                }
                this.ox -= 0.015;
                if(this.ox <= 0) Engine.initSector(Engine.sector);
            }
            checkWall(x, y) {
                let c = Math.floor(x / (CONFIG.WIDTH/CONFIG.COLS));
                let r = Math.floor(y / (CONFIG.HEIGHT/CONFIG.ROWS));
                return r<0 || r>=CONFIG.ROWS || c<0 || c>=CONFIG.COLS || Engine.maze[r][c] === 1;
            }
            draw(ctx) {
                ctx.fillStyle = CONFIG.COLORS.player;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fill();
            }
            shoot() {
                recordInput("S");
                if(this.ox < 5) return;
                Engine.entities.push(new Bullet(this.x, this.y));
                this.ox -= 5;
            }
            warp() {
                recordInput("W");
                if(this.ox < 15) return;
                this.x += (Engine.keys['ArrowRight']?1:Engine.keys['ArrowLeft']?-1:0) * 150;
                this.y += (Engine.keys['ArrowDown']?1:Engine.keys['ArrowUp']?-1:0) * 150;
                this.ox -= 15;
            }
        }

        class DiddyBoss {
            constructor(x, y) {
                this.x = x; this.y = y; this.hp = 10; this.max = 10;
                this.size = 50; this.vx = 3; this.vy = 3;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if(this.x < 50 || this.x > 750) this.vx *= -1;
                if(this.y < 50 || this.y > 550) this.vy *= -1;
                
                let hpPercent = (this.hp / this.max) * 100;
                document.getElementById('boss-fill').style.width = hpPercent + "%";
                if(Math.hypot(Engine.player.x - this.x, Engine.player.y - this.y) < this.size) Engine.initSector(Engine.sector);
            }
            draw(ctx) {
                ctx.fillStyle = CONFIG.COLORS.diddy;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            }
        }

        class Enemy {
            constructor() {
                let rx, ry;
                do { rx = Math.random()*800; ry = Math.random()*600; } while(Engine.player.checkWall(rx, ry));
                this.x = rx; this.y = ry; this.vx = (Math.random()-0.5)*4; this.vy = (Math.random()-0.5)*4;
                this.size = 12; this.hp = 1;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if(Engine.player.checkWall(this.x, this.y)) { this.vx *= -1; this.vy *= -1; }
                if(Math.hypot(Engine.player.x-this.x, Engine.player.y-this.y) < 20) Engine.initSector(Engine.sector);
            }
            draw(ctx) {
                ctx.fillStyle = CONFIG.COLORS.enemy;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            }
        }

        class Item {
            constructor(x,y) { this.x=x; this.y=y; }
            update() {
                if(Math.hypot(Engine.player.x-this.x, Engine.player.y-this.y) < 30) {
                    Engine.player.invites++;
                    this.dead = true;
                    if(Engine.player.invites === 3) {
                        Engine.entities.push(new GhostDiddy());
                    }
                }
            }
            draw(ctx) {
                ctx.fillStyle = CONFIG.COLORS.pwr;
                ctx.beginPath(); ctx.arc(this.x, this.y, 15, 0, Math.PI*2); ctx.fill();
            }
        }

        class GhostDiddy {
            constructor() { this.x=400; this.y=300; this.alpha=1; }
            update() { this.alpha -= 0.005; if(this.alpha <= 0) this.dead=true; }
            draw(ctx) {
                ctx.fillStyle = `rgba(160, 32, 240, ${this.alpha})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, 40, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "white"; ctx.fillText("SEE YOU AT 202", 350, 250);
            }
        }

        class Bullet {
            constructor(x,y) {
                this.x=x; this.y=y; 
                let en = Engine.entities[0] || {x:800, y:600};
                let ang = Math.atan2(en.y-y, en.x-x);
                this.vx = Math.cos(ang)*15; this.vy = Math.sin(ang)*15;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if(Engine.player.checkWall(this.x, this.y)) this.dead=true;
                Engine.entities.forEach(en => {
                    if(en instanceof Enemy || en instanceof DiddyBoss) {
                        if(Math.hypot(this.x-en.x, this.y-en.y) < 30) {
                            en.hp--; if(en.hp<=0) en.dead=true;
                            this.dead=true;
                        }
                    }
                });
            }
            draw(ctx) {
                ctx.fillStyle = CONFIG.COLORS.bullet;
                ctx.beginPath(); ctx.arc(this.x, this.y, 5, 0, Math.PI*2); ctx.fill();
            }
        }

        /**
         * INPUT UTILITIES
         */
        function recordInput(key) {
            Engine.inputBuffer += key;
            if(Engine.inputBuffer.length > 4) Engine.inputBuffer = Engine.inputBuffer.slice(1);
            if(Engine.inputBuffer === CONFIG.CHEAT) Engine.toggleAdmin(true);
        }

        window.addEventListener('keydown', e => Engine.keys[e.code] = true);
        window.addEventListener('keyup', e => Engine.keys[e.code] = false);

        // Mobile Settings State
        function setDevice(d) {
            Engine.settings.device = d;
            document.getElementById('mo-settings').style.display = d === 'mobile' ? 'block' : 'none';
        }
        function setHandedness(h) {
            Engine.settings.hand = h;
            let mZone = document.getElementById('move-zone');
            let aZone = document.getElementById('action-zone');
            mZone.className = `zone ${h}-zone`;
            aZone.className = `zone ${h==='right'?'left':'right'}-zone`;
        }
        function setControl(c) {
            Engine.settings.ctrl = c;
            document.getElementById('joystick-base').style.display = c === 'joy' ? 'block' : 'none';
            document.getElementById('dpad').style.display = c === 'dpad' ? 'grid' : 'none';
        }

        // Joystick Logic
        let joyActive = false, joyV = {x:0, y:0};
        const jBase = document.getElementById('joystick-base'), jKnob = document.getElementById('joystick-knob');
        jBase.addEventListener('touchstart', () => joyActive = true);
        window.addEventListener('touchmove', (e) => {
            if(!joyActive) return;
            let t = e.touches[0];
            let rect = jBase.getBoundingClientRect();
            let dx = t.clientX - (rect.left + 60), dy = t.clientY - (rect.top + 60);
            let dist = Math.min(Math.hypot(dx, dy), 50);
            let ang = Math.atan2(dy, dx);
            joyV = { x: Math.cos(ang) * (dist/50), y: Math.sin(ang) * (dist/50) };
            jKnob.style.transform = `translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist}px)`;
        });
        window.addEventListener('touchend', () => { 
            joyActive = false; joyV = {x:0,y:0}; 
            jKnob.style.transform = 'translate(0,0)';
        });

        function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }

    </script>
</body>
</html>
