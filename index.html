<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPACE MAZE: GOD EDITION</title>
    <style>
        body { background: #000; color: #0f4; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; touch-action: none; }
        canvas { background: #000; display: block; margin: auto; border: 2px solid #0f4; max-width: 100vw; max-height: 80vh; }
        #ui-layer { position: absolute; inset: 0; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; }
        .menu-box { pointer-events: auto; background: rgba(0,20,0,0.95); border: 3px solid #0f4; padding: 20px; text-align: center; box-shadow: 0 0 20px #0f4; border-radius: 8px; width: 90%; max-width: 400px; }
        input { background: #000; color: #0f4; border: 1px solid #0f4; padding: 10px; margin: 10px 0; text-align: center; width: 80%; }
        button { background: transparent; color: #0f4; border: 2px solid #0f4; padding: 10px 20px; font-weight: bold; cursor: pointer; margin: 5px; }
        button:hover, button.active { background: #0f4; color: #000; }
        #stats { position: absolute; top: 10px; width: 100%; text-align: center; font-size: 1.2rem; z-index: 10; text-shadow: 2px 2px 0 #000; }
        #boss-bar-container { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); width: 300px; height: 20px; border: 2px solid #800080; display: none; background: #000; z-index: 10; }
        #boss-bar { width: 100%; height: 100%; background: #800080; }
        #admin-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; background: rgba(0,0,0,0.98); border: 3px solid #f0f; padding: 20px; z-index: 1000; display: none; text-align: center; pointer-events: auto; }
        #mobile-controls { position: absolute; bottom: 15px; width: 100%; display: none; justify-content: space-between; padding: 0 20px; box-sizing: border-box; pointer-events: none; }
        .m-btn { width: 55px; height: 55px; border: 2px solid #0f4; background: rgba(0,255,0,0.1); color: #0f4; display: flex; align-items: center; justify-content: center; pointer-events: auto; border-radius: 8px; }
        .act-btn { width: 70px; height: 70px; border-radius: 50%; border: 3px solid; display: flex; align-items: center; justify-content: center; font-weight: bold; pointer-events: auto; }
    </style>
</head>
<body>

<div id="stats">SEC: <span id="s-val">1</span> | <span id="u-val">PILOT</span> | O2: <span id="o-val">100</span>%</div>
<div id="boss-bar-container"><div id="boss-bar"></div></div>

<div id="ui-layer">
    <div id="main-menu" class="menu-box">
        <h1>SPACE MAZE</h1>
        <input type="text" id="userIn" placeholder="ENTER PILOT NAME">
        <div>
            <button id="btn-pc" class="active" onclick="selectMode('pc')">PC</button>
            <button id="btn-mob" onclick="selectMode('mobile')">MOBILE</button>
        </div>
        <button style="width:100%; background:#0f4; color:#000;" onclick="startGame()">START</button>
    </div>
    <div id="death-screen" class="menu-box" style="display:none; border-color: red;">
        <h1 style="color:red;">MISSION FAILED</h1>
        <button onclick="retrySector()">RETRY SECTOR</button>
    </div>
    <div id="pause-screen" class="menu-box" style="display:none; border-color: yellow;">
        <h1>PAUSED</h1>
        <button onclick="togglePause()">RESUME</button>
    </div>
</div>

<div id="admin-panel">
    <h3 style="color:#f0f;">ADMIN CONSOLE</h3>
    <input type="number" id="skipIn" placeholder="Sector #">
    <button onclick="warpLevel()">WARP</button>
    <button onclick="p.shd=true">SHIELD</button>
    <button onclick="p.rpd=true">RAPID FIRE</button>
    <button onclick="infO2=!infO2">INF O2</button>
    <button style="background:red; color:white;" onclick="closeAdmin()">CLOSE</button>
</div>

<div id="mobile-controls">
    <div style="display:grid; grid-template-columns: repeat(3, 55px); gap: 5px;">
        <div class="m-btn" style="grid-column:2" ontouchstart="keys.w=1" ontouchend="keys.w=0">↑</div>
        <div class="m-btn" ontouchstart="keys.a=1" ontouchend="keys.a=0">←</div>
        <div class="m-btn" ontouchstart="keys.s=1" ontouchend="keys.s=0">↓</div>
        <div class="m-btn" ontouchstart="keys.d=1" ontouchend="keys.d=0">→</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:10px;">
        <div class="act-btn" style="border-color:#0cf; color:#0cf;" ontouchstart="warp()">WARP</div>
        <div class="act-btn" style="border-color:#f00; color:#f00;" ontouchstart="shoot()">FIRE</div>
    </div>
</div>

<canvas id="c" width="800" height="600"></canvas>

<script>
const cvs = document.getElementById('c'), ctx = cvs.getContext('2d');
const ROWS = 13, COLS = 19, CW = 800/COLS, CH = 600/ROWS;
let sec = 1, p, ens = [], bult = [], maze = [], items = [], boss = null;
let keys = {}, combo = "", user = "PILOT", paused = false, infO2 = false, alive = false, shootTimer = 0;
let playMode = 'pc';

function selectMode(m) { playMode = m; document.getElementById('btn-pc').className = m==='pc'?'active':''; document.getElementById('btn-mob').className = m==='mobile'?'active':''; }
function startGame() { user = document.getElementById('userIn').value.toUpperCase() || "PILOT"; document.getElementById('u-val').innerText = user; document.getElementById('main-menu').style.display = 'none'; if(playMode === 'mobile') document.getElementById('mobile-controls').style.display = 'flex'; alive = true; loadSector(1); requestAnimationFrame(loop); }
function getOpenSpot() { let r, c; do { r = Math.floor(Math.random()*ROWS); c = Math.floor(Math.random()*COLS); } while (maze[r][c]===1 || (r<2 && c<2)); return {x:(c*CW)+(CW/2), y:(r*CH)+(CH/2)}; }

function loadSector(n) {
    sec = n; ens = []; bult = []; items = []; boss = null;
    document.getElementById('s-val').innerText = n;
    document.getElementById('boss-bar-container').style.display = n==202?'block':'none';
    maze = Array.from({length: ROWS}, () => Array(COLS).fill(1));
    p = {x: CW/2, y: CH/2, ox: 100, spd: 4, shd: false, rpd: false};

    if(n === 21) { 
        maze = maze.map(r => r.fill(0)); p.x=400; p.y=500; paused=true; 
        setTimeout(() => { alert(`DIDDY: "I've been watching you, ${user}..."`); paused=false; }, 500); 
        items.push({x:400, y:100, type:'portal'});
    } else if(n === 202) { 
        maze = maze.map(r => r.fill(0)); p.x=400; p.y=500; boss={x:400, y:150, hp:500, maxHp:500, size:40};
    } else {
        genMaze(0,0); maze[ROWS-1][COLS-1]=0; 
        for(let i=0; i<Math.min(3+n, 12); i++) { let s=getOpenSpot(); ens.push({x:s.x, y:s.y, dx:3, dy:3}); }
        ['shd','ox','spd','rpd'].forEach(t => { if(Math.random()>0.3){ let s=getOpenSpot(); items.push({x:s.x, y:s.y, type:t}); }});
    }
}

function genMaze(r, c) { maze[r][c]=0; let ds=[[0,2],[0,-2],[2,0],[-2,0]].sort(()=>Math.random()-0.5); ds.forEach(([dr, dc]) => { let nr=r+dr, nc=c+dc; if(nr>=0 && nr<ROWS && nc>=0 && nc<COLS && maze[nr][nc]===1){ maze[r+dr/2][c+dc/2]=0; genMaze(nr, nc); } }); }
function isWall(x, y) { let r=Math.floor(y/CH), c=Math.floor(x/CW); return (r<0||r>=ROWS||c<0||c>=COLS||maze[r][c]===1); }
function shoot() { bult.push({x:p.x, y:p.y, dx:12}); if(p.rpd){ bult.push({x:p.x, y:p.y-15, dx:12}); bult.push({x:p.x, y:p.y+15, dx:12}); } }
function warp() { let nx=p.x+100; if(!isWall(nx, p.y)){ p.x=nx; if(!infO2) p.ox-=5; } }
function die() { alive=false; document.getElementById('death-screen').style.display='block'; }
function retrySector() { document.getElementById('death-screen').style.display='none'; alive=true; loadSector(sec); }
function togglePause() { if(!alive) return; paused=!paused; document.getElementById('pause-screen').style.display=paused?'block':'none'; }
function openAdmin() { paused=true; document.getElementById('admin-panel').style.display='block'; }
function closeAdmin() { paused=false; document.getElementById('admin-panel').style.display='none'; }
function warpLevel() { let lv=document.getElementById('skipIn').value; if(lv){ loadSector(parseInt(lv)); closeAdmin(); } }

window.onkeydown = e => { keys[e.key.toLowerCase()] = 1; if(e.code==='Space') shoot(); if(e.code.includes('Shift')) warp(); if(e.key==='p') togglePause(); if(e.code==='Space') combo+="S"; else if(e.code.includes('Shift')) combo+="H"; else combo=""; if(combo.endsWith("SHHS")){ combo=""; openAdmin(); } };
window.onkeyup = e => keys[e.key.toLowerCase()] = 0;

function loop() {
    if(alive && !paused) {
        if((keys.w||keys.arrowup) && !isWall(p.x, p.y-p.spd)) p.y-=p.spd;
        if((keys.s||keys.arrowdown) && !isWall(p.x, p.y+p.spd)) p.y+=p.spd;
        if((keys.a||keys.arrowleft) && !isWall(p.x-p.spd, p.y)) p.x-=p.spd;
        if((keys.d||keys.arrowright) && !isWall(p.x+p.spd, p.y)) p.x+=p.spd;

        if(p.rpd) { shootTimer++; if(shootTimer > 10) { shoot(); shootTimer = 0; } }

        ens.forEach(e => {
            if(!isWall(e.x+e.dx, e.y)) e.x+=e.dx; else e.dx*=-1;
            if(!isWall(e.x, e.y+e.dy)) e.y+=e.dy; else e.dy*=-1;
            if(Math.hypot(p.x-e.x, p.y-e.y)<20){ if(p.shd){ p.shd=false; e.x=-1000; } else die(); }
        });

        if(boss) {
            let dx=p.x-boss.x, dy=p.y-boss.y, dist=Math.hypot(dx,dy);
            boss.x+=(dx/dist)*2; boss.y+=(dy/dist)*2;
            if(dist<boss.size+10) die();
            document.getElementById('boss-bar').style.width=(boss.hp/boss.maxHp)*100+"%";
            if(boss.hp<=0){ alert("DEFEATED"); location.reload(); }
        }

        bult = bult.filter(b => {
            b.x+=b.dx; let hit=false;
            ens.forEach((e,i)=>{ if(Math.hypot(b.x-e.x, b.y-e.y)<20){ ens.splice(i,1); hit=true; }});
            if(boss && Math.hypot(b.x-boss.x, b.y-boss.y)<boss.size){ boss.hp-=5; hit=true; }
            return !hit && !isWall(b.x, b.y) && b.x<800;
        });

        items = items.filter(it => {
            if(Math.hypot(p.x-it.x, p.y-it.y)<25){
                if(it.type==='shd') p.shd=true; if(it.type==='ox') p.ox=100;
                if(it.type==='spd') p.spd=7; if(it.type==='rpd') p.rpd=true;
                if(it.type==='portal') loadSector(sec+1);
                return false;
            } return true;
        });

        if(sec!==21 && sec!==202 && p.x>760 && p.y>560) loadSector(sec+1);
        if(!infO2) p.ox-=0.04; document.getElementById('o-val').innerText=Math.max(0, Math.floor(p.ox));
        if(p.ox<=0) die();
    }
    ctx.clearRect(0,0,800,600); ctx.fillStyle="#0f4";
    for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) if(maze[r][c]) ctx.fillRect(c*CW, r*CH, CW-1, CH-1);
    if(sec<21) { ctx.fillStyle="#0cf"; ctx.fillRect(760, 560, 30, 30); }
    items.forEach(it => { ctx.fillStyle=it.type==='shd'?'#ff0':it.type==='ox'?'#0cf':it.type==='spd'?'#00f':it.type==='rpd'?'#f0f':'#fff'; ctx.fillRect(it.x-10, it.y-10, 20, 20); });
    ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(p.x, p.y, 10, 0, 7); ctx.fill();
    if(p.shd){ ctx.strokeStyle="#ff0"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(p.x, p.y, 16, 0, 7); ctx.stroke(); }
    ctx.fillStyle="#f00"; ens.forEach(e=>{ ctx.beginPath(); ctx.arc(e.x, e.y, 12, 0, 7); ctx.fill(); });
    if(boss){ ctx.fillStyle="#800080"; ctx.beginPath(); ctx.arc(boss.x, boss.y, boss.size, 0, 7); ctx.fill(); ctx.fillStyle="#f00"; ctx.beginPath(); ctx.arc(boss.x-15, boss.y-10, 8, 0, 7); ctx.fill(); ctx.beginPath(); ctx.arc(boss.x+15, boss.y-10, 8, 0, 7); ctx.fill(); }
    ctx.fillStyle="#0cf"; bult.forEach(b=>ctx.fillRect(b.x, b.y, 12, 4));
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
