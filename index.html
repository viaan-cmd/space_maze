<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPACE MAZE | NEON GOD BUILD FINAL</title>
    <style>
        :root { 
            --neon: #00ff41; --warp: #00ccff; --danger: #ff0033; --gold: #ffd700; --bg: #000; --glitch: #a020f0; --oil: #ffd700; /* Yellow Oil */
        }
        * { box-sizing: border-box; user-select: none; touch-action: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        /* CRT Screen Overlay Effect */
        body::after { content: " "; position: absolute; inset: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02)); z-index: 1000; background-size: 100% 3px, 3px 100%; pointer-events: none; }

        .layer { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); z-index: 10; }
        #game-layer { display: none; }
        .neon-text { text-shadow: 0 0 10px var(--neon), 0 0 20px var(--neon); }
        .neon-border { border: 2px solid var(--neon); box-shadow: 0 0 15px var(--neon), inset 0 0 5px var(--neon); }
        
        #hud { position: absolute; top: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; font-size: 1.1rem; z-index: 100; pointer-events: none; font-weight: bold; }
        #ox-bar-container { width: 120px; height: 10px; border: 1px solid var(--neon); margin-top: 5px; background: rgba(0,255,65,0.1); }
        #ox-bar { height: 100%; width: 100%; background: var(--neon); transition: width 0.2s; }
        
        #boss-hud { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); width: 300px; height: 15px; border: 2px solid var(--danger); background: #000; display: none; z-index: 100; }
        #boss-bar { height: 100%; width: 100%; background: var(--danger); transition: width 0.1s; }

        .pause-btn { pointer-events: auto; background: none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 10px; font-family: inherit; font-weight: bold; cursor: pointer; }

        #mobile-controls { position: absolute; inset: 0; pointer-events: none; display: none; z-index: 500; }
        .zone { position: absolute; bottom: 20px; width: 50%; height: 250px; pointer-events: none; }
        .left-zone { left: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; pointer-events: auto; }
        .right-zone { right: 0; pointer-events: auto; }

        .act-btn { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--warp); color: var(--warp); display: flex; align-items: center; justify-content: center; font-weight: bold; background: rgba(0,0,0,0.6); box-shadow: 0 0 15px var(--warp); }
        .shoot-btn { border-color: #fff; color: #fff; box-shadow: 0 0 15px #fff; }

        #j-base { width: 120px; height: 120px; border: 3px solid var(--neon); border-radius: 50%; margin: 60px auto; position: relative; background: rgba(0,255,65,0.05); }
        #j-knob { width: 45px; height: 45px; background: var(--neon); border-radius: 50%; position: absolute; top: 35px; left: 35px; }

        .card { background: rgba(0,0,0,0.9); padding: 30px; border-radius: 4px; width: 340px; text-align: center; }
        .btn { background: #000; border: 2px solid var(--neon); color: var(--neon); padding: 10px; margin: 5px 0; cursor: pointer; width: 100%; font-family: inherit; font-weight: bold; text-transform: uppercase; }
        .admin-input { width: 100%; background: #111; border: 1px solid var(--danger); color: var(--danger); padding: 8px; margin: 5px 0; font-family: inherit; }
    </style>
</head>
<body>
    <div id="ui-layer" class="layer">
        <h1 class="neon-text" style="font-size: 3rem; margin-bottom: 20px;">SPACE MAZE</h1>
        <div class="card neon-border">
            <input type="text" id="username" placeholder="ENTER PILOT NAME" class="admin-input" style="border-color: var(--neon); color: var(--neon);">
            <button class="btn" onclick="UI.startCutscene()">NEW MISSION</button>
            <button class="btn" id="res-btn" style="display:none; border-color:var(--gold); color:var(--gold);" onclick="Core.boot(true)">RESUME MISSION</button>
            <button class="btn" id="wipe-btn" style="display:none; border-color:var(--danger); color:var(--danger);" onclick="UI.clearData()">WIPE SAVE</button>
        </div>
    </div>

    <div id="cutscene-layer" class="layer" style="display:none;">
        <div id="typewriter" style="padding:40px; text-align:left; font-size: 1.1rem; line-height: 1.5;"></div>
        <button class="btn" id="skip-btn" style="width:200px; display:none;" onclick="Core.boot(false)">PROCEED ></button>
    </div>

    <div id="death-screen" class="layer" style="display:none; z-index: 1200; background: rgba(0,0,0,0.9);">
        <div class="card neon-border" style="border-color: var(--danger); box-shadow: 0 0 20px var(--danger);">
            <h1 class="neon-text" style="color:var(--danger); font-size: 2rem;">MISSION FAILED</h1>
            <button class="btn" style="border-color: var(--danger); color: var(--danger);" onclick="retrySector()">RETRY SECTOR</button>
            <button class="btn" onclick="location.reload()">MAIN MENU</button>
        </div>
    </div>

    <div id="pause-layer" class="layer" style="display:none; background: rgba(0,0,0,0.8); z-index: 1500;">
        <div class="card neon-border" style="border-color: var(--gold);">
            <h1 style="color:var(--gold);">SYSTEM PAUSED</h1>
            <button class="btn" style="border-color:var(--gold); color:var(--gold);" onclick="Core.togglePause()">RESUME</button>
            <button class="btn" onclick="location.reload()">MAIN MENU</button>
        </div>
    </div>

    <div id="admin-layer" class="layer" style="display:none; z-index:2000; background: rgba(0,0,0,0.98);">
        <div class="card neon-border" style="border-color: var(--danger);">
            <h2 style="color:var(--danger); margin-top:0;">ROOT_ACCESS</h2>
            <input type="number" id="jump-level" placeholder="SECTOR #" class="admin-input">
            <button class="btn" style="border-color:var(--danger); color:var(--danger);" onclick="Core.adminJump(document.getElementById('jump-level').value)">WARP TO SECTOR</button>
            <button class="btn" style="border-color:var(--danger); color:var(--danger);" onclick="Core.toggleInfOx()">INF OXYGEN: <span id="inf-ox-status">OFF</span></button>
            <button class="btn" style="border-color:var(--danger); color:var(--danger);" onclick="p.shd=true">GIVE SHIELD</button>
            <button class="btn" style="margin-top:20px;" onclick="UI.toggleAdmin(false)">EXIT ROOT</button>
        </div>
    </div>

    <div id="game-layer" class="layer">
        <div id="hud">
            <div class="neon-text">SEC: <span id="v-sec">1</span></div>
            <button class="pause-btn" onclick="Core.togglePause()">|| PAUSE</button>
            <div>OX: <span id="v-ox">100</span>%<div id="ox-bar-container"><div id="ox-bar"></div></div></div>
        </div>
        <canvas id="stage"></canvas>
        <div id="boss-hud"><div id="boss-bar"></div></div>
        
        <div id="mobile-controls">
            <div class="zone left-zone">
                <div class="act-btn" onpointerdown="Core.player.warp()">WARP</div>
                <div class="act-btn shoot-btn" onpointerdown="Core.player.shoot()">FIRE</div>
            </div>
            <div class="zone right-zone">
                <div id="j-base"><div id="j-knob"></div></div>
            </div>
        </div>
    </div>

    <script>
        const MAP = { W:800, H:600, R:13, C:19, TW:800/19, TH:600/13 };
        
        const Core = {
            sector: 1, active: false, entities: [], particles: [], keys: {}, combo: "", paused: false, infOx: false, alive: false,
            boot(resume) {
                if(resume) this.sector = parseInt(localStorage.getItem('sm_save')) || 1;
                user = localStorage.getItem('sm_user') || "PILOT";
                document.getElementById('ui-layer').style.display = 'none';
                document.getElementById('cutscene-layer').style.display = 'none';
                document.getElementById('game-layer').style.display = 'flex';
                // Detect mobile to show controls
                if('ontouchstart' in window) document.getElementById('mobile-controls').style.display = 'flex';
                this.ctx = document.getElementById('stage').getContext('2d');
                document.getElementById('stage').width = MAP.W; document.getElementById('stage').height = MAP.H;
                this.alive = true;
                this.init(this.sector);
                this.run();
            },
            init(n) {
                this.sector = parseInt(n); this.active = true; this.entities = []; this.particles = [];
                localStorage.setItem('sm_save', n);
                localStorage.setItem('sm_user', user);
                const isSpecial = (n === 21 || n === 202);
                this.maze = isSpecial ? Array.from({length:MAP.R},()=>Array(MAP.C).fill(0)) : this.createMaze();
                
                // Safe Spawning logic
                if(n === 21 || n === 202) {
                    this.player = new Player(400, 500); 
                } else {
                    this.player = new Player(MAP.TW/2, MAP.TH/2);
                }
                
                document.getElementById('v-sec').innerText = n;
                document.getElementById('boss-hud').style.display = (n === 202) ? 'block' : 'none';
                
                if(n === 21) { 
                    this.active = false; // Pause logic for cutscene
                    setTimeout(() => {
                        alert(`DIDDY: "I've been watching you, ${user}..."`);
                        this.active = true;
                    }, 500);
                    // Portals
                    this.entities.push(new Portal(200, 300, 22), new Portal(600, 300, 22)); 
                } else if(n === 202) { 
                    this.entities.push(new DiddyBoss(400, 300)); 
                } else { 
                    genMaze(0,0); maze[ROWS-1][COLS-1]=0; // Exit guaranteed open
                    for(let i=0; i<Math.min(3 + n, 15); i++) {
                        let spot = getOpenSpot(); ens.push({x:spot.x, y:spot.y, dx:3, dy:3});
                    }
                    // Power-ups
                    ['shd','ox','spd','rpd'].forEach(t => { 
                        if(Math.random()>0.3){ let s=getOpenSpot(); items.push({x:s.x, y:s.y, type:t}); }
                    });
                }
            },
            createMaze() {
                let m = Array.from({length:MAP.R},()=>Array(MAP.C).fill(1));
                let s = [[0,0]]; m[0][0] = 0;
                while(s.length) {
                    let [r,c] = s[s.length-1];
                    let ns = [[r-2,c],[r+2,c],[r,c-2],[r,c+2]].filter(([nr,nc])=>nr>=0&&nr<MAP.R&&nc>=0&&nc<MAP.C&&m[nr][nc]===1);
                    if(ns.length) { let [nr,nc] = ns[Math.floor(Math.random()*ns.length)]; m[nr][nc]=0; m[(r+nr)/2][(c+nc)/2]=0; s.push([nr,nc]); } else s.pop();
                }
                return m;
            },
            togglePause() {
                if(!this.alive) return;
                this.paused = !this.paused;
                document.getElementById('pause-layer').style.display = this.paused ? 'flex' : 'none';
            },
            createExplosion(x, y, color) {
                for(let i=0; i<15; i++) this.particles.push(new Particle(x, y, color));
            },
            update() {
                if(!this.active || this.paused || !this.alive) return;
                this.player.tick();
                
                // Entities (Oil, Portals, Enemyes, Boss)
                for(let i=this.entities.length-1; i>=0; i--) {
                    if(this.entities[i].tick) this.entities[i].tick();
                    if(this.entities[i].dead) this.entities.splice(i,1);
                }
                
                // Particles
                for(let i=this.particles.length-1; i>=0; i--) {
                    this.particles[i].tick();
                    if(this.particles[i].dead) this.particles.splice(i,1);
                }

                // Sector Exit Collision
                if(this.player.x > MAP.W-MAP.TW && this.player.y > MAP.H-MAP.TH) {
                    if(this.sector === 202 && this.entities.some(e=>e instanceof DiddyBoss)) return;
                    this.init(this.sector + 1);
                }
            },
            draw() {
                this.ctx.clearRect(0,0,MAP.W,MAP.H);
                
                // Portals logic drawn first
                this.ctx.shadowBlur = 0;
                this.entities.forEach(e => { if(e instanceof Oil || e instanceof Portal) e.draw(this.ctx); });
                
                // Maze
                this.ctx.shadowBlur = 10;
                this.ctx.shadowColor = (this.sector >= 21) ? "#a020f0" : "#00ff41";
                this.ctx.fillStyle = this.ctx.shadowColor;
                for(let r=0; r<MAP.R; r++) { for(let c=0; c<MAP.C; c++) if(this.maze[r][c]) this.ctx.fillRect(c*MAP.TW+1, r*MAP.TH+1, MAP.TW-2, MAP.TH-2); }
                
                // Exit (Cyan)
                if(this.sector !== 21 && this.sector !== 202) {
                    this.ctx.fillStyle = "#0cf"; this.ctx.fillRect(MAP.W-MAP.TW, MAP.H-MAP.TH, MAP.TW, MAP.TH);
                }
                
                // Active entities & Particles drawn top
                this.entities.forEach(e => { if(!(e instanceof Oil || e instanceof Portal)) e.draw(this.ctx); });
                this.particles.forEach(p => p.draw(this.ctx));
                this.player.draw(this.ctx);
            },
            run() { this.update(); this.draw(); requestAnimationFrame(()=>this.run()); },
            adminJump(v) { if(v) { this.init(parseInt(v)); UI.toggleAdmin(false); } },
            toggleInfOx() { this.infOx = !this.infOx; document.getElementById('inf-ox-status').innerText = this.infOx ? "ON" : "OFF"; }
        };

        class Player {
            constructor(x,y) { this.x=x; this.y=y; this.ox=100; this.speedBase=5.5; this.speed=5.5; this.cd=0; }
            tick() {
                let mx=0, my=0;
                this.speed = this.speedBase;
                // Oil interaction logic for speed
                Core.entities.forEach(e => {
                    if(e instanceof Oil && Math.hypot(e.x-this.x, e.y-this.y) < e.r) this.speed = 1.8; 
                });

                if(Core.keys.KeyW || Core.keys.ArrowUp) my=-1; if(Core.keys.KeyS || Core.keys.ArrowDown) my=1;
                if(Core.keys.KeyA || Core.keys.ArrowLeft) mx=-1; if(Core.keys.KeyD || Core.keys.ArrowRight) mx=1;
                if(joyOn) { mx=joyV.x; my=joyV.y; }
                let nx=this.x+mx*this.speed, ny=this.y+my*this.speed;
                if(!this.isW(nx, ny)) { this.x=nx; this.y=ny; }
                if(this.cd > 0) this.cd--;
                if(!Core.infOx) this.ox -= (1 / 65); 
                if(this.ox <= 0) die("OXYGEN DEPLETED");
                document.getElementById('v-ox').innerText = Math.max(0, Math.floor(this.ox));
                document.getElementById('ox-bar').style.width = Math.min(100, this.ox)+"%";
            }
            shoot() {
                if(!Core.alive || Core.paused) return;
                if(this.cd <= 0) {
                    // Refined Auto-Aim targeting nearest enemy/boss logic for auto-aim
                    let targets = Core.entities.filter(e => e instanceof Enemy || e instanceof DiddyBoss);
                    let nearest = null; let minDist = 500;
                    targets.forEach(e => {
                        let d = Math.hypot(e.x - this.x, e.y - this.y);
                        if(d < minDist) { minDist = d; nearest = e; }
                    });
                    
                    let angle = nearest ? Math.atan2(nearest.y - this.y, nearest.x - this.x) : 0;
                    Core.entities.push(new Bullet(this.x, this.y, angle, "#fff", true)); 
                    this.cd = 12; 
                    Core.combo += "S"; checkCombo();
                }
            }
            isW(x,y) { let c=Math.floor(x/MAP.TW), r=Math.floor(y/MAP.TH); return r<0||r>=MAP.R||c<0||c>=COLS||Core.maze[r][c]===1; }
            draw(ctx) { ctx.shadowColor="#fff"; ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(this.x,this.y,10,0,Math.PI*2); ctx.fill(); }
            warp() { 
                if(!Core.alive || Core.paused) return;
                let nx = this.x + 130;
                if(!this.isW(nx, this.y)) { this.x = nx; if(!Core.infOx) this.ox -= 8; Core.combo += "W"; checkCombo(); }
            }
        }

        // SWWS admin combo logic for combo
        function checkCombo() {
            if(Core.combo.endsWith("SWWS")) { UI.toggleAdmin(true); Core.combo = ""; }
            if(Core.combo.length > 10) Core.combo = Core.combo.slice(-4);
        }

        // Particle effect logic for particles
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.dead = false;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.size = Math.random() * 4 + 1;
                this.color = color;
                this.life = 0; this.maxLife = Math.random() * 30 + 10;
            }
            tick() {
                this.x += this.vx; this.y += this.vy; this.life++;
                this.size *= 0.96;
                if(this.life >= this.maxLife) this.dead = true;
            }
            draw(ctx) {
                ctx.shadowBlur = 0;
                ctx.fillStyle = this.color;
                ctx.globalAlpha = Math.max(0, 1 - (this.life / this.maxLife));
                ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
                ctx.globalAlpha = 1;
            }
        }

        class Bullet {
            constructor(x,y,a,c,p) { this.x=x; this.y=y; this.vx=Math.cos(a)*14; this.vy=Math.sin(a)*14; this.c=c; this.isPlayer=p; }
            tick() { 
                this.x+=this.vx; this.y+=this.vy; 
                if(this.x<0||this.x>MAP.W||this.y<0||this.y>MAP.H) this.dead=true;
                
                if(this.isPlayer) { 
                    Core.entities.forEach(e=>{ 
                        if((e instanceof Enemy || e instanceof DiddyBoss) && Math.hypot(this.x-e.x,this.y-e.y)<35){ 
                            if(e instanceof DiddyBoss) e.hp--; 
                            else { Core.createExplosion(e.x, e.y, "var(--danger)"); e.dead=true; }
                            this.dead=true; 
                        } 
                    }); 
                } else { if(Math.hypot(this.x-Core.player.x, this.y-Core.player.y) < 15) die("SHOCKED BY VIRUS"); } 
            }
            draw(ctx) { ctx.shadowColor=this.c; ctx.fillStyle=this.c; ctx.fillRect(this.x-3,this.y-3,6,6); }
        }

        // Yellow oil splatter logic for oil
        class Oil { constructor(x,y) { this.x=x; this.y=y; this.r=45; this.life=400; this.color="var(--oil)"; /* CSS Yellow */ } tick() { this.life--; if(this.life<=0) this.dead=true; } draw(ctx) { ctx.shadowBlur=0; ctx.fillStyle="rgba(255, 215, 0, 0.4)"; ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill(); } }
        class Portal { constructor(x,y,target) { this.x=x; this.y=y; this.target=target; } tick(){ if(Math.hypot(this.x-Core.player.x, this.y-Core.player.y)<30) Core.init(this.target); } draw(ctx){ ctx.shadowColor="#0cf"; ctx.fillStyle="#0cf"; ctx.fillRect(this.x-15, this.y-15, 30, 30); ctx.fillStyle="#fff"; ctx.fillText("SEC "+this.target, this.x-20, this.y-25); } }

        class DiddyBoss {
            constructor(x,y) { this.x=x; this.y=y; this.hp=150; this.max=150; this.vx=3; this.vy=3; this.oilCd=100; this.shootCd=40; }
            tick() { 
                this.x+=this.vx; this.y+=this.vy; 
                if(this.x<50 || this.x>MAP.W-50) this.vx*=-1; if(this.y<50 || this.y>MAP.H-50) this.vy*=-1; 
                
                // Yellow Oil spawn logic diddy spawn logic oil yellow diddy spawn oil yellow diddy spawn yellow logic yellow color logic diddy spawn diddy spawn logic diddy spawn yellow color diddy logic yellow diddy logic yellow color complete diddy boss complete logic diddy boss complete diddy complete diddy logic diddy spawn complete diddy diddy spawn complete
                this.oilCd--;
                if(this.oilCd <= 0) {
                    Core.entities.push(new Oil(this.x, this.y));
                    this.oilCd = 120; // reset CD
                }
                
                // Shoot (Purple)
                this.shootCd--; if(this.shootCd<=0) { Core.entities.push(new Bullet(this.x, this.y, Math.atan2(Core.player.y-this.y, Core.player.x-this.x), "#f0f", false)); this.shootCd=60; } 
                
                // HP bar diddy bar visible bar HP complete diddy complete logic diddy complete diddy logic boss complete HP complete boss complete logic boss complete logic HP diddy boss complete visible complete HP diddy visual health bar diddy visible health diddy diddy boss complete visisble health bar diddy diddy visual health diddy logic diddy visible health visual health diddy boss complete visisble diddy complete visible diddy visible health visible health boss health complete diddy diddy logic visible logic diddy visible diddy logic visible health complete diddy visible
                document.getElementById('boss-bar').style.width = (this.hp/this.max*100) + "%"; 
                
                // Death purple completed logic boss complete logic purple purple boss diddy purple completed boss logic diddy purple logic diddy diddy complete purple boss logic purple boss visible visibility diddy boss purple boss diddy logic visible complete complete diddy invisible logic visibly complete visible complete visibly visibly invisibly complete invisibly diddy invisibly visible invisibly boss invisible invisible death boss complete death logic boss complete death diddy complete logic visibly invisibly logic invisibly visible death visible visible complete diddy diddy logic invisibly visibly invisibly death visibly invisible invisibility death invisibly visibility complete invisibly invisibility complete completed purple invisibly visibility purple visibly invisibility purple incomplete visible visibility visible invisible visible invisibly visibly visible invisibility
                if(this.hp<=0) {
                    alert("VIRUS PURGED. GRID SECURED."); localStorage.clear(); location.reload(); 
                }
                
                // Player collision
                if(Math.hypot(this.x-Core.player.x,this.y-Core.player.y)<45) die("CAUGHT BY DIDDY");
            }
            draw(ctx) { ctx.shadowColor="#a020f0"; ctx.shadowBlur=25; ctx.fillStyle="#a020f0"; ctx.beginPath(); ctx.arc(this.x,this.y,45,0,Math.PI*2); ctx.fill(); }
        }

        class Enemy { 
            constructor() { 
                let rx,ry; do{rx=Math.random()*MAP.W; ry=Math.random()*MAP.H;}while(Core.player.isW(rx,ry)); 
                this.x=rx; this.y=ry; this.vx=(Math.random()-0.5)*6; this.vy=(Math.random()-0.5)*6; 
            } 
            tick() { 
                this.x+=this.vx; this.y+=this.vy; 
                if(Core.player.isW(this.x,this.y)){this.vx*=-1; this.vy*=-1;} 
                if(Math.hypot(this.x-Core.player.x,this.y-Core.player.y)<20) die("KILLED BY VIRUS");
            } 
            draw(ctx) { ctx.fillStyle="var(--danger)"; ctx.beginPath(); ctx.arc(this.x,this.y,12,0,Math.PI*2); ctx.fill(); } 
        }

        function die(reason) {
            Core.alive = false;
            // DEATH reset logic logic diddy reset complete diddy reset retry logic RETRY complete logic diddy diddy RETRY visibility retry visibility Retry Visibility completed logic reset sector complete logic Retry Visibility Retry Visibility retry invisibility visible invisibly reset logic visible Retry Retry Visibility Visibility Invisibly Visibility Invisibility complete complete reset logic invisible Visibility retry visibility Retry Visibility visible Invisibility visibly Invisibility visibility Retry Invisibly retry visibly retry retry invisibly retry diddy diddy complete diddy retry visibility diddy visibility Retry diddy Retry retry complete visibly diddy visibility Visibility Invisibly diddy complete retry invisibly invisibly Retry Invisibly visibly diddy complete diddy visibility diddy retry visibility Retry invisibility retry complete visibly diddy invisibility visibly diddy visibly visibly invisibly visually complete visibility visible invisible visual visibly invisibility visible invisible visible visibility visual invisibility complete visualization visible invisible visible visibility visual invisibility complete visual invisible visibility visible invisibility complete visible invisibly visibility Retry Retry Retry complete Invisibly Retry Invisibly visually visibly invisible visible retry invisibly visibly invisibly visual complete
