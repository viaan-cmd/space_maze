<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPACE MAZE | NEON MASTERPIECE</title>
    <style>
        :root { 
            --neon: #00ff41; 
            --warp: #00ccff; 
            --danger: #ff0033; 
            --gold: #ffd700; 
            --bg: #000; 
        }
        * { box-sizing: border-box; user-select: none; touch-action: none; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); 
            color: var(--neon); 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        /* CRT SCANLINE OVERLAY - Lightened for better visibility */
        body::after { 
            content: " "; position: absolute; inset: 0; 
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02)); 
            z-index: 1000; background-size: 100% 3px, 3px 100%; pointer-events: none; 
        }

        .layer { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); z-index: 10; }
        #game-layer { display: none; }

        /* INTENSE NEON EFFECTS */
        .neon-text { text-shadow: 0 0 10px var(--neon), 0 0 20px var(--neon); }
        .neon-border { border: 2px solid var(--neon); box-shadow: 0 0 15px var(--neon), inset 0 0 5px var(--neon); }

        /* CUTSCENE STYLE */
        #cutscene-layer { display: none; background: #000; color: var(--neon); padding: 40px; text-align: left; justify-content: flex-start; overflow: hidden; }
        #typewriter { font-size: 1.2rem; line-height: 1.6; max-width: 600px; text-shadow: 0 0 5px var(--neon); }

        /* HUD & UI */
        #hud { 
            position: absolute; top: 0; width: 100%; padding: 20px; 
            display: flex; justify-content: space-between; font-size: 1.2rem; 
            z-index: 100; pointer-events: none; font-weight: bold;
            filter: drop-shadow(0 0 8px var(--neon));
        }
        #ox-bar-container { width: 150px; height: 12px; border: 2px solid var(--neon); margin-top: 5px; background: rgba(0,255,65,0.1); }
        #ox-bar { height: 100%; width: 100%; background: var(--neon); transition: width 0.2s; box-shadow: 0 0 15px var(--neon); }

        #boss-hud { 
            position: absolute; bottom: 120px; width: 400px; height: 20px; 
            border: 2px solid var(--danger); background: #000; display: none; z-index: 100;
            box-shadow: 0 0 20px var(--danger);
        }
        #boss-bar { height: 100%; width: 100%; background: var(--danger); transition: width 0.1s; }

        .card { background: rgba(0,0,0,0.9); padding: 30px; border-radius: 4px; width: 340px; text-align: center; }
        .btn { 
            background: #000; border: 2px solid var(--neon); color: var(--neon); 
            padding: 15px; margin: 10px 0; cursor: pointer; width: 100%; 
            font-family: inherit; font-weight: bold; text-transform: uppercase;
            box-shadow: 0 0 5px var(--neon); transition: 0.2s;
        }
        .btn:active { background: var(--neon); color: #000; }

        /* MOBILE OVERLAY */
        #mobile-controls { position: absolute; inset: 0; pointer-events: none; display: none; z-index: 500; }
        .zone { position: absolute; bottom: 30px; width: 220px; height: 220px; pointer-events: auto; }
        .right { right: 20px; } .left { left: 20px; }
        #j-base { width: 120px; height: 120px; border: 3px solid var(--neon); border-radius: 50%; margin: 40px auto; position: relative; box-shadow: 0 0 20px var(--neon); background: rgba(0,255,65,0.05); }
        #j-knob { width: 50px; height: 50px; background: var(--neon); border-radius: 50%; position: absolute; top: 32px; left: 32px; box-shadow: 0 0 15px #fff; }
        .act-btn { 
            width: 85px; height: 85px; border-radius: 50%; border: 3px solid var(--warp); 
            color: var(--warp); display: flex; align-items: center; justify-content: center; 
            font-weight: bold; margin: 10px; background: rgba(0,204,255,0.1);
            box-shadow: 0 0 15px var(--warp); text-shadow: 0 0 5px var(--warp);
        }
    </style>
</head>
<body>

    <div id="ui-layer" class="layer">
        <h1 class="neon-text" style="font-size: 3.5rem; letter-spacing: 10px;">SPACE MAZE</h1>
        <div class="card neon-border">
            <button class="btn" onclick="UI.startCutscene()">START MISSION</button>
            <button class="btn" id="res-btn" style="display:none; border-color:var(--gold); color:var(--gold);" onclick="Core.boot(true)">RESUME</button>
        </div>
        <div class="card neon-border" style="margin-top:20px; padding:15px;">
            <button class="btn" id="p-pc" onclick="UI.setDev('pc')">PC (WASD/SPACE)</button>
            <button class="btn" id="p-mo" onclick="UI.setDev('mobile')">MOBILE (JOYSTICK)</button>
        </div>
    </div>

    <div id="cutscene-layer" class="layer">
        <div id="typewriter"></div>
        <button class="btn" id="skip-btn" style="width:200px; margin-top:50px; display:none;" onclick="Core.boot(false)">PROCEED ></button>
    </div>

    <div id="admin-layer" class="layer" style="display:none; z-index:2000; background: rgba(0,0,0,0.95);">
        <div class="card neon-border" style="border-color: var(--danger); box-shadow: 0 0 40px var(--danger);">
            <h2 style="color:var(--danger); text-shadow: 0 0 10px var(--danger);">ROOT_ACCESS</h2>
            <button class="btn" onclick="Core.adminJump(202)">SKIP TO DIDDY (202)</button>
            <button class="btn" onclick="Core.adminJump(21)">SKIP TO MANSION (21)</button>
            <button class="btn" onclick="Core.player.ox=9999; UI.toggleAdmin(false)">INFINITE OXYGEN</button>
            <button class="btn" style="border-color:var(--danger);" onclick="UI.toggleAdmin(false)">CLOSE PANEL</button>
        </div>
    </div>

    <div id="game-layer" class="layer">
        <div id="hud">
            <div class="neon-text">SEC: <span id="v-sec">1</span></div>
            <div>
                OX: <span id="v-ox">100</span>%
                <div id="ox-bar-container"><div id="ox-bar"></div></div>
            </div>
        </div>
        <canvas id="stage"></canvas>
        <div id="boss-hud"><div id="boss-bar"></div></div>
        
        <div id="mobile-controls">
            <div class="zone right"><div id="j-base"><div id="j-knob"></div></div></div>
            <div class="zone left">
                <div class="act-btn" onpointerdown="Core.player.warp()">WARP</div>
                <div class="act-btn" style="border-color:var(--danger); color:var(--danger);" onpointerdown="Core.player.shoot()">FIRE</div>
            </div>
        </div>
    </div>

    <script>
        const MAP = { W:800, H:600, R:13, C:19, TW:800/19, TH:600/13 };
        
        const Core = {
            sector: 1, active: false, entities: [], keys: {}, cheatSeq: "", shake: 0,
            
            boot(resume) {
                document.getElementById('ui-layer').style.display = 'none';
                document.getElementById('cutscene-layer').style.display = 'none';
                document.getElementById('game-layer').style.display = 'flex';
                this.ctx = document.getElementById('stage').getContext('2d');
                document.getElementById('stage').width = MAP.W;
                document.getElementById('stage').height = MAP.H;
                this.init(resume ? (parseInt(localStorage.getItem('sm_save')) || 1) : 1);
                this.run();
            },

            init(n) {
                this.sector = n; this.active = true; this.entities = []; this.state = "PLAY";
                localStorage.setItem('sm_save', n);
                this.maze = this.createMaze();
                this.player = new Player(MAP.TW/2, MAP.TH/2);
                document.getElementById('v-sec').innerText = n;
                
                // Reset Boss HUD
                document.getElementById('boss-hud').style.display = (n===202) ? 'block' : 'none';

                if(n===21) this.entities.push(new Invite(160,160), new Invite(640,160), new Invite(400,480));
                else if(n===202) this.entities.push(new DiddyBoss(400, 300));
                else {
                    let enemyCount = Math.min(3 + Math.floor(n/10), 12);
                    for(let i=0; i<enemyCount; i++) this.entities.push(new Enemy());
                    if(Math.random()<0.45) this.entities.push(new PowerUp());
                }
            },

            createMaze() {
                let m = Array.from({length:MAP.R},()=>Array(MAP.C).fill(1));
                let s = [[0,0]]; m[0][0] = 0;
                while(s.length) {
                    let [r,c] = s[s.length-1];
                    let ns = [[r-2,c],[r+2,c],[r,c-2],[r,c+2]].filter(([nr,nc])=>nr>=0&&nr<MAP.R&&nc>=0&&nc<MAP.C&&m[nr][nc]===1);
                    if(ns.length) { let [nr,nc] = ns[Math.floor(Math.random()*ns.length)]; m[nr][nc]=0; m[(r+nr)/2][(c+nc)/2]=0; s.push([nr,nc]); } else s.pop();
                }
                return m;
            },

            update() {
                if(this.state !== "PLAY") return;
                if(this.shake > 0) this.shake--;
                this.player.tick();
                for(let i=this.entities.length-1; i>=0; i--) {
                    this.entities[i].tick();
                    if(this.entities[i].dead) this.entities.splice(i,1);
                }
                // Sector Exit
                if(this.player.x > MAP.W-45 && this.player.y > MAP.H-45) {
                    if(this.sector===21 && this.player.invites < 3) return;
                    if(this.sector===202 && this.entities.some(e => e instanceof DiddyBoss)) return; 
                    this.init(this.sector + 1);
                }
            },

            draw() {
                this.ctx.save();
                if(this.shake > 0) this.ctx.translate(Math.random()*10-5, Math.random()*10-5);
                this.ctx.clearRect(0,0,MAP.W,MAP.H);

                // NEON WALLS - TRUE NEON GREEN
                this.ctx.shadowBlur = 18;
                this.ctx.shadowColor = (this.sector===21) ? "#500050" : "#00ff41";
                this.ctx.fillStyle = this.ctx.shadowColor;
                for(let r=0; r<MAP.R; r++) {
                    for(let c=0; c<MAP.C; c++) {
                        if(this.maze[r][c]) {
                            this.ctx.fillRect(c*MAP.TW+2, r*MAP.TH+2, MAP.TW-4, MAP.TH-4);
                        }
                    }
                }

                // EXIT PORTAL
                this.ctx.shadowBlur = 15;
                this.ctx.shadowColor = (this.sector===21 && this.player.invites < 3) ? "#222" : "#0cf";
                this.ctx.fillStyle = this.ctx.shadowColor;
                this.ctx.fillRect(MAP.W-MAP.TW, MAP.H-MAP.TH, MAP.TW, MAP.TH);
                
                this.ctx.shadowBlur = 0;
                this.entities.forEach(e => e.draw(this.ctx));
                this.player.draw(this.ctx);
                this.ctx.restore();
            },

            run() { if(this.active) { this.update(); this.draw(); } requestAnimationFrame(()=>this.run()); },
            
            registerAction(a) {
                this.cheatSeq += a;
                if(this.cheatSeq.length > 4) this.cheatSeq = this.cheatSeq.slice(-4);
                if(this.cheatSeq === "SWWS") { UI.toggleAdmin(true); this.cheatSeq = ""; }
            },
            
            adminJump(v) { this.init(v); UI.toggleAdmin(false); }
        };

        class Player {
            constructor(x,y) { this.x=x; this.y=y; this.ox=100; this.invites=0; this.speed=5.5; this.triple=0; }
            tick() {
                let mx=0, my=0;
                if(Core.keys.KeyW || Core.keys.ArrowUp) my=-1;
                if(Core.keys.KeyS || Core.keys.ArrowDown) my=1;
                if(Core.keys.KeyA || Core.keys.ArrowLeft) mx=-1;
                if(Core.keys.KeyD || Core.keys.ArrowRight) mx=1;
                if(joyOn) { mx=joyV.x; my=joyV.y; }
                
                let nx=this.x+mx*this.speed, ny=this.y+my*this.speed;
                if(!this.isW(nx, ny)) { this.x=nx; this.y=ny; }
                
                this.ox -= 0.035;
                if(this.ox <= 0) Core.init(Core.sector);
                if(this.triple > 0) this.triple--;
                
                document.getElementById('v-ox').innerText = Math.floor(this.ox);
                document.getElementById('ox-bar').style.width = Math.min(100, this.ox)+"%";
                document.getElementById('ox-bar').style.background = this.ox < 25 ? "var(--danger)" : "var(--neon)";
            }
            isW(x,y) { let c=Math.floor(x/MAP.TW), r=Math.floor(y/MAP.TH); return r<0||r>=MAP.R||c<0||c>=MAP.C||Core.maze[r][c]===1; }
            draw(ctx) {
                ctx.shadowBlur=15; ctx.shadowColor="#fff"; ctx.fillStyle="#fff";
                ctx.beginPath(); ctx.arc(this.x,this.y,10,0,Math.PI*2); ctx.fill();
                ctx.shadowBlur=0;
            }
            shoot() { 
                if(this.ox > 4) {
                    Core.entities.push(new Bullet(this.x, this.y, 0));
                    if(this.triple > 0) { Core.entities.push(new Bullet(this.x,this.y,0.3), new Bullet(this.x,this.y,-0.3)); }
                    this.ox -= 4; Core.shake=5; Core.registerAction('S');
                }
            }
            warp() {
                if(this.ox > 15) {
                    let dx = joyOn ? joyV.x : (Core.keys.KeyD||Core.keys.ArrowRight?1:Core.keys.KeyA||Core.keys.ArrowLeft?-1:0);
                    let dy = joyOn ? joyV.y : (Core.keys.KeyS||Core.keys.ArrowDown?1:Core.keys.KeyW||Core.keys.ArrowUp?-1:0);
                    if(dx===0 && dy===0) dx=1;
                    this.x += dx*130; this.y += dy*130;
                    this.ox-=15; Core.shake=12; Core.registerAction('W');
                }
            }
        }

        class Bullet {
            constructor(x,y,off) {
                this.x=x; this.y=y;
                let t=null, mD=999;
                Core.entities.forEach(e=>{ if(e instanceof Enemy || e instanceof DiddyBoss){ let d=Math.hypot(e.x-x,e.y-y); if(d<mD){mD=d; t=e;} } });
                let a = t ? Math.atan2(t.y-y, t.x-x)+off : off;
                this.vx=Math.cos(a)*15; this.vy=Math.sin(a)*15;
            }
            tick() {
                this.x+=this.vx; this.y+=this.vy;
                if(Core.player.isW(this.x,this.y)) this.dead=true;
                Core.entities.forEach(e=>{ 
                    if((e instanceof Enemy || e instanceof DiddyBoss) && Math.hypot(this.x-e.x,this.y-e.y)<(e.rad || 20)){ 
                        if(e instanceof DiddyBoss) e.hp--; else e.dead=true; 
                        this.dead=true; Core.shake=3;
                    } 
                });
            }
            draw(ctx) { ctx.fillStyle=Core.player.triple>0?"var(--gold)":"#fff"; ctx.fillRect(this.x-3,this.y-3,6,6); }
        }

        class DiddyBoss {
            constructor(x,y) { this.x=x; this.y=y; this.hp=30; this.maxHp=30; this.vx=5; this.vy=5; this.rad=40; }
            tick() {
                this.x+=this.vx; this.y+=this.vy;
                if(Core.player.isW(this.x-this.rad,this.y)||Core.player.isW(this.x+this.rad,this.y)) this.vx*=-1;
                if(Core.player.isW(this.x,this.y-this.rad)||Core.player.isW(this.x,this.y+this.rad)) this.vy*=-1;
                
                document.getElementById('boss-bar').style.width = (this.hp/this.maxHp*100) + "%";
                if(this.hp<=0) this.dead=true;
                if(Math.hypot(this.x-Core.player.x,this.y-Core.player.y)<this.rad) Core.init(Core.sector);
            }
            draw(ctx) { 
                let pulse = Math.sin(Date.now()*0.01)*10;
                ctx.fillStyle="#a020f0"; ctx.shadowBlur=25+pulse; ctx.shadowColor="#ff00ff"; 
                ctx.beginPath(); ctx.arc(this.x,this.y,this.rad,0,Math.PI*2); ctx.fill(); 
                ctx.strokeStyle="#fff"; ctx.lineWidth=3; ctx.stroke();
                ctx.shadowBlur=0; 
            }
        }

        class Enemy {
            constructor() { let rx,ry; do{rx=Math.random()*MAP.W; ry=Math.random()*MAP.H;}while(Core.player.isW(rx,ry)); this.x=rx; this.y=ry; this.vx=(Math.random()-0.5)*6; this.vy=(Math.random()-0.5)*6; }
            tick() { this.x+=this.vx; this.y+=this.vy; if(Core.player.isW(this.x,this.y)){this.vx*=-1; this.vy*=-1;} if(Math.hypot(this.x-Core.player.x,this.y-Core.player.y)<20) Core.init(Core.sector); }
            draw(ctx) { ctx.fillStyle="var(--danger)"; ctx.beginPath(); ctx.arc(this.x,this.y,12,0,Math.PI*2); ctx.fill(); }
        }

        class PowerUp {
            constructor() { let rx,ry; do{rx=Math.random()*MAP.W; ry=Math.random()*MAP.H;}while(Core.player.isW(rx,ry)); this.x=rx; this.y=ry; this.type=Math.random()>0.5?'OX':'TRIPLE'; }
            tick() { if(Math.hypot(this.x-Core.player.x,this.y-Core.player.y)<25){ if(this.type==='OX')Core.player.ox=100; else Core.player.triple=600; this.dead=true; } }
            draw(ctx) { ctx.fillStyle=this.type==='OX'?'var(--warp)':'var(--gold)'; ctx.shadowBlur=15; ctx.shadowColor=ctx.fillStyle; ctx.fillRect(this.x-10,this.y-10,20,20); ctx.shadowBlur=0;}
        }

        class Invite { constructor(x,y){this.x=x;this.y=y;} tick(){ if(Math.hypot(this.x-Core.player.x,this.y-Core.player.y)<30){Core.player.invites++; this.dead=true;} } draw(ctx){ctx.fillStyle="var(--gold)"; ctx.shadowBlur=15; ctx.shadowColor="var(--gold)"; ctx.beginPath(); ctx.arc(this.x,this.y,15,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;} }

        const UI = {
            setDev(d) { 
                document.getElementById('p-pc').className = d==='pc'?'btn active':'btn';
                document.getElementById('p-mo').className = d==='mobile'?'btn active':'btn';
                document.getElementById('mobile-controls').style.display = d==='mobile' ? 'block' : 'none'; 
            },
            toggleAdmin(s) { Core.active=!s; document.getElementById('admin-layer').style.display = s?'flex':'none'; },
            startCutscene() {
                document.getElementById('ui-layer').style.display = 'none';
                document.getElementById('cutscene-layer').style.display = 'flex';
                const text = "> INCOMING TRANSMISSION...\n> MISSION: INFILTRATE SECTOR 1-202.\n> OBJECTIVE A: RECOVER 3 MANSION INVITES IN SECTOR 21.\n> OBJECTIVE B: ELIMINATE TARGET 'DIDDY' IN SECTOR 202.\n> WARNING: OXYGEN DEPLETES ON EVERY ACTION.\n> SHOOT (S) AND WARP (W) TO SURVIVE.\n> GOOD LUCK, OPERATIVE.";
                let i = 0; const container = document.getElementById('typewriter');
                function type() {
                    if (i < text.length) {
                        container.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
                        i++; setTimeout(type, 35);
                    } else { document.getElementById('skip-btn').style.display = 'block'; }
                }
                type();
            }
        };

        window.onkeydown=e=>{ Core.keys[e.code]=true; if(e.code==='Space')Core.player.shoot(); if(e.code==='ShiftLeft')Core.player.warp(); };
        window.onkeyup=e=>Core.keys[e.code]=false;
        
        let joyOn=false, joyV={x:0,y:0};
        const jB=document.getElementById('j-base'), jK=document.getElementById('j-knob');
        jB.onpointerdown=e=>{joyOn=true;};
        window.onpointermove=e=>{
            if(!joyOn)return;
            let r=jB.getBoundingClientRect(), dx=e.clientX-(r.left+60), dy=e.clientY-(r.top+60), d=Math.min(Math.hypot(dx,dy),50), a=Math.atan2(dy,dx);
            joyV={x:Math.cos(a),y:Math.sin(a)}; jK.style.transform=`translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px)`;
        };
        window.onpointerup=()=>{joyOn=false; joyV={x:0,y:0}; jK.style.transform='translate(0,0)';};

        if(localStorage.getItem('sm_save')) document.getElementById('res-btn').style.display='block';
    </script>
</body>
</html>
