<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPACE MAZE | VIAAN2501 EDITION</title>
    <style>
        :root { --neon: #00ff41; --warp: #00ccff; --danger: #ff0033; --gold: #ffd700; --bg: #0d0d0d; --purple: #a020f0; }
        * { box-sizing: border-box; user-select: none; touch-action: none; font-family: 'Courier New', monospace; }
        body { background: #000; color: var(--neon); margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* THE NEON CRT LOOK */
        #game-container { 
            position: relative; 
            width: 800px; height: 600px; 
            border: 4px solid var(--neon); 
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.4), inset 0 0 15px rgba(0, 255, 65, 0.2);
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
        }

        .layer { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; background: rgba(0,0,0,0.9); }
        #game-layer { display: none; background: transparent; }
        
        #hud { 
            position: absolute; top: 0; width: 100%; padding: 15px; 
            display: flex; justify-content: space-between; align-items: flex-start;
            z-index: 100; text-shadow: 0 0 5px var(--neon);
        }

        #ox-bar-container { width: 120px; height: 10px; border: 1px solid var(--neon); background: rgba(0,255,65,0.1); margin-top: 5px; }
        #ox-bar { height: 100%; width: 100%; background: var(--neon); transition: width 0.1s; }

        .btn { background: #000; border: 2px solid var(--neon); color: var(--neon); padding: 12px 24px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin: 10px; }
        .btn:hover { background: var(--neon); color: #000; }

        #rage-overlay { 
            position: absolute; width: 100%; text-align: center; color: var(--danger); 
            font-weight: 900; z-index: 1500; pointer-events: none; display: none;
            text-shadow: 0 0 15px var(--danger);
        }

        canvas { image-rendering: pixelated; }

        /* SCANLINE EFFECT */
        #game-container::after {
            content: " "; position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 1000; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer" class="layer">
        <h1 style="font-size: 3.5rem; margin-bottom: 20px;">SPACE MAZE</h1>
        <input type="text" id="username" placeholder="ENTER PILOT ID" style="background:#000; color:var(--neon); border:1px solid var(--neon); padding:10px; text-align:center; width: 250px; margin-bottom: 10px;">
        <button class="btn" onclick="UI.start()">BOOT SYSTEM</button>
        <button id="res-btn" class="btn" style="display:none; border-color:var(--gold); color:var(--gold);" onclick="Core.boot(true)">RESUME SECTOR</button>
    </div>

    <div id="admin-layer" class="layer" style="display:none;">
        <div style="border: 2px solid var(--danger); padding: 30px; background: #000; box-shadow: 0 0 30px var(--danger);">
            <h2 style="color:var(--danger);">ROOT ACCESS: VIAAN2501</h2>
            <input type="number" id="jump-level" placeholder="SEC" style="width:60px; background:#000; color:var(--danger); border:1px solid var(--danger); padding:10px;">
            <button class="btn" style="border-color:var(--danger); color:var(--danger);" onclick="Core.adminJump(document.getElementById('jump-level').value)">WARP</button>
            <button class="btn" onclick="Core.god=!Core.god; UI.toggleAdmin(false)">GOD_MODE: <span id="gs">OFF</span></button>
            <button class="btn" onclick="UI.toggleAdmin(false)">EXIT</button>
        </div>
    </div>

    <div id="rage-overlay">GET GOOD.</div>

    <div id="game-layer" class="layer">
        <div id="hud">
            <div>SEC: <span id="v-sec">1</span><br>DEATHS: <span id="v-deaths">0</span></div>
            <div id="override-msg" style="color:var(--purple); font-weight:bold;"></div>
            <div>OXYGEN: <span id="v-ox">100</span>%<div id="ox-bar-container"><div id="ox-bar"></div></div></div>
        </div>
        <canvas id="stage"></canvas>
    </div>
</div>

<script>
    const MAP = { W:800, H:600, R:13, C:19, TW:800/19, TH:600/13 };
    const RAGE = ["SKILL ISSUE.", "MY GRANDMA PLAYS BETTER.", "EMBARRASSING.", "JUST QUIT.", "PATHETIC.", "OXYGEN IS FOR WINNERS."];
    let user = "";

    const Core = {
        sector: 1, entities: [], keys: {}, combo: "", god: false, deaths: 0, rageScale: 1.0,
        boot(resume) {
            if(resume) this.sector = parseInt(localStorage.getItem('sm_save')) || 1;
            this.deaths = parseInt(localStorage.getItem('sm_deaths')) || 0;
            user = (document.getElementById('username').value || "PILOT").toUpperCase();
            localStorage.setItem('sm_user', user);
            
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('game-layer').style.display = 'flex';
            this.ctx = document.getElementById('stage').getContext('2d');
            document.getElementById('stage').width = MAP.W; 
            document.getElementById('stage').height = MAP.H;
            
            this.init(this.sector);
            if(!this.loopStarted) { this.run(); this.loopStarted = true; }
        },
        init(n) {
            this.sector = n; localStorage.setItem('sm_save', n);
            this.entities = [];
            const isOverride = (n === 21);
            const isBoss = (n === 202);
            
            document.getElementById('override-msg').innerText = isOverride ? "SYSTEM OVERRIDE: VOID" : "";
            this.maze = (isOverride || isBoss) ? Array.from({length:MAP.R},()=>Array(MAP.C).fill(0)) : this.createMaze();
            
            this.player = new Player(MAP.TW+5, MAP.TH+5);
            document.getElementById('v-sec').innerText = n;
            document.getElementById('v-deaths').innerText = this.deaths;

            if(isBoss) this.entities.push(new DiddyBoss(400, 300));
            else if(!isOverride) {
                let count = 0;
                while(count < Math.min(2 + Math.floor(n/2), 12)) {
                    let rx = Math.random() * MAP.W, ry = Math.random() * MAP.H;
                    if(!this.isWall(rx, ry) && Math.hypot(rx-this.player.x, ry-this.player.y) > 150) {
                        this.entities.push(new Enemy(rx, ry)); count++;
                    }
                }
            }
        },
        createMaze() {
            let m = Array.from({length:MAP.R},()=>Array(MAP.C).fill(1));
            let s = [[1,1]]; m[1][1] = 0;
            while(s.length) {
                let [r,c] = s[s.length-1];
                let ns = [[r-2,c],[r+2,c],[r,c-2],[r,c+2]].filter(([nr,nc])=>nr>0&&nr<MAP.R-1&&nc>0&&nc<MAP.C-1&&m[nr][nc]===1);
                if(ns.length) { let [nr,nc] = ns[Math.floor(Math.random()*ns.length)]; m[nr][nc]=0; m[(r+nr)/2][(c+nc)/2]=0; s.push([nr,nc]); } else s.pop();
            }
            m[MAP.R-2][MAP.C-2]=0; return m;
        },
        isWall(x,y) {
            let c = Math.floor(x/MAP.TW), r = Math.floor(y/MAP.TH);
            return r<0||r>=MAP.R||c<0||c>=MAP.C||this.maze[r][c]===1;
        },
        die() {
            if(this.god) return;
            this.deaths++; localStorage.setItem('sm_deaths', this.deaths);
            if(this.deaths % 5 === 0) {
                this.rageScale += 0.3;
                const el = document.getElementById('rage-overlay');
                el.innerText = RAGE[Math.floor(Math.random()*RAGE.length)];
                el.style.display = 'block'; el.style.fontSize = (2 * this.rageScale) + "rem";
                setTimeout(() => el.style.display = 'none', 1200);
            }
            this.init(this.sector);
        },
        run() {
            this.ctx.clearRect(0,0,MAP.W,MAP.H);
            this.player.tick();
            this.entities = this.entities.filter(e => { e.tick(); return !e.dead; });
            if(this.player.x > MAP.W-MAP.TW*2 && this.player.y > MAP.H-MAP.TH*2) this.init(this.sector+1);
            this.draw(); requestAnimationFrame(()=>this.run());
        },
        draw() {
            this.ctx.fillStyle = (this.sector >= 21) ? "#a020f0" : "#00ff41";
            for(let r=0; r<MAP.R; r++) for(let c=0; c<MAP.C; c++) if(this.maze[r][c]) this.ctx.fillRect(c*MAP.TW, r*MAP.TH, MAP.TW, MAP.TH);
            this.entities.forEach(e => e.draw(this.ctx));
            this.player.draw(this.ctx);
            // Exit square
            this.ctx.fillStyle = "#fff"; this.ctx.fillRect(MAP.W-MAP.TW*1.5, MAP.H-MAP.TH*1.5, 15, 15);
        },
        adminJump(v) { if(v) this.init(parseInt(v)); UI.toggleAdmin(false); }
    };

    class Player {
        constructor(x,y) { this.x=x; this.y=y; this.ox=100; this.speed=4.8; this.cd=0; }
        tick() {
            let mx=0, my=0;
            if(Core.keys.KeyW || Core.keys.ArrowUp) my=-1;
            if(Core.keys.KeyS || Core.keys.ArrowDown) my=1;
            if(Core.keys.KeyA || Core.keys.ArrowLeft) mx=-1;
            if(Core.keys.KeyD || Core.keys.ArrowRight) mx=1;
            
            let nx = this.x + mx*this.speed, ny = this.y + my*this.speed;
            if(!Core.isWall(nx, this.y)) this.x = nx;
            if(!Core.isWall(this.x, ny)) this.y = ny;
            
            if(!Core.god) { this.ox -= 0.018; if(this.ox<=0) Core.die(); }
            if(this.cd > 0) this.cd--;
            document.getElementById('v-ox').innerText = Math.max(0, Math.floor(this.ox));
            document.getElementById('ox-bar').style.width = this.ox+"%";
        }
        shoot() {
            if(this.cd>0) return;
            let tar = Core.entities.find(e => !(e instanceof Bullet));
            let a = tar ? Math.atan2(tar.y-this.y, tar.x-this.x) : 0;
            Core.entities.push(new Bullet(this.x, this.y, a, true));
            this.cd=14; if(!Core.god) this.ox-=2; Core.combo+="S"; checkCombo();
        }
        warp() {
            let nx = this.x + 130;
            if(!Core.isWall(nx, this.y)) { this.x = nx; if(!Core.god) this.ox-=10; Core.combo+="W"; checkCombo(); }
        }
        draw(ctx) { ctx.fillStyle=Core.god? "var(--gold)":"#fff"; ctx.beginPath(); ctx.arc(this.x,this.y,10,0,Math.PI*2); ctx.fill(); }
    }

    class Bullet {
        constructor(x,y,a,p) { this.x=x; this.y=y; this.vx=Math.cos(a)*10; this.vy=Math.sin(a)*10; this.isP=p; }
        tick() {
            this.x+=this.vx; this.y+=this.vy;
            if(Core.isWall(this.x, this.y)) this.dead=true;
            if(this.isP) Core.entities.forEach(e => { if(!(e instanceof Bullet) && Math.hypot(this.x-e.x,this.y-e.y)<20){ e.hp?e.hp--:e.dead=true; this.dead=true; }});
            else if(Math.hypot(this.x-Core.player.x, this.y-Core.player.y)<15) Core.die();
            if(this.x<0||this.x>MAP.W||this.y<0||this.y>MAP.H) this.dead=true;
        }
        draw(ctx) { ctx.fillStyle=this.isP? "var(--warp)":"#f00"; ctx.fillRect(this.x-3,this.y-3,6,6); }
    }

    class Enemy {
        constructor(x,y) { this.x=x; this.y=y; this.vx=(Math.random() > 0.5 ? 2.5 : -2.5); }
        tick() { 
            this.x+=this.vx; 
            if(Core.isWall(this.x+(this.vx*5), this.y)) this.vx*=-1; 
            if(Math.hypot(this.x-Core.player.x, this.y-Core.player.y)<16) Core.die(); 
        }
        draw(ctx) { ctx.fillStyle="red"; ctx.beginPath(); ctx.arc(this.x,this.y,12,0,Math.PI*2); ctx.fill(); }
    }

    class DiddyBoss {
        constructor(x,y){this.x=x;this.y=y;this.hp=100;this.vx=4;}
        tick(){
            this.x+=this.vx; if(this.x<100||this.x>700) this.vx*=-1;
            if(Math.random()<0.05) Core.entities.push(new Bullet(this.x,this.y,Math.PI/2,false));
            if(this.hp<=0) { alert("SYSTEM CLEANSED. MISSION COMPLETE."); location.reload(); }
        }
        draw(ctx){ ctx.fillStyle="#a020f0"; ctx.beginPath(); ctx.arc(this.x,this.y,45,0,Math.PI*2); ctx.fill(); }
    }

    function checkCombo() {
        if(Core.combo.endsWith("SWWS") && user === "VIAAN2501") { 
            UI.toggleAdmin(true); 
            document.getElementById('gs').innerText = Core.god ? "ON" : "OFF";
        }
        if(Core.combo.length > 10) Core.combo = Core.combo.slice(-4);
    }

    const UI = {
        start() { user=document.getElementById('username').value.toUpperCase(); Core.boot(false); },
        toggleAdmin(s) { document.getElementById('admin-layer').style.display=s?'flex':'none'; }
    };

    window.addEventListener('keydown', e => { 
        Core.keys[e.code] = true; 
        if(e.code==='Space') Core.player.shoot(); 
        if(e.code==='ShiftLeft') Core.player.warp(); 
    });
    window.addEventListener('keyup', e => Core.keys[e.code] = false);

    window.onload=()=>{
        if(localStorage.getItem('sm_save')) document.getElementById('res-btn').style.display='inline-block';
    };
</script>

</body>
</html>
