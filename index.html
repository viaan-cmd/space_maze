<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPACE MAZE | MASTER BUILD</title>
    <style>
        :root { --neon: #00ff41; --warp: #0cf; --danger: #f05; --gold: #ffd700; --purple: #a020f0; }
        body { 
            background: #000; color: var(--neon); font-family: 'Courier New', monospace; 
            margin: 0; padding: 0; overflow: hidden; touch-action: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
        }
        #overlay, #cutscene, #admin-panel {
            position: absolute; z-index: 100; background: radial-gradient(circle, #0a0a1a 0%, #000 100%);
            width: 100%; height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 20px; box-sizing: border-box;
        }
        #admin-panel { display: none; background: rgba(0, 10, 0, 0.95); border: 3px solid var(--neon); height: auto; width: 320px; border-radius: 15px; z-index: 120; }
        #cutscene { display: none; z-index: 110; }
        
        .settings-box { background: rgba(0,255,65,0.1); border: 1px solid var(--neon); padding: 8px; border-radius: 10px; margin: 4px; width: 300px; font-size: 0.75rem; }
        button { background: transparent; border: 2px solid var(--neon); color: var(--neon); padding: 5px 10px; cursor: pointer; border-radius: 5px; margin: 2px; font-family: 'Courier New'; }
        button.active { background: var(--neon); color: #000; }
        .start-btn { margin-top: 10px; background: var(--neon) !important; color: #000 !important; font-weight: bold; width: 200px; font-size: 1.1rem; }

        #game-container { position: relative; width: 100%; height: 100%; display: none; align-items: center; justify-content: center; }
        canvas { background: #010101; border: 1px solid var(--neon); max-width: 95vw; max-height: 50vh; }
        
        #stats { position: absolute; top: 10px; font-size: 1rem; width: 100%; text-align: center; z-index: 10; }
        #boss-hp-bar { position: absolute; bottom: 15px; width: 250px; height: 12px; border: 2px solid var(--gold); display: none; background: #222; }
        #boss-inner { height: 100%; background: var(--gold); width: 100%; transition: 0.3s; }
        
        /* MOBILE UI */
        #mobile-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; pointer-events: none; }
        .control-side { position: absolute; bottom: 20px; width: 180px; height: 180px; pointer-events: auto; display: flex; align-items: center; justify-content: center; }
        .side-left { left: 10px; } .side-right { right: 10px; }
        
        #joy-base { width: 100px; height: 100px; background: rgba(0,255,65,0.1); border: 2px solid var(--neon); border-radius: 50%; position: relative; }
        #joy-stick { width: 40px; height: 40px; background: var(--neon); border-radius: 50%; position: absolute; left: 30px; top: 30px; }
        
        #dpad-diamond { display: grid; grid-template-columns: repeat(3, 55px); grid-template-rows: repeat(3, 55px); }
        .d-btn { border: 2px solid var(--neon); border-radius: 8px; display: flex; align-items: center; justify-content: center; background: rgba(0,255,65,0.1); }

        .act-btn { width: 75px; height: 75px; border-radius: 50%; border: 3px solid var(--warp); color: var(--warp); font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; pointer-events: auto; }
        .dialogue-box { position: absolute; bottom: 80px; background: rgba(0,0,0,0.9); border: 2px solid var(--gold); padding: 10px; color: var(--gold); width: 80%; display: none; text-align: center; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="text-shadow: 0 0 15px var(--neon);">SPACE MAZE: 202</h1>
        <div class="settings-box">DEVICE: <button id="pc-btn" class="active" onclick="setDevice('pc')">PC</button><button id="mo-btn" onclick="setDevice('mobile')">MOBILE</button></div>
        <div id="mobile-settings" style="display:none;">
            <div class="settings-box">HANDS: <button id="l-btn" onclick="setHand('lefty')">L-MOVE</button><button id="r-btn" class="active" onclick="setHand('righty')">R-MOVE</button></div>
            <div class="settings-box">TYPE: <button id="j-btn" class="active" onclick="setControl('joy')">JOY</button><button id="d-btn" onclick="setControl('dpad')">DIAMOND</button></div>
        </div>
        <button class="start-btn" onclick="launch()">START MISSION</button>
        <button class="start-btn" id="cont-btn" style="display:none; background:var(--warp)!important;" onclick="launch(true)">CONTINUE</button>
    </div>

    <div id="admin-panel">
        <h2 style="margin-top:0;">ADMIN ACCESS</h2>
        <input type="number" id="skip-lvl" placeholder="Level (1-202)" style="width:70%; padding:8px; margin-bottom:10px;">
        <button onclick="adminWarp()">WARP SECTOR</button><br>
        <button onclick="player.ox=100; closeAdmin()">MAX OXYGEN</button>
        <button onclick="player.ghost=!player.ghost; closeAdmin()">GHOST MODE</button>
        <button onclick="closeAdmin()" style="border-color:var(--danger); color:var(--danger); margin-top:10px;">EXIT</button>
    </div>

    <div id="cutscene">
        <h2 id="cut-text" style="color:var(--warp);"></h2>
        <button class="start-btn" onclick="closeCutscene()">CONTINUE</button>
    </div>

    <div id="game-container">
        <div id="stats">SECTOR: <span id="lvl">1</span>/202 | OXYGEN: <span id="ox">100</span>%</div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="boss-hp-bar"><div id="boss-inner"></div><div style="position:absolute; width:100%; text-align:center; font-size:10px; color:#fff; line-height:12px;">HP: <span id="hp-txt">100</span>/100</div></div>
        <div class="dialogue-box" id="dialogue"></div>
        <div id="mobile-ui">
            <div id="move-zone" class="control-side side-right">
                <div id="joy-base"><div id="joy-stick"></div></div>
                <div id="dpad-diamond" style="display:none;">
                    <div style="grid-column:2" class="d-btn" ontouchstart="keys.ArrowUp=true" ontouchend="keys.ArrowUp=false">↑</div>
                    <div style="grid-column:1; grid-row:2" class="d-btn" ontouchstart="keys.ArrowLeft=true" ontouchend="keys.ArrowLeft=false">←</div>
                    <div style="grid-column:3; grid-row:2" class="d-btn" ontouchstart="keys.ArrowRight=true" ontouchend="keys.ArrowRight=false">→</div>
                    <div style="grid-column:2; grid-row:3" class="d-btn" ontouchstart="keys.ArrowDown=true" ontouchend="keys.ArrowDown=false">↓</div>
                </div>
            </div>
            <div id="act-zone" class="control-side side-left" style="flex-direction:column;">
                <div class="act-btn" style="border-color:var(--warp); color:var(--warp);" ontouchstart="dash()">WARP</div>
                <div class="act-btn" style="border-color:var(--danger); color:var(--danger);" ontouchstart="shoot()">FIRE</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const ROWS = 13, COLS = 19, CELL_W = 800/COLS, CELL_H = 600/ROWS;
        let currentLevel = 1, player, enemies, maze, bullets, powerups, puzzleItems, keys = {}, gameActive = false;
        let dev='pc', hand='righty', ctrl='joy', raf, flash=0, items=0, code=[];

        if(localStorage.getItem('mazeSector')) document.getElementById('cont-btn').style.display='inline-block';

        function setDevice(d){ dev=d; document.getElementById('pc-btn').className=d==='pc'?'active':''; document.getElementById('mo-btn').className=d==='mobile'?'active':''; document.getElementById('mobile-settings').style.display=d==='mobile'?'block':'none';}
        function setHand(h){ hand=h; document.getElementById('l-btn').className=h==='lefty'?'active':''; document.getElementById('r-btn').className=h==='righty'?'active':'';}
        function setControl(c){ ctrl=c; document.getElementById('j-btn').className=c==='joy'?'active':''; document.getElementById('d-btn').className=c==='dpad'?'active':''; document.getElementById('joy-base').style.display=c==='joy'?'block':'none'; document.getElementById('dpad-diamond').style.display=c==='dpad'?'grid':'none';}

        const joyB = document.getElementById('joy-base'), joyS = document.getElementById('joy-stick');
        let joyPos = {x:0, y:0}, joyA = false;
        joyB.addEventListener('touchstart', e => { joyA=true; moveJoy(e); });
        window.addEventListener('touchmove', e => { if(joyA) moveJoy(e); }, {passive:false});
        window.addEventListener('touchend', () => { joyA=false; joyS.style.transform='translate(0,0)'; joyPos={x:0,y:0}; });
        function moveJoy(e){
            const t = e.touches[0], r = joyB.getBoundingClientRect();
            const dx = t.clientX - (r.left+50), dy = t.clientY - (r.top+50);
            const d = Math.min(40, Math.hypot(dx,dy)); const ang = Math.atan2(dy,dx);
            joyPos = {x: Math.cos(ang)*(d/40), y: Math.sin(ang)*(d/40)};
            joyS.style.transform = `translate(${Math.cos(ang)*d}px, ${Math.sin(ang)*d}px)`;
        }

        function launch(cont=false){
            document.getElementById('overlay').style.display='none';
            document.getElementById('game-container').style.display='flex';
            if(dev==='mobile'){ 
                document.getElementById('mobile-ui').style.display='block';
                document.getElementById('move-zone').className=`control-side side-${hand==='righty'?'right':'left'}`;
                document.getElementById('act-zone').className=`control-side side-${hand==='righty'?'left':'right'}`;
            }
            initLevel(cont ? parseInt(localStorage.getItem('mazeSector')) : 1);
            gameActive=true; if(!raf) draw();
        }

        function initLevel(lvl){
            currentLevel = lvl; localStorage.setItem('mazeSector', lvl);
            maze = Array.from({length:ROWS},()=>Array(COLS).fill(1));
            let s=[[0,0]]; maze[0][0]=0;
            while(s.length){
                let [r,c]=s[s.length-1];
                let n=[[r-2,c],[r+2,c],[r,c-2],[r,c+2]].filter(([nr,nc])=>nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&maze[nr][nc]===1);
                if(n.length){ let [nr,nc]=n[Math.floor(Math.random()*n.length)]; maze[nr][nc]=0; maze[(r+nr)/2][(c+nc)/2]=0; s.push([nr,nc]); } else s.pop();
            }
            player = { x:CELL_W/2, y:CELL_H/2, ox:100, dir:{x:1,y:0}, trail:[], ghost:false };
            bullets=[]; enemies=[]; powerups=[]; puzzleItems=[]; items=0;

            if(lvl===20) showCutscene("ORIGIN OF THE ORB:<br>Forged in the depths of a legendary party...<br>Powered by pure energy and gloss.");
            if(lvl===21){ puzzleItems=[{x:CELL_W*2,y:CELL_H*2},{x:CELL_W*16,y:CELL_H*2},{x:CELL_W*9,y:CELL_H*11}]; showDialogue("Collect 3 Invitations to enter the Mansion."); }
            if(lvl===202){ enemies.push({x:400,y:300,dx:5,dy:5,hp:10,maxHp:10,boss:true,size:45}); document.getElementById('boss-hp-bar').style.display='block'; }
            else { 
                document.getElementById('boss-hp-bar').style.display='none';
                let count = Math.min(3+Math.floor(lvl/12), 15);
                for(let i=0;i<count;i++){
                    let rx, ry; do{rx=Math.floor(Math.random()*COLS);ry=Math.floor(Math.random()*ROWS);}while(maze[ry][rx]===1||(rx<2&&ry<2));
                    enemies.push({x:rx*CELL_W+CELL_W/2,y:ry*CELL_H+CELL_H/2,dx:(Math.random()-0.5)*6,dy:(Math.random()-0.5)*6,hp:1,size:12});
                }
            }
            if(lvl>=50){ let rx, ry; do{rx=Math.floor(Math.random()*COLS);ry=Math.floor(Math.random()*ROWS);}while(maze[ry][rx]===1); powerups.push({x:rx*CELL_W+CELL_W/2,y:ry*CELL_H+CELL_H/2,type:Math.random()>0.5?'OX':'SPD'}); }
        }

        function trackCode(v){ code.push(v); if(code.length>4) code.shift(); if(code.join('')==="SWWS"){ gameActive=false; document.getElementById('admin-panel').style.display='flex'; code=[]; } }
        function adminWarp(){ let v=parseInt(document.getElementById('skip-lvl').value); if(v>=1&&v<=202){initLevel(v); closeAdmin();} }
        function closeAdmin(){ document.getElementById('admin-panel').style.display='none'; gameActive=true; }
        function showCutscene(t){ gameActive=false; document.getElementById('cutscene').style.display='flex'; document.getElementById('cut-text').innerHTML=t; }
        function closeCutscene(){ document.getElementById('cutscene').style.display='none'; gameActive=true; }
        function showDialogue(t){ const b=document.getElementById('dialogue'); b.style.display='block'; b.innerText=t; setTimeout(()=>b.style.display='none',3000); }

        window.addEventListener("keydown",e=>{ keys[e.code]=true; if(e.code==="Space") shoot(); if(e.shiftKey) dash();});
        window.addEventListener("keyup",e=>keys[e.code]=false);

        function shoot(){
            trackCode("S");
            if(player.ox>=8 && enemies.length){
                let target = enemies[0]; let minD=1000;
                enemies.forEach(en=>{ let d=Math.hypot(en.x-player.x,en.y-player.y); if(d<minD){minD=d; target=en;}});
                let ang = Math.atan2(target.y-player.y,target.x-player.x);
                bullets.push({x:player.x,y:player.y,dx:Math.cos(ang)*15,dy:Math.sin(ang)*15});
                player.ox-=8;
            }
        }
        function dash(){
            trackCode("W");
            if(player.ox>=15){
                player.trail.push({x:player.x,y:player.y});
                player.x+=player.dir.x*140; player.y+=player.dir.y*140;
                player.ox-=15; flash=0.5;
            }
        }

        function update(){
            if(!gameActive) return;
            let mx=0, my=0;
            if(keys.ArrowUp||keys.KeyW) my=-1; if(keys.ArrowDown||keys.KeyS) my=1;
            if(keys.ArrowLeft||keys.KeyA) mx=-1; if(keys.ArrowRight||keys.KeyD) mx=1;
            if(joyA){mx=joyPos.x; my=joyPos.y;}
            if(mx||my){
                player.dir={x:mx||player.dir.x,y:my||player.dir.y};
                let s = player.spd?9:5.5;
                for(let i=0; i<s; i++){
                    let nx=player.x+(mx?mx/Math.abs(mx):0), ny=player.y+(my?my/Math.abs(my):0);
                    let r=Math.floor(ny/CELL_H), c=Math.floor(nx/CELL_W);
                    if(player.ghost || !(r<0||r>=ROWS||c<0||c>=COLS||maze[r][c]===1)){ player.x=nx; player.y=ny; }
                }
            }
            puzzleItems=puzzleItems.filter(p=>{
                if(Math.hypot(player.x-p.x,player.y-p.y)<25){ 
                    items++; if(items===3){ enemies.push({x:400,y:300,boss:true,size:45,diddy:true}); showDialogue("I'll see you at Sector 202..."); setTimeout(()=>{enemies=[]; items=4;},3000); }
                    return false;
                } return true;
            });
            powerups=powerups.filter(p=>{
                if(Math.hypot(player.x-p.x,player.y-p.y)<25){ if(p.type==='OX') player.ox=100; else {player.spd=true; setTimeout(()=>player.spd=false,7000);} return false; } return true;
            });
            enemies.forEach(en=>{
                if(!en.diddy){
                    let nr=Math.floor((en.y+en.dy)/CELL_H), nc=Math.floor((en.x+en.dx)/CELL_W);
                    if(nr<0||nr>=ROWS||nc<0||nc>=COLS||maze[nr][nc]===1){en.dx*=-1; en.dy*=-1;} en.x+=en.dx; en.y+=en.dy;
                    if(Math.hypot(player.x-en.x,player.y-en.y)<en.size+8) initLevel(currentLevel);
                }
                if(en.boss){
                    let v = Math.ceil((en.hp/en.maxHp)*100);
                    document.getElementById('boss-inner').style.width=v+'%'; document.getElementById('hp-txt').innerText=v;
                }
            });
            bullets=bullets.filter(b=>{
                b.x+=b.dx; b.y+=b.dy; let h=false;
                enemies.forEach((en,i)=>{ if(Math.hypot(b.x-en.x,b.y-en.y)<en.size+8){en.hp--; h=true; if(en.hp<=0) enemies.splice(i,1);} });
                let r=Math.floor(b.y/CELL_H), c=Math.floor(b.x/CELL_W);
                return !h && !(r<0||r>=ROWS||c<0||c>=COLS||maze[r][c]===1);
            });
            if(player.x>800-CELL_W && player.y>600-CELL_H && (currentLevel!==21||items>=4)){
                if(currentLevel>=202&&!enemies.length) end(); else initLevel(currentLevel+1);
            }
            player.ox-=0.015; if(player.ox<=0) initLevel(currentLevel);
            document.getElementById('ox').innerText=Math.floor(player.ox); document.getElementById('lvl').innerText=currentLevel;
        }

        function draw(){
            ctx.clearRect(0,0,800,600);
            ctx.fillStyle=currentLevel===21?"#201":"#00ff41";
            for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(maze[r][c]) ctx.fillRect(c*CELL_W+1,r*CELL_H+1,CELL_W-2,CELL_H-2);
            ctx.fillStyle=(currentLevel===21&&items<4)?"#333":"#0cf"; ctx.fillRect(800-CELL_W+5,600-CELL_H+5,CELL_W-10,CELL_H-10);
            player.trail.forEach((t,i)=>{ ctx.strokeStyle=`rgba(0,204,255,${i/5})`; ctx.beginPath(); ctx.moveTo(t.x,t.y); ctx.lineTo(player.x,player.y); ctx.stroke(); if(player.trail.length>5) player.trail.shift(); });
            puzzleItems.forEach(p=>{ctx.fillStyle="#ffd700"; ctx.beginPath(); ctx.arc(p.x,p.y,12,0,Math.PI*2); ctx.fill();});
            powerups.forEach(p=>{ctx.fillStyle=p.type==='OX'?'#fff':'#0f0'; ctx.fillRect(p.x-10,p.y-10,20,20);});
            ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(player.x,player.y,10,0,Math.PI*2); ctx.fill();
            enemies.forEach(en=>{ctx.fillStyle=en.boss?"#ff0":"#f05"; ctx.beginPath(); ctx.arc(en.x,en.y,en.size,0,Math.PI*2); ctx.fill();});
            ctx.fillStyle="#ff0"; bullets.forEach(b=>{ctx.beginPath(); ctx.arc(b.x,b.y,5,0,Math.PI*2); ctx.fill();});
            if(flash>0){ ctx.fillStyle=`rgba(0,204,255,${flash})`; ctx.fillRect(0,0,800,600); flash-=0.05; }
            update(); raf=requestAnimationFrame(draw);
        }

        function end(){ gameActive=false; document.getElementById('game-container').innerHTML=`<h1 style="color:var(--gold)">VICTORY</h1><a href="https://www.google.com/search?q=p+diddy+funny+face&tbm=isch" target="_blank" style="color:#fff">CLAIM BABY OIL</a>`;}
    </script>
</body>
</html>
