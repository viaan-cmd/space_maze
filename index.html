<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPACE MAZE | FLASH WARP</title>
    <style>
        body { 
            background: #000; color: #00ff41; font-family: 'Courier New', monospace; 
            margin: 0; padding: 0; overflow: hidden; touch-action: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
        }
        #overlay {
            position: absolute; z-index: 100; background: radial-gradient(circle, #0a0a1a 0%, #000 100%);
            width: 100%; height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
        }
        .title { font-size: 3.5rem; font-weight: bold; text-shadow: 0 0 20px #00ff41; margin-bottom: 10px; }
        .settings-box { background: rgba(0,255,65,0.1); border: 1px solid #00ff41; padding: 15px; border-radius: 10px; margin: 10px; width: 320px; }
        
        button {
            background: transparent; border: 2px solid #00ff41; color: #00ff41;
            padding: 10px 20px; font-size: 1rem; font-family: 'Courier New';
            cursor: pointer; transition: 0.3s; border-radius: 5px; margin: 5px;
        }
        button.active { background: #00ff41; color: #000; box-shadow: 0 0 10px #00ff41; }
        .start-btn { margin-top: 15px; background: #00ff41 !important; color: #000 !important; font-weight: bold; width: 200px; font-size: 1.5rem; }
        .leave-btn { border-color: #ff0055; color: #ff0055; }
        .secret-btn-bold { font-weight: 900; border: 3px solid gold; color: gold; text-transform: uppercase; margin-top: 10px; background: rgba(255,215,0,0.1); }

        /* MOBILE UI */
        #mobile-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; pointer-events: none; z-index: 50; }
        .control-side { position: absolute; bottom: 40px; width: 180px; height: 250px; pointer-events: auto; display: flex; align-items: center; justify-content: center; }
        .side-left { left: 20px; }
        .side-right { right: 20px; }

        #dpad { display: grid; grid-template-columns: repeat(3, 55px); grid-template-rows: repeat(2, 55px); gap: 5px; }
        .m-btn { width: 55px; height: 55px; border: 2px solid #00ff41; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #00ff41; font-weight: bold; background: rgba(0,255,65,0.1); font-size: 1.5rem; }
        
        .action-btns { display: flex; flex-direction: column; gap: 25px; align-items: center; }
        .act-btn { width: 85px; height: 85px; border-radius: 50%; border: 3px solid #f05; color: #f05; display: flex; align-items: center; justify-content: center; font-weight: bold; background: rgba(255,0,85,0.1); }
        .dash-btn { border-color: #0cf; color: #0cf; background: rgba(0,204,255,0.1); }

        #game-container { position: relative; width: 100%; height: 100%; display: none; align-items: center; justify-content: center; }
        canvas { background: #010101; border: 1px solid #00ff41; max-width: 95vw; max-height: 55vh; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        #stats { position: absolute; top: 15px; font-size: 1.3rem; width: 100%; text-align: center; color: #00ff41; }
        
        .tut-box { font-size: 0.85rem; margin-top: 10px; color: #0cf; background: rgba(0,204,255,0.05); padding: 8px; border-radius: 5px; border: 1px solid rgba(0,204,255,0.2); }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="title" id="menu-title">SPACE MAZE</div>
        
        <div id="menu-content">
            <div id="settings-area">
                <div class="settings-box">
                    <p style="margin-top:0">DEVICE</p>
                    <button id="dev-pc" class="active" onclick="setDevice('pc')">PC</button>
                    <button id="dev-mo" onclick="setDevice('mobile')">MOBILE</button>
                </div>

                <div id="mobile-options" style="display:none;">
                    <div class="settings-box">
                        <p style="margin-top:0">HANDEDNESS</p>
                        <button id="btn-lefty" onclick="setHand('lefty')">LEFT</button>
                        <button id="btn-righty" class="active" onclick="setHand('righty')">RIGHT</button>
                    </div>
                </div>

                <div class="tut-box">
                    <b>CONTROLS:</b><br>
                    PC: WASD to Move | Shift: WARP | Space: FIRE<br>
                    Mobile: D-Pad to Move | Buttons to Action<br>
                    <i>Warp (20% OX) is the ONLY way through walls!</i>
                </div>
            </div>
            
            <button class="start-btn" onclick="launch()">LAUNCH</button>
            <br>
            <button class="secret-btn-bold" onclick="alert('diddy will oil u up tn')">SECRET MESSAGE</button>
        </div>
    </div>

    <div id="game-container">
        <div id="stats">SECTOR: <span id="lvl">1</span> | OXYGEN: <span id="ox">100</span>%</div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="mobile-ui">
            <div id="move-zone" class="control-side side-right">
                <div id="dpad">
                    <div style="grid-column:2" class="m-btn" ontouchstart="keys.ArrowUp=true" ontouchend="keys.ArrowUp=false">↑</div>
                    <div class="m-btn" ontouchstart="keys.ArrowLeft=true" ontouchend="keys.ArrowLeft=false">←</div>
                    <div class="m-btn" ontouchstart="keys.ArrowDown=true" ontouchend="keys.ArrowDown=false">↓</div>
                    <div class="m-btn" ontouchstart="keys.ArrowRight=true" ontouchend="keys.ArrowRight=false">→</div>
                </div>
            </div>
            <div id="action-zone" class="control-side side-left">
                <div class="action-btns">
                    <div class="act-btn dash-btn" ontouchstart="dash()">WARP</div>
                    <div class="act-btn fire-btn" ontouchstart="shoot()">FIRE</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const ROWS = 13, COLS = 19, CELL_W = 800/COLS, CELL_H = 600/ROWS;
        let currentLevel = 1, player, enemies, maze, bullets, keys = {}, gameActive = false;
        let deviceType = 'pc', handMode = 'righty', raf, flashAlpha = 0;

        function setDevice(d) {
            deviceType = d;
            document.getElementById('dev-pc').className = d==='pc'?'active':'';
            document.getElementById('dev-mo').className = d==='mobile'?'active':'';
            document.getElementById('mobile-options').style.display = d==='mobile'?'block':'none';
        }
        function setHand(h) {
            handMode = h;
            document.getElementById('btn-lefty').className = h==='lefty'?'active':'';
            document.getElementById('btn-righty').className = h==='righty'?'active':'';
        }

        function launch() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            if(deviceType === 'mobile') {
                document.getElementById('mobile-ui').style.display = 'block';
                document.getElementById('move-zone').className = `control-side side-${handMode==='righty'?'right':'left'}`;
                document.getElementById('action-zone').className = `control-side side-${handMode==='righty'?'left':'right'}`;
            }
            currentLevel = 1;
            gameActive = true;
            initLevel(currentLevel);
            if (!raf) draw(); 
        }

        function initLevel(lvl) {
            maze = Array.from({ length: ROWS }, () => Array(COLS).fill(1));
            let stack = [[0, 0]]; maze[0][0] = 0;
            while (stack.length > 0) {
                let [r, c] = stack[stack.length - 1];
                let n = [[r-2, c], [r+2, c], [r, c-2], [r, c+2]].filter(([nr, nc]) => nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && maze[nr][nc] === 1);
                if (n.length > 0) { let [nr, nc] = n[Math.floor(Math.random()*n.length)]; maze[nr][nc] = 0; maze[(r+nr)/2][(c+nc)/2] = 0; stack.push([nr, nc]); } else stack.pop();
            }
            player = { x: CELL_W/2, y: CELL_H/2, ox: 100, dir: {x: 1, y: 0} };
            bullets = []; enemies = [];
            for(let i=0; i<Math.min(3 + lvl, 15); i++) {
                let rx, ry; do { rx = Math.floor(Math.random()*COLS); ry = Math.floor(Math.random()*ROWS); } while(maze[ry][rx] === 1 || (rx < 3 && ry < 3));
                enemies.push({ x: rx*CELL_W + CELL_W/2, y: ry*CELL_H + CELL_H/2, dx: (Math.random()-0.5)*4, dy: (Math.random()-0.5)*4 });
            }
        }

        window.addEventListener("keydown", e => { keys[e.code] = true; if(e.code === "Space") shoot(); if(e.code.includes("Shift")) dash(); });
        window.addEventListener("keyup", e => keys[e.code] = false);

        function shoot() {
            if (player.ox >= 8 && enemies.length > 0) {
                let target = enemies[0];
                let minDist = Math.hypot(target.x - player.x, target.y - player.y);
                enemies.forEach(en => {
                    let d = Math.hypot(en.x - player.x, en.y - player.y);
                    if (d < minDist) { minDist = d; target = en; }
                });
                let angle = Math.atan2(target.y - player.y, target.x - player.x);
                bullets.push({x: player.x, y: player.y, dx: Math.cos(angle)*12, dy: Math.sin(angle)*12});
                player.ox -= 8;
            }
        }

        function dash() {
            if (player.ox >= 20) {
                let tx = player.x + (player.dir.x * 125);
                let ty = player.y + (player.dir.y * 125);
                
                // No-stuck logic: snap to center of target tile
                let col = Math.floor(tx / CELL_W);
                let row = Math.floor(ty / CELL_H);
                col = Math.max(0, Math.min(COLS-1, col));
                row = Math.max(0, Math.min(ROWS-1, row));
                
                player.x = (col * CELL_W) + (CELL_W/2);
                player.y = (row * CELL_H) + (CELL_H/2);
                
                player.ox -= 20;
                flashAlpha = 0.5; // Trigger Cyan Flash
            }
        }

        function isWall(x, y) {
            let r = Math.floor(y/CELL_H), c = Math.floor(x/CELL_W);
            return (r<0 || r>=ROWS || c<0 || c>=COLS || maze[r][c] === 1);
        }

        function endScreen(msg, won = false) {
            gameActive = false;
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('menu-title').innerText = msg;
            document.getElementById('menu-title').style.color = won ? "#0cf" : "#f05";
            
            document.getElementById('menu-content').innerHTML = `
                <h2 style="margin:5px; color:#fff">SECTORS REACHED: ${currentLevel}</h2>
                <button class="start-btn" onclick="retry()">RETRY</button>
                <button class="start-btn leave-btn" onclick="location.reload()">LEAVE</button>
                <br>
                <button class="secret-btn-bold" onclick="alert('diddy will oil u up tn')">SECRET MESSAGE</button>
            `;
        }

        function retry() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            currentLevel = 1;
            gameActive = true;
            initLevel(currentLevel);
        }

        function update() {
            let mx = 0, my = 0;
            if (keys.ArrowUp || keys.KeyW) my = -1;
            if (keys.ArrowDown || keys.KeyS) my = 1;
            if (keys.ArrowLeft || keys.KeyA) mx = -1;
            if (keys.ArrowRight || keys.KeyD) mx = 1;

            if (mx || my) {
                player.dir = {x: mx || player.dir.x, y: my || player.dir.y};
                if (!isWall(player.x + mx*4, player.y)) player.x += mx*4;
                if (!isWall(player.x, player.y + my*4)) player.y += my*4;
            }

            enemies.forEach(en => {
                if (isWall(en.x + en.dx, en.y)) en.dx *= -1; else en.x += en.dx;
                if (isWall(en.x, en.y + en.dy)) en.dy *= -1; else en.y += en.dy;
                if (Math.hypot(player.x - en.x, player.y - en.y) < 18) endScreen("MISSION FAILED");
            });

            bullets = bullets.filter(b => {
                b.x += b.dx; b.y += b.dy;
                let hit = false;
                enemies.forEach((en, i) => { if (Math.hypot(b.x - en.x, b.y - en.y) < 15) { enemies.splice(i, 1); hit = true; }});
                return !hit && !isWall(b.x, b.y);
            });

            if (player.x > 800-CELL_W && player.y > 600-CELL_H) {
                if(currentLevel >= 10) endScreen("GALAXY ESCAPED!", true);
                else { currentLevel++; initLevel(currentLevel); }
            }

            // OXYGEN DRAIN (1% per second)
            player.ox -= (1/60); 
            if (player.ox <= 0) endScreen("OXYGEN DEPLETED");

            document.getElementById("ox").innerText = Math.max(0, Math.floor(player.ox));
            document.getElementById("lvl").innerText = currentLevel;
        }

        function draw() {
            if(gameActive) {
                ctx.clearRect(0,0,800,600);
                
                // Draw Maze
                ctx.fillStyle="#00ff41";
                for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) if(maze[r][c]) ctx.fillRect(c*CELL_W+1, r*CELL_H+1, CELL_W-2, CELL_H-2);
                
                // Draw Goal
                ctx.fillStyle="#0cf"; ctx.fillRect(800-CELL_W+5, 600-CELL_H+5, CELL_W-10, CELL_H-10);
                
                // Draw Player
                ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(player.x,player.y,10,0,Math.PI*2); ctx.fill();
                
                // Draw Enemies & Bullets
                ctx.fillStyle="#f05"; enemies.forEach(en=>{ctx.beginPath(); ctx.arc(en.x,en.y,11,0,Math.PI*2); ctx.fill();});
                ctx.fillStyle="#ff0"; bullets.forEach(b=>{ctx.beginPath(); ctx.arc(b.x,b.y,4,0,Math.PI*2); ctx.fill();});
                
                // Draw Warp Flash
                if (flashAlpha > 0) {
                    ctx.fillStyle = `rgba(0, 204, 255, ${flashAlpha})`;
                    ctx.fillRect(0,0,800,600);
                    flashAlpha -= 0.05;
                }

                update();
            }
            raf = requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
