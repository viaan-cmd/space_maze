<!DOCTYPE html>
<html>
<head>
    <title>SPACE MAZE: THE ORIGIN</title>
    <style>
        body { background: #000; color: #0f4; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #canvas-wrap { position: relative; border: 4px solid #222; }
        canvas { background: #000; display: block; }
        #hud { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; font-size: 18px; font-weight: bold; pointer-events: none; }
        .layer { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; z-index: 100; }
        input { background: #000; color: #0f4; border: 1px solid #0f4; padding: 10px; margin: 10px; font-family: inherit; text-align: center; }
        button { background: #000; color: #0f4; border: 2px solid #0f4; padding: 10px 20px; cursor: pointer; font-family: inherit; font-weight: bold; }
        #leaderboard { margin-top: 20px; font-size: 12px; border-top: 1px solid #333; width: 80%; padding-top: 10px; }
    </style>
</head>
<body>

<div id="canvas-wrap">
    <div id="hud">
        <div>SECTOR: <span id="v-sec">1</span></div>
        <div>O2: <span id="v-ox">100</span>%</div>
    </div>

    <div id="menu" class="layer">
        <h1>SPACE MAZE</h1>
        <input type="text" id="username" placeholder="IDENT_NAME">
        <button onclick="UI.startTutorial()">INITIALIZE</button>
        <div id="leaderboard">LOADING SCORES...</div>
    </div>

    <div id="msg-layer" class="layer" style="display:none;">
        <div id="text-box" style="line-height:1.6;"></div>
        <button id="next-btn" style="margin-top:20px;" onclick="UI.advance()">CONTINUE</button>
    </div>

    <canvas id="stage" width="800" height="600"></canvas>
</div>

<script>
const cvs = document.getElementById('stage');
const ctx = cvs.getContext('2d');
const GRID = { r: 13, c: 19, w: 800/19, h: 600/13 };

let state = "MENU";
let sector = 1;
let player, enemies, bullets, items, maze, boss;
let keys = {};
let combo = ""; // Admin sequence tracker

const UI = {
    startTutorial() {
        if(!document.getElementById('username').value) return alert("ENTER PILOT ID");
        this.showLayer("TUTORIAL: WASD to Move. SHIFT to Warp. SPACE to Shoot. Red spheres are lethal. Oxygen is life. Reach the Blue Portal.");
    },
    showLayer(txt) {
        state = "CUTSCENE";
        document.getElementById('menu').style.display = 'none';
        document.getElementById('msg-layer').style.display = 'flex';
        document.getElementById('text-box').innerText = txt;
    },
    advance() {
        if(state === "CUTSCENE" && sector === 1 && !player) {
            this.showLayer("THE ORIGIN: You are a remnant of the Sphere Project. Diddy has corrupted the neural network. Find Sector 202. End the transmission.");
        } else {
            document.getElementById('msg-layer').style.display = 'none';
            state = "PLAY";
            if(!player) initSector(1);
        }
    },
    updateScores() {
        let scores = JSON.parse(localStorage.getItem('sm_scores') || '[]');
        document.getElementById('leaderboard').innerHTML = "GLOBAL LEADERBOARD:<br>" + 
            scores.map(s => `${s.name}: SEC ${s.sec}`).join(' | ');
    }
};

function initSector(n) {
    sector = n;
    enemies = []; bullets = []; items = []; boss = null;
    maze = Array.from({length: GRID.r}, () => Array(GRID.c).fill(1));

    if (n === 202) {
        maze = maze.map(r => r.fill(0));
        boss = { x: 400, y: 300, hp: 100, size: 60 };
    } else if (n === "?") {
        maze = maze.map(r => r.fill(0));
        setTimeout(() => {
            UI.showLayer("DIDDY: 'I see you... See you at Sector 202.'");
            setTimeout(() => initSector(22), 3000);
        }, 10000);
    } else {
        genMaze(0, 0);
        for(let i=0; i<Math.min(4+sector, 18); i++) enemies.push(new Enemy());
    }

    if(!player) player = new Player();
    player.x = 25; player.y = 25;
    document.getElementById('v-sec').innerText = sector;
}

function genMaze(r, c) {
    maze[r][c] = 0;
    let ds = [[0,2],[0,-2],[2,0],[-2,0]].sort(() => Math.random() - 0.5);
    ds.forEach(([dr, dc]) => {
        let nr = r+dr, nc = c+dc;
        if (nr>=0 && nr<GRID.r && nc>=0 && nc<GRID.c && maze[nr][nc]===1) {
            maze[r+dr/2][c+dc/2] = 0; genMaze(nr, nc);
        }
    });
}

class Player {
    constructor() { this.ox = 100; this.shd = false; this.spd = 5.5; }
    update() {
        let s = this.spd;
        let nx = this.x, ny = this.y;
        if (keys['w']) ny -= s; if (keys['s']) ny += s;
        if (keys['a']) nx -= s; if (keys['d']) nx += s;
        if (!isWall(nx, ny)) { this.x = nx; this.y = ny; }
        this.ox -= 0.05;
        document.getElementById('v-ox').innerText = Math.floor(this.ox);
        if (this.ox <= 0) this.die();
    }
    die() {
        let s = JSON.parse(localStorage.getItem('sm_scores') || '[]');
        s.push({name: document.getElementById('username').value, sec: sector});
        localStorage.setItem('sm_scores', JSON.stringify(s.sort((a,b)=>b.sec-a.sec).slice(0,5)));
        location.reload();
    }
}

class Enemy {
    constructor() {
        do { this.x = Math.random()*800; this.y = Math.random()*600; } while(isWall(this.x, this.y));
        this.vx = (Math.random()-0.5)*7; this.vy = (Math.random()-0.5)*7;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        if(isWall(this.x, this.y)) { this.vx *= -1; this.vy *= -1; }
        if(Math.hypot(this.x - player.x, this.y - player.y) < 22) {
            if(player.shd) { player.shd = false; this.x = -100; } else player.die();
        }
    }
}

function isWall(x, y) {
    let c = Math.floor(x/GRID.w), r = Math.floor(y/GRID.h);
    return (r<0||r>=GRID.r||c<0||c>=GRID.c||maze[r][c]===1);
}

function loop() {
    if(state === "PLAY") {
        player.update();
        enemies.forEach(e => e.update());
        bullets.forEach((b,i) => {
            b.x += 12; if(isWall(b.x, b.y)) bullets.splice(i,1);
            if(boss && Math.hypot(b.x-boss.x, b.y-boss.y) < boss.size) { boss.hp -= 2; bullets.splice(i,1); }
            enemies.forEach((e, ei) => { if(Math.hypot(b.x-e.x, b.y-e.y) < 20) { enemies.splice(ei,1); bullets.splice(i,1); }});
        });

        if(boss) {
            let dx = player.x-boss.x, dy = player.y-boss.y, d = Math.hypot(dx,dy);
            boss.x += (dx/d)*3.8; boss.y += (dy/d)*3.8;
            if(d < boss.size) player.die();
            if(boss.hp <= 0) { alert("WOOP WOOP! DIDDY DEFEATED."); location.reload(); }
        }

        if(player.x > 760 && player.y > 560) {
            if(sector === 21) UI.showLayer("YOU HAVE ENTERED THE MANSION...");
            else initSector(sector + 1);
        }
    }
    draw();
    requestAnimationFrame(loop);
}

function draw() {
    ctx.clearRect(0,0,800,600);
    ctx.fillStyle = "#0f4";
    for(let r=0; r<GRID.r; r++) for(let c=0; c<GRID.c; c++) if(maze[r][c]) ctx.fillRect(c*GRID.w, r*GRID.h, GRID.w-1, GRID.h-1);
    ctx.fillStyle = "#0cf"; ctx.fillRect(770, 570, 25, 25); 
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(player.x, player.y, 10, 0, 7); ctx.fill();
    if(player.shd) { ctx.strokeStyle="#ff0"; ctx.strokeRect(player.x-15, player.y-15, 30, 30); }
    ctx.fillStyle = "#f00";
    enemies.forEach(e => { ctx.beginPath(); ctx.arc(e.x, e.y, 12, 0, 7); ctx.fill(); });
    if(boss) {
        ctx.fillStyle = "#f00"; ctx.beginPath(); ctx.arc(boss.x, boss.y, boss.size, 0, 7); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.fillText("DADDY HP: "+boss.hp, boss.x-30, boss.y);
    }
    ctx.fillStyle = "#fff";
    bullets.forEach(b => ctx.fillRect(b.x, b.y, 8, 4));
}

window.onkeydown = e => {
    keys[e.key.toLowerCase()] = true;
    
    // Combo Tracker
    if(e.code === "Space") combo += "S";
    if(e.code === "ShiftLeft") combo += "H";
    if(combo.endsWith("SHHS")) { // Space, Shift, Shift, Space
        combo = "";
        initSector(202);
    }

    if(e.code === "Space" && state === "PLAY") bullets.push({x: player.x, y: player.y});
    if(e.code === "ShiftLeft" && state === "PLAY") { player.x += 100; player.ox -= 5; }
};
window.onkeyup = e => keys[e.key.toLowerCase()] = false;

UI.updateScores();
loop();
</script>
</body>
</html>
