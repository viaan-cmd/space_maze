<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPACE MAZE | CROSS-PLATFORM</title>
    <style>
        :root { --neon: #00ff41; --warp: #00ccff; --fire: #ff0055; }
        body { 
            background: #000; color: var(--neon); font-family: 'Courier New', monospace; 
            margin: 0; padding: 0; overflow: hidden; touch-action: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
        }

        /* MENU SYSTEM */
        #overlay {
            position: absolute; z-index: 100; background: radial-gradient(circle, #0a0a1a 0%, #000 100%);
            width: 100%; height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start; text-align: center; padding-top: 20px;
        }
        .title { font-size: 2.5rem; font-weight: bold; text-shadow: 0 0 15px var(--neon); margin-bottom: 10px; }
        
        #settings-scroll { width: 100%; max-height: 70vh; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .settings-box { background: rgba(0,255,65,0.1); border: 1px solid var(--neon); padding: 10px; border-radius: 10px; margin: 5px; width: 90%; max-width: 320px; }
        
        button {
            background: transparent; border: 2px solid var(--neon); color: var(--neon);
            padding: 8px 15px; font-size: 0.9rem; font-family: 'Courier New';
            cursor: pointer; border-radius: 5px; margin: 4px;
        }
        button.active { background: var(--neon); color: #000; box-shadow: 0 0 10px var(--neon); }
        
        .start-btn { 
            margin: 15px 0; background: var(--neon) !important; color: #000 !important; 
            font-weight: bold; width: 200px; font-size: 1.4rem; border: none; flex-shrink: 0;
        }

        /* GAMEPLAY UI */
        #game-container { position: relative; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; }
        canvas { background: #010101; border: 1px solid var(--neon); max-width: 95vw; max-height: 50vh; }
        #stats { margin-bottom: 10px; font-size: 1.1rem; text-shadow: 0 0 5px var(--neon); }

        /* MOBILE CONTROLS */
        #mobile-ui { position: absolute; bottom: 0; left: 0; width: 100%; height: 220px; display: none; pointer-events: none; }
        .side { position: absolute; bottom: 20px; pointer-events: auto; display: flex; align-items: center; justify-content: center; }
        .side-l { left: 15px; }
        .side-r { right: 15px; }

        .dpad { display: grid; grid-template-columns: repeat(3, 55px); grid-template-rows: repeat(2, 55px); gap: 8px; }
        .m-btn { width: 55px; height: 55px; border: 2px solid var(--neon); border-radius: 10px; display: flex; align-items: center; justify-content: center; background: rgba(0,255,65,0.1); font-weight: bold; font-size: 1.2rem; user-select: none; }
        .m-btn:active { background: var(--neon); color: #000; }

        .actions { display: flex; flex-direction: column; gap: 15px; }
        .act-btn { width: 75px; height: 75px; border-radius: 50%; border: 3px solid var(--fire); color: var(--fire); display: flex; align-items: center; justify-content: center; font-weight: bold; background: rgba(255,0,85,0.1); user-select: none; }
        .act-warp { border-color: var(--warp); color: var(--warp); background: rgba(0,204,255,0.1); }

        .secret-dot { position: absolute; bottom: 5px; right: 5px; opacity: 0.05; color: #fff; border: none; background: none; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="title" id="menu-title">SPACE MAZE</div>
        
        <div id="settings-scroll">
            <div class="settings-box">
                <p style="margin:0 0 5px 0">1. DEVICE</p>
                <button id="pc-mode" class="active" onclick="setDevice('pc')">DESKTOP</button>
                <button id="mo-mode" onclick="setDevice('mobile')">MOBILE</button>
            </div>

            <div id="mobile-only" style="display:none">
                <div class="settings-box">
                    <p style="margin:0 0 5px 0">2. HANDEDNESS</p>
                    <button id="l-hand" onclick="setHand('lefty')">L-MOVE</button>
                    <button id="r-hand" class="active" onclick="setHand('righty')">R-MOVE</button>
                </div>
            </div>

            <div class="settings-box" style="font-size: 0.8rem; text-align: left;">
                <b>TUTORIAL:</b><br>
                - Arrows/WASD: Move (Blocked by walls)<br>
                - <b>WARP:</b> Phase through walls (Uses 20% OX)<br>
                - <b>FIRE:</b> Auto-aim nearest enemy (Uses 8% OX)<br>
                - Reach blue sector. Oxygen drains slowly!
            </div>
        </div>

        <button class="start-btn" onclick="launch()">LAUNCH</button>
        <button class="secret-dot" onclick="alert('if u read this diddy will oil u up')">.</button>
    </div>

    <div id="game-container">
        <div id="stats">SECTOR: <span id="lvl">1</span> | OXYGEN: <span id="ox">100</span>%</div>
        <canvas id="canvas" width="800" height="600"></canvas>
        
        <div id="mobile-ui">
            <div id="move-ctrl" class="side side-r">
                <div class="dpad">
                    <div style="grid-column:2" class="m-btn" ontouchstart="keys.ArrowUp=true" ontouchend="keys.ArrowUp=false">↑</div>
                    <div class="m-btn" ontouchstart="keys.ArrowLeft=true" ontouchend="keys.ArrowLeft=false">←</div>
                    <div class="m-btn" ontouchstart="keys.ArrowDown=true" ontouchend="keys.ArrowDown=false">↓</div>
                    <div class="m-btn" ontouchstart="keys.ArrowRight=true" ontouchend="keys.ArrowRight=false">→</div>
                </div>
            </div>
            <div id="act-ctrl" class="side side-l">
                <div class="actions">
                    <div class="act-btn act-warp" ontouchstart="warp()">WARP</div>
                    <div class="act-btn" ontouchstart="fire()">FIRE</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("canvas"), ctx = canvas.getContext("2d");
        const ROWS = 13, COLS = 19, CW = 800/COLS, CH = 600/ROWS;
        let level = 1, player, enemies = [], bullets = [], maze = [], keys = {}, active = false;
        let device = 'pc', hand = 'righty';

        function setDevice(d) {
            device = d;
            document.getElementById('pc-mode').className = d==='pc'?'active':'';
            document.getElementById('mo-mode').className = d==='mobile'?'active':'';
            document.getElementById('mobile-only').style.display = d==='mobile'?'block':'none';
        }
        function setHand(h) {
            hand = h;
            document.getElementById('l-hand').className = h==='lefty'?'active':'';
            document.getElementById('r-hand').className = h==='righty'?'active':'';
        }

        function launch() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            if(device === 'mobile') {
                document.getElementById('mobile-ui').style.display = 'block';
                document.getElementById('move-ctrl').className = `side side-${hand==='righty'?'r':'l'}`;
                document.getElementById('act-ctrl').className = `side side-${hand==='righty'?'l':'r'}`;
            }
            level = 1; init(1); active = true; draw();
        }

        function init(lvl) {
            maze = Array.from({length: ROWS}, () => Array(COLS).fill(1));
            let stack = [[0,0]]; maze[0][0] = 0;
            while(stack.length > 0) {
                let [r, c] = stack[stack.length-1];
                let n = [[r-2,c],[r+2,c],[r,c-2],[r,c+2]].filter(([nr,nc]) => nr>=0 && nr<ROWS && nc>=0 && nc<COLS && maze[nr][nc]===1);
                if(n.length){ let [nr,nc] = n[Math.floor(Math.random()*n.length)]; maze[nr][nc]=0; maze[(r+nr)/2][(c+nc)/2]=0; stack.push([nr,nc]); } else stack.pop();
            }
            player = { x: CW/2, y: CH/2, ox: 100, lx: 1, ly: 0 };
            enemies = []; bullets = [];
            for(let i=0; i<Math.min(3+lvl, 15); i++) {
                let rx, ry; do { rx = Math.floor(Math.random()*COLS); ry = Math.floor(Math.random()*ROWS); } while(maze[ry][rx]===1 || (rx<3 && ry<3));
                enemies.push({ x: rx*CW+CW/2, y: ry*CH+CH/2, vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5 });
            }
        }

        function isWall(x, y) { let r = Math.floor(y/CH), c = Math.floor(x/CW); return (r<0 || r>=ROWS || c<0 || c>=COLS || maze[r][c] === 1); }

        function fire() {
            if(player.ox < 8 || enemies.length === 0) return;
            player.ox -= 8;
            let target = enemies.reduce((prev, curr) => Math.hypot(curr.x-player.x, curr.y-player.y) < Math.hypot(prev.x-player.x, prev.y-player.y) ? curr : prev);
            let angle = Math.atan2(target.y - player.y, target.x - player.x);
            bullets.push({ x: player.x, y: player.y, vx: Math.cos(angle)*12, vy: Math.sin(angle)*12 });
        }

        function warp() {
            if(player.ox < 20) return;
            player.ox -= 20;
            player.x += player.lx * 130; player.y += player.ly * 130;
            player.x = Math.max(10, Math.min(790, player.x)); player.y = Math.max(10, Math.min(590, player.y));
        }

        function gameOver(msg) {
            active = false;
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('menu-title').innerText = "FAILED";
            document.getElementById('menu-title').style.color = "var(--fire)";
            document.getElementById('settings-scroll').innerHTML = `<h2 style="color:var(--fire)">${msg}</h2><button class="start-btn" onclick="location.reload()">RETRY</button>`;
        }

        window.onkeydown = (e) => { keys[e.code] = true; if(e.code==='Space') fire(); if(e.code.includes('Shift')) warp(); };
        window.onkeyup = (e) => keys[e.code] = false;

        function update() {
            let vx = 0, vy = 0;
            if(keys.ArrowUp || keys.KeyW) vy = -4; if(keys.ArrowDown || keys.KeyS) vy = 4;
            if(keys.ArrowLeft || keys.KeyA) vx = -4; if(keys.ArrowRight || keys.KeyD) vx = 4;
            if(vx || vy) {
                player.lx = vx ? vx/4 : 0; player.ly = vy ? vy/4 : 0;
                if(!isWall(player.x + vx, player.y)) player.x += vx;
                if(!isWall(player.x, player.y + vy)) player.y += vy;
            }

            player.ox -= 0.025; // Oxygen Drain
            if(player.ox <= 0) gameOver("OXYGEN DEPLETED");

            enemies.forEach(en => {
                if(isWall(en.x+en.vx, en.y)) en.vx *= -1; else en.x += en.vx;
                if(isWall(en.x, en.y+en.vy)) en.vy *= -1; else en.y += en.vy;
                if(Math.hypot(player.x-en.x, player.y-en.y) < 20) gameOver("SHIP DESTROYED");
            });

            bullets = bullets.filter(b => {
                b.x += b.vx; b.y += b.vy;
                let hit = false;
                enemies.forEach((en, i) => { if(Math.hypot(b.x-en.x, b.y-en.y) < 18) { enemies.splice(i,1); hit = true; }});
                return !hit && !isWall(b.x, b.y);
            });

            if(player.x > 800-CW && player.y > 600-CH) {
                if(level >= 10) {
                    active = false;
                    document.getElementById('overlay').style.display = 'flex';
                    document.getElementById('menu-title').innerText = "ESCAPED!";
                    document.getElementById('settings-scroll').innerHTML = `<h3>if u read this diddy will oil u up</h3><button class="start-btn" onclick="location.reload()">AGAIN</button>`;
                } else { level++; init(level); }
            }

            document.getElementById('lvl').innerText = level;
            document.getElementById('ox').innerText = Math.max(0, Math.floor(player.ox));
        }

        function draw() {
            if(!active) return;
            ctx.clearRect(0,0,800,600);
            ctx.fillStyle = "rgba(0,255,65,0.8)";
            for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) if(maze[r][c]) ctx.fillRect(c*CW+1, r*CH+1, CW-2, CH-2);
            ctx.fillStyle = "var(--warp)"; ctx.fillRect(800-CW+5, 600-CH+5, CW-10, CH-10);
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(player.x, player.y, 10, 0, 7); ctx.fill();
            ctx.fillStyle = "var(--fire)"; enemies.forEach(en => { ctx.beginPath(); ctx.arc(en.x, en.y, 11, 0, 7); ctx.fill(); });
            ctx.fillStyle = "#ff0"; bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, 7); ctx.fill(); });
            update(); requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
