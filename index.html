<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPACE MAZE | CROSS-PLATFORM</title>
    <style>
        body { 
            background: #000; color: #00ff41; font-family: 'Courier New', monospace; 
            margin: 0; padding: 0; overflow: hidden; touch-action: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
        }
        #overlay {
            position: absolute; z-index: 100; background: radial-gradient(circle, #0a0a1a 0%, #000 100%);
            width: 100%; height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
        }
        .title { font-size: 3rem; font-weight: bold; text-shadow: 0 0 20px #00ff41; margin-bottom: 20px; }
        .settings-box { background: rgba(0,255,65,0.1); border: 1px solid #00ff41; padding: 15px; border-radius: 10px; margin: 10px; width: 300px; }
        
        button {
            background: transparent; border: 2px solid #00ff41; color: #00ff41;
            padding: 10px 20px; font-size: 1rem; font-family: 'Courier New';
            cursor: pointer; transition: 0.3s; border-radius: 5px; margin: 5px;
        }
        button.active { background: #00ff41; color: #000; box-shadow: 0 0 10px #00ff41; }
        .start-btn { margin-top: 20px; background: #00ff41 !important; color: #000 !important; font-weight: bold; width: 200px; font-size: 1.5rem; }

        /* MOBILE UI */
        #mobile-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; pointer-events: none; z-index: 50; }
        .control-side { position: absolute; bottom: 40px; width: 180px; height: 250px; pointer-events: auto; display: flex; align-items: center; justify-content: center; }
        .side-left { left: 20px; }
        .side-right { right: 20px; }

        /* JOYSTICK & DPAD */
        #joy-base { width: 120px; height: 120px; background: rgba(0,255,65,0.1); border: 2px solid #00ff41; border-radius: 50%; position: relative; display: none; }
        #joy-stick { width: 50px; height: 50px; background: #00ff41; border-radius: 50%; position: absolute; top: 35px; left: 35px; box-shadow: 0 0 15px #00ff41; }
        #dpad { display: grid; grid-template-columns: repeat(3, 55px); grid-template-rows: repeat(2, 55px); gap: 5px; }
        .m-btn { width: 55px; height: 55px; border: 2px solid #00ff41; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #00ff41; font-weight: bold; background: rgba(0,255,65,0.1); font-size: 1.5rem; }
        .m-btn:active { background: #00ff41; color: #000; }

        /* ACTIONS */
        .action-btns { display: flex; flex-direction: column; gap: 25px; align-items: center; }
        .act-btn { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #f05; color: #f05; display: flex; align-items: center; justify-content: center; font-weight: bold; background: rgba(255,0,85,0.1); }
        .dash-btn { border-color: #0cf; color: #0cf; background: rgba(0,204,255,0.1); }

        #game-container { position: relative; width: 100%; height: 100%; display: none; align-items: center; justify-content: center; }
        canvas { background: #010101; border: 1px solid #00ff41; max-width: 95vw; max-height: 55vh; }
        #stats { position: absolute; top: 15px; font-size: 1.2rem; width: 100%; text-align: center; color: #00ff41; text-shadow: 0 0 5px #00ff41; }
        
        .secret-msg { position: absolute; bottom: 5px; right: 5px; width: 10px; height: 10px; background: #00ff41; border-radius: 50%; opacity: 0.2; cursor: pointer; }
        .tut-box { font-size: 0.8rem; margin-top: 10px; color: #0cf; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="title" id="menu-title">SPACE MAZE</div>
        
        <div id="settings-area">
            <div class="settings-box">
                <p>1. CHOOSE DEVICE</p>
                <button id="dev-pc" class="active" onclick="setDevice('pc')">DESKTOP</button>
                <button id="dev-mo" onclick="setDevice('mobile')">MOBILE</button>
            </div>

            <div id="mobile-options" style="display:none;">
                <div class="settings-box">
                    <p>2. MOVEMENT STYLE</p>
                    <button id="btn-joy" onclick="setControl('joy')">JOYSTICK</button>
                    <button id="btn-dpad" class="active" onclick="setControl('dpad')">ARROWS</button>
                </div>
                <div class="settings-box">
                    <p>3. HANDEDNESS</p>
                    <button id="btn-lefty" onclick="setHand('lefty')">L-MOVE</button>
                    <button id="btn-righty" class="active" onclick="setHand('righty')">R-MOVE</button>
                </div>
            </div>

            <div class="tut-box">
                TUTORIAL: Move to blue portal. Walls block you.<br>
                <b>WARP</b> (Shift): Phase through walls. <b>FIRE</b> (Space): Auto-aim.<br>
                Don't let OXYGEN hit 0 or you die!
            </div>
        </div>

        <button class="start-btn" id="main-btn" onclick="launch()">LAUNCH</button>
        <div class="secret-msg" onclick="alert('if u read this diddy will oil u up')"></div>
    </div>

    <div id="game-container">
        <div id="stats">SECTOR: <span id="lvl">1</span> | OXYGEN: <span id="ox">100</span>%</div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="mobile-ui">
            <div id="move-zone" class="control-side side-right">
                <div id="joy-base"><div id="joy-stick"></div></div>
                <div id="dpad">
                    <div style="grid-column:2" class="m-btn" ontouchstart="keys.ArrowUp=true" ontouchend="keys.ArrowUp=false">↑</div>
                    <div class="m-btn" ontouchstart="keys.ArrowLeft=true" ontouchend="keys.ArrowLeft=false">←</div>
                    <div class="m-btn" ontouchstart="keys.ArrowDown=true" ontouchend="keys.ArrowDown=false">↓</div>
                    <div class="m-btn" ontouchstart="keys.ArrowRight=true" ontouchend="keys.ArrowRight=false">→</div>
                </div>
            </div>
            <div id="action-zone" class="control-side side-left">
                <div class="action-btns">
                    <div class="act-btn dash-btn" ontouchstart="dash()">WARP</div>
                    <div class="act-btn fire-btn" ontouchstart="shoot()">FIRE</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const ROWS = 13, COLS = 19, CELL_W = 800/COLS, CELL_H = 600/ROWS;
        let currentLevel = 1, player, enemies, maze, bullets, keys = {}, gameActive = false;
        let deviceType = 'pc', controlType = 'dpad', handMode = 'righty';

        function setDevice(d) {
            deviceType = d;
            document.getElementById('dev-pc').className = d==='pc'?'active':'';
            document.getElementById('dev-mo').className = d==='mobile'?'active':'';
            document.getElementById('mobile-options').style.display = d==='mobile'?'block':'none';
        }
        function setControl(t) { controlType = t; document.getElementById('btn-joy').className = t==='joy'?'active':''; document.getElementById('btn-dpad').className = t==='dpad'?'active':''; }
        function setHand(h) { handMode = h; document.getElementById('btn-lefty').className = h==='lefty'?'active':''; document.getElementById('btn-righty').className = h==='righty'?'active':''; }

        function launch() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            if(deviceType === 'mobile') {
                document.getElementById('mobile-ui').style.display = 'block';
                document.getElementById('move-zone').className = `control-side side-${handMode==='righty'?'right':'left'}`;
                document.getElementById('action-zone').className = `control-side side-${handMode==='righty'?'left':'right'}`;
                document.getElementById('joy-base').style.display = controlType==='joy'?'block':'none';
                document.getElementById('dpad').style.display = controlType==='dpad'?'grid':'none';
                if(controlType === 'joy') initJoystick();
            }
            gameActive = true; 
            currentLevel = 1;
            initLevel(currentLevel); 
            draw();
        }

        function initJoystick() {
            const base = document.getElementById('joy-base'), stick = document.getElementById('joy-stick');
            base.ontouchmove = (e) => {
                const rect = base.getBoundingClientRect();
                const dx = e.touches[0].clientX - (rect.left + 60), dy = e.touches[0].clientY - (rect.top + 60);
                const dist = Math.min(40, Math.hypot(dx, dy)), angle = Math.atan2(dy, dx);
                stick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
                keys.ArrowLeft = dx < -15; keys.ArrowRight = dx > 15; keys.ArrowUp = dy < -15; keys.ArrowDown = dy > 15;
            };
            base.ontouchend = () => { stick.style.transform = ''; keys = {}; };
        }

        function initLevel(lvl) {
            maze = Array.from({ length: ROWS }, () => Array(COLS).fill(1));
            let stack = [[0, 0]]; maze[0][0] = 0;
            while (stack.length > 0) {
                let [r, c] = stack[stack.length - 1];
                let n = [[r-2, c], [r+2, c], [r, c-2], [r, c+2]].filter(([nr, nc]) => nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && maze[nr][nc] === 1);
                if (n.length > 0) { let [nr, nc] = n[Math.floor(Math.random()*n.length)]; maze[nr][nc] = 0; maze[(r+nr)/2][(c+nc)/2] = 0; stack.push([nr, nc]); } else stack.pop();
            }
            player = { x: CELL_W/2, y: CELL_H/2, r: 10, speed: 4, ox: 100, dir: {x: 1, y: 0} };
            bullets = []; enemies = [];
            for(let i=0; i<Math.min(3 + lvl, 15); i++) {
                let rx, ry; do { rx = Math.floor(Math.random()*COLS); ry = Math.floor(Math.random()*ROWS); } while(maze[ry][rx] === 1 || (rx < 3 && ry < 3));
                enemies.push({ x: rx*CELL_W + CELL_W/2, y: ry*CELL_H + CELL_H/2, dx: (Math.random()-0.5)*4, dy: (Math.random()-0.5)*4 });
            }
        }

        window.addEventListener("keydown", e => { keys[e.code] = true; if(e.code === "Space") shoot(); if(e.code.includes("Shift")) dash(); });
        window.addEventListener("keyup", e => keys[e.code] = false);

        // AUTO-AIM FIRE
        function shoot() { 
            if (player.ox >= 8 && enemies.length > 0) { 
                let nearest = enemies[0];
                let minDist = Math.hypot(nearest.x - player.x, nearest.y - player.y);
                enemies.forEach(en => {
                    let d = Math.hypot(en.x - player.x, en.y - player.y);
                    if (d < minDist) { minDist = d; nearest = en; }
                });
                let angle = Math.atan2(nearest.y - player.y, nearest.x - player.x);
                bullets.push({x: player.x, y: player.y, dx: Math.cos(angle)*12, dy: Math.sin(angle)*12}); 
                player.ox -= 8; 
            } 
        }

        // WARP (PHASE THROUGH WALLS)
        function dash() { 
            if (player.ox >= 20) { 
                player.x += (player.dir.x * 100); 
                player.y += (player.dir.y * 100); 
                player.ox -= 20; 
                // Boundary check
                player.x = Math.max(10, Math.min(790, player.x));
                player.y = Math.max(10, Math.min(590, player.y));
            } 
        }

        function isWall(x, y) { let r = Math.floor(y/CELL_H), c = Math.floor(x/CELL_W); return (r<0 || r>=ROWS || c<0 || c>=COLS || maze[r][c] === 1); }

        function gameOver(win) {
            gameActive = false;
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('settings-area').style.display = 'none';
            if(win) {
                document.getElementById('menu-title').innerText = "MISSION COMPLETE";
                document.getElementById('menu-title').style.color = "#0cf";
                document.getElementById('main-btn').innerText = "if u read this diddy will oil u up";
                document.getElementById('main-btn').onclick = () => location.reload();
            } else {
                document.getElementById('menu-title').innerText = "MISSION FAILED (DEAD)";
                document.getElementById('menu-title').style.color = "#f05";
                document.getElementById('main-btn').innerText = "RETRY";
                document.getElementById('main-btn').onclick = () => location.reload();
            }
        }

        function update() {
            let mx = 0, my = 0;
            if (keys.ArrowUp || keys.KeyW) my = -1; 
            if (keys.ArrowDown || keys.KeyS) my = 1; 
            if (keys.ArrowLeft || keys.KeyA) mx = -1; 
            if (keys.ArrowRight || keys.KeyD) mx = 1;
            
            if (mx || my) { 
                player.dir = {x: mx||player.dir.x, y: my||player.dir.y}; 
                // Normal move BLOCKED by walls
                if (!isWall(player.x+mx*4, player.y)) player.x+=mx*4; 
                if (!isWall(player.x, player.y+my*4)) player.y+=my*4; 
            }

            enemies.forEach(en => { 
                if (isWall(en.x + en.dx, en.y)) en.dx *= -1; else en.x += en.dx; 
                if (isWall(en.x, en.y + en.dy)) en.dy *= -1; else en.y += en.dy; 
                if (Math.hypot(player.x-en.x, player.y-en.y) < 20) gameOver(false); 
            });

            bullets = bullets.filter(b => { 
                b.x += b.dx; b.y += b.dy; 
                let hit = false;
                enemies.forEach((en, i) => { if (Math.hypot(b.x-en.x, b.y-en.y) < 15) { enemies.splice(i, 1); hit = true; }}); 
                return !hit && !isWall(b.x, b.y); 
            });

            if (player.x > 800-CELL_W && player.y > 600-CELL_H) { 
                if(currentLevel >= 10) gameOver(true);
                else { currentLevel++; initLevel(currentLevel); }
            }

            // OXYGEN DRAIN (1 tick per 5 seconds approx at 60fps)
            player.ox -= 0.04; 
            if (player.ox <= 0) gameOver(false);

            document.getElementById("ox").innerText = Math.max(0, Math.floor(player.ox)); 
            document.getElementById("lvl").innerText = currentLevel;
        }

        function draw() { 
            if(!gameActive) return; 
            ctx.clearRect(0,0,800,600); 
            ctx.fillStyle="#00ff41"; 
            for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) if(maze[r][c]) ctx.fillRect(c*CELL_W+1, r*CELL_H+1, CELL_W-2, CELL_H-2); 
            ctx.fillStyle="#0cf"; ctx.fillRect(800-CELL_W+5, 600-CELL_H+5, CELL_W-10, CELL_H-10); 
            ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(player.x,player.y,10,0,7); ctx.fill(); 
            ctx.fillStyle="#f05"; enemies.forEach(en=>{ctx.beginPath(); ctx.arc(en.x,en.y,11,0,7); ctx.fill();}); 
            ctx.fillStyle="#ff0"; bullets.forEach(b=>{ctx.beginPath(); ctx.arc(b.x,b.y,4,0,7); ctx.fill();}); 
            update(); requestAnimationFrame(draw); 
        }
    </script>
</body>
</html>
