<!DOCTYPE html>
<html>
<head>
    <title>SPACE MAZE: THE ULTIMATE LEGACY</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { background: #000; color: #0f4; font-family: monospace; margin: 0; overflow: hidden; touch-action: none; }
        #ui-layer { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.95); z-index: 100; }
        canvas { background: #000; display: block; margin: auto; border: 2px solid #333; }
        #hud { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; font-size: 18px; pointer-events: none; z-index: 50; text-shadow: 2px 2px #000; }
        input { background: #000; color: #0f4; border: 1px solid #0f4; padding: 10px; margin: 10px; text-align: center; font-family: monospace; font-size: 1.2rem; }
        button { background: #000; color: #0f4; border: 2px solid #0f4; padding: 15px 30px; cursor: pointer; font-family: monospace; font-weight: bold; font-size: 1.2rem; }
        #joy-base { position: absolute; bottom: 50px; left: 50px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border: 2px solid #333; border-radius: 50%; display: none; }
        #joy-stick { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: #0f4; border-radius: 50%; }
        #shoot-btn { position: absolute; bottom: 50px; right: 50px; width: 90px; height: 90px; background: rgba(255,0,0,0.2); border: 3px solid #f00; border-radius: 50%; display: none; color: #f00; text-align: center; line-height: 90px; font-weight: bold; }
    </style>
</head>
<body>

<div id="hud">
    <div>SEC: <span id="v-sec">1</span></div>
    <div>USER: <span id="v-user">---</span></div>
    <div>O2: <span id="v-ox">100</span>%</div>
</div>

<div id="ui-layer">
    <h1 id="ui-title" style="font-size: 50px; margin: 10px;">SPACE MAZE</h1>
    <div id="cutscene-text" style="max-width: 80%; margin-bottom: 20px; color: #fff; line-height: 1.5;"></div>
    <input type="text" id="username" placeholder="IDENT_NAME">
    <button onclick="preStart()">INITIALIZE SYSTEM</button>
    <div id="leaderboard" style="margin-top: 25px; font-size: 16px; color: #0cf;"></div>
</div>

<div id="joy-base"><div id="joy-stick"></div></div>
<div id="shoot-btn">FIRE</div>

<canvas id="g" width="800" height="600"></canvas>

<script>
const cvs = document.getElementById('g');
const ctx = cvs.getContext('2d');
const MAP = { r: 13, c: 19, w: 800/19, h: 600/13 };

let sector = 1, player, enemies = [], bullets = [], items = [], maze = [], boss = null, keys = {}, combo = "";
let user = "", joy = { active: false, x: 0, y: 0 };

function preStart() {
    user = document.getElementById('username').value || "PILOT_01";
    document.getElementById('v-user').innerText = user;
    document.getElementById('username').style.display = 'none';
    document.getElementById('ui-title').innerText = "ORIGIN STORY";
    document.getElementById('cutscene-text').innerHTML = "The Sphere is the ancient neural core.<br>Diddy has corrupted the system and retreated to the Mansion.<br>Sector 21 is the gateway to the Unknown.<br>Sector 202 is the Final Battle ground.";
    document.querySelector('button').onclick = start;
}

function start() {
    document.getElementById('ui-layer').style.display = 'none';
    if ("ontouchstart" in window || navigator.maxTouchPoints > 0) {
        document.getElementById('joy-base').style.display = 'block';
        document.getElementById('shoot-btn').style.display = 'block';
    }
    init(1);
    updateLeaderboard();
    loop();
}

function init(n) {
    sector = n;
    enemies = []; bullets = []; boss = null; items = [];
    maze = Array.from({length: MAP.r}, () => Array(MAP.c).fill(1));

    if (n === 202) {
        maze = maze.map(r => r.fill(0));
        boss = { x: 400, y: 300, hp: 150, size: 70 };
    } else if (n === "?") {
        maze = maze.map(r => r.fill(0));
        setTimeout(() => { alert("DIDDY: 'I see you... See you at Sector 202.'"); init(22); }, 10000);
    } else {
        genMaze(0, 0);
        for(let i=0; i<Math.min(4+n, 20); i++) enemies.push(new Enemy());
        
        // Spawning Power-ups
        let types = ['shd', 'ox', 'spd', 'rpd'];
        for(let i=0; i<4; i++) {
            items.push({ x: Math.random()*700+50, y: Math.random()*500+50, type: types[i] });
        }
    }

    if (!player) player = { x: 25, y: 25, ox: 100, shd: false, spd: 5.5, rpd: false };
    player.x = 25; player.y = 25;
    player.spd = 5.5; // Reset speed each sector
    document.getElementById('v-sec').innerText = sector;
}

function genMaze(r, c) {
    maze[r][c] = 0;
    let ds = [[0,2],[0,-2],[2,0],[-2,0]].sort(() => Math.random() - 0.5);
    ds.forEach(([dr, dc]) => {
        let nr = r+dr, nc = c+dc;
        if (nr>=0 && nr<MAP.r && nc>=0 && nc<MAP.c && maze[nr][nc]===1) {
            maze[r+dr/2][c+dc/2] = 0; genMaze(nr, nc);
        }
    });
}

class Enemy {
    constructor() {
        this.x = Math.random()*700+50; this.y = Math.random()*500+50;
        this.vx = (Math.random()-0.5)*7; this.vy = (Math.random()-0.5)*7;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        if(isW(this.x, this.y)) { this.vx *= -1; this.vy *= -1; }
        if(Math.hypot(this.x - player.x, this.y - player.y) < 22) {
            if(player.shd) { player.shd = false; this.x = -500; }
            else die();
        }
    }
}

function isW(x, y) {
    let c = Math.floor(x/MAP.w), r = Math.floor(y/MAP.h);
    return (r<0||r>=MAP.r||c<0||c>=MAP.c||maze[r][c]===1);
}

function die() {
    let scores = JSON.parse(localStorage.getItem('mz_legacy_scores') || '[]');
    scores.push({name: user, sec: sector});
    localStorage.setItem('mz_legacy_scores', JSON.stringify(scores.sort((a,b)=>b.sec-a.sec).slice(0,5)));
    location.reload();
}

function updateLeaderboard() {
    let scores = JSON.parse(localStorage.getItem('mz_legacy_scores') || '[]');
    document.getElementById('leaderboard').innerHTML = "HALL OF FAME:<br>" + scores.map(s => `${s.name}: S${s.sec}`).join(' | ');
}

function shoot() {
    bullets.push({x: player.x, y: player.y});
    if(player.rpd) { // Rapid fire extra bullets
        bullets.push({x: player.x, y: player.y-10});
        bullets.push({x: player.x, y: player.y+10});
    }
}

function loop() {
    let s = player.spd;
    let mx = 0, my = 0;
    if (keys['w']) my = -s; if (keys['s']) my = s;
    if (keys['a']) mx = -s; if (keys['d']) mx = s;
    if (joy.active) { mx = joy.x * s; my = joy.y * s; }
    if (!isW(player.x + mx, player.y + my)) { player.x += mx; player.y += my; }

    player.ox -= 0.045;
    document.getElementById('v-ox').innerText = Math.floor(player.ox);
    if(player.ox <= 0) die();

    enemies.forEach(e => e.update());
    
    // Items
    items.forEach((p, i) => {
        if (Math.hypot(p.x - player.x, p.y - player.y) < 25) {
            if (p.type === 'shd') player.shd = true;
            if (p.type === 'ox') player.ox = 100;
            if (p.type === 'spd') player.spd = 9;
            if (p.type === 'rpd') player.rpd = true;
            items.splice(i, 1);
        }
    });

    if(boss) {
        let dx = player.x-boss.x, dy = player.y-boss.y, d = Math.hypot(dx,dy);
        boss.x += (dx/d)*3.8; boss.y += (dy/d)*3.8;
        if(d < 50) die();
        if(boss.hp <= 0) { alert("DIDDY DEFEATED! YOU WIN!"); die(); }
    }

    bullets.forEach((b, i) => {
        b.x += 12;
        if(isW(b.x, b.y)) bullets.splice(i,1);
        enemies.forEach((e, ei) => {
            if(Math.hypot(b.x-e.x, b.y-e.y) < 22) { enemies.splice(ei, 1); bullets.splice(i, 1); }
        });
        if(boss && Math.hypot(b.x-boss.x, b.y-boss.y) < boss.size) { boss.hp -= 2; bullets.splice(i, 1); }
    });

    if(player.x > 750 && player.y > 550) {
        if(sector === 21) init("?"); else init(sector + 1);
    }
    draw();
    requestAnimationFrame(loop);
}

function draw() {
    ctx.clearRect(0,0,800,600);
    ctx.fillStyle = "#0f4";
    for(let r=0; r<MAP.r; r++) for(let c=0; c<MAP.c; c++) if(maze[r][c]) ctx.fillRect(c*MAP.w, r*MAP.h, MAP.w-1, MAP.h-1);
    ctx.fillStyle = "#0cf"; ctx.fillRect(765, 565, 30, 30);
    
    items.forEach(p => {
        ctx.fillStyle = (p.type==='shd')?'#ff0':(p.type==='ox')?'#0cf':(p.type==='spd')?'#00f':'#f0f';
        ctx.fillRect(p.x-10, p.y-10, 20, 20);
    });

    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(player.x, player.y, 10, 0, 7); ctx.fill();
    if(player.shd) { ctx.strokeStyle="#ff0"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(player.x,player.y,16,0,7); ctx.stroke(); }

    ctx.fillStyle = "#f00";
    enemies.forEach(e => { ctx.beginPath(); ctx.arc(e.x, e.y, 12, 0, 7); ctx.fill(); });
    
    if(boss) {
        ctx.beginPath(); ctx.arc(boss.x, boss.y, boss.size, 0, 7); ctx.fill();
        ctx.fillStyle="#fff"; ctx.fillText("BOSS HP: "+boss.hp, boss.x-30, boss.y-boss.size-10);
    }
    ctx.fillStyle = "#fff";
    bullets.forEach(b => ctx.fillRect(b.x, b.y, 10, 4));
}

window.onkeydown = e => {
    keys[e.key.toLowerCase()] = true;
    if(e.code === 'Space') { combo += "S"; shoot(); }
    if(e.code === 'ShiftLeft') { combo += "H"; player.x += 100; player.ox -= 2; }
    if(combo.endsWith("SHHS")) { combo = ""; init(202); }
};
window.onkeyup = e => keys[e.key.toLowerCase()] = false;

const jBase = document.getElementById('joy-base'), jStick = document.getElementById('joy-stick');
jBase.addEventListener('touchstart', e => { joy.active = true; });
jBase.addEventListener('touchmove', e => {
    e.preventDefault(); let t = e.touches[0], rect = jBase.getBoundingClientRect();
    let dx = t.clientX - (rect.left + 50), dy = t.clientY - (rect.top + 50);
    let dist = Math.min(Math.hypot(dx, dy), 40), angle = Math.atan2(dy, dx);
    joy.x = (Math.cos(angle) * dist) / 40; joy.y = (Math.sin(angle) * dist) / 40;
    jStick.style.transform = `translate(${joy.x*40}px, ${joy.y*40}px)`;
});
jBase.addEventListener('touchend', () => { joy.active = false; joy.x = 0; joy.y = 0; jStick.style.transform = 'translate(0,0)'; });
document.getElementById('shoot-btn').addEventListener('touchstart', (e) => { e.preventDefault(); shoot(); });

updateLeaderboard();
</script>
</body>
</html>
