<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPACE MAZE | DEFINITIVE</title>
    <style>
        :root { --neon: #00ff41; --warp: #0cf; --danger: #f05; --gold: #ffd700; --diddy: #a020f0; --bg: #000; }
        * { box-sizing: border-box; user-select: none; touch-action: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; }
        .layer { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); }
        #game-layer { display: none; background: radial-gradient(circle, #111, #000); }
        #hud { position: absolute; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; font-size: 1.1rem; z-index: 100; pointer-events: none; text-shadow: 0 0 8px var(--neon); }
        .boss-ui { position: absolute; bottom: 120px; width: 340px; height: 22px; border: 2px solid var(--gold); background: #000; display: none; z-index: 100; overflow: hidden; }
        #boss-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #f00, #ff0); transition: width 0.1s; }
        .menu-card { background: rgba(0, 255, 65, 0.03); border: 1px solid var(--neon); padding: 25px; border-radius: 12px; width: 320px; margin: 10px; text-align: center; }
        .btn { background: transparent; border: 2px solid var(--neon); color: var(--neon); padding: 12px; margin: 6px; cursor: pointer; border-radius: 6px; font-weight: bold; font-family: inherit; width: 100%; }
        .btn:active, .btn.active { background: var(--neon); color: #000; }
        #mobile-controls { position: absolute; inset: 0; pointer-events: none; display: none; }
        .zone { position: absolute; bottom: 25px; width: 220px; height: 220px; pointer-events: auto; }
        .right { right: 20px; } .left { left: 20px; }
        #j-base { width: 110px; height: 110px; border: 2px solid var(--neon); border-radius: 50%; margin: 55px auto; position: relative; background: rgba(0,255,65,0.1); }
        #j-knob { width: 40px; height: 40px; background: var(--neon); border-radius: 50%; position: absolute; top: 35px; left: 35px; }
        .act-btn { width: 85px; height: 85px; border-radius: 50%; border: 4px solid var(--warp); color: var(--warp); display: flex; align-items: center; justify-content: center; font-weight: bold; margin: 12px; pointer-events: auto; }
    </style>
</head>
<body>

    <div id="ui-layer" class="layer">
        <h1 style="font-size: 2.5rem; letter-spacing: 5px;">SPACE MAZE</h1>
        <div class="menu-card">
            <button class="btn" onclick="Core.boot(false)">NEW MISSION</button>
            <button class="btn" id="res-btn" style="display:none; border-color:var(--gold); color:var(--gold);" onclick="Core.boot(true)">RESUME SECTOR</button>
        </div>
        <div class="menu-card">
            <button class="btn active" id="p-pc" onclick="UI.setDev('pc')">PC</button>
            <button class="btn" id="p-mo" onclick="UI.setDev('mobile')">MOBILE</button>
        </div>
    </div>

    <div id="game-layer" class="layer">
        <div id="hud">
            <div>SEC: <span id="val-sec">1</span></div>
            <div>OX: <span id="val-ox">100</span>%</div>
        </div>
        <canvas id="stage"></canvas>
        <div class="boss-ui" id="boss-hud"><div id="boss-bar"></div></div>
        
        <div id="mobile-controls">
            <div id="move-zone" class="zone right"><div id="j-base"><div id="j-knob"></div></div></div>
            <div id="act-zone" class="zone left">
                <div class="act-btn" ontouchstart="Core.player.warp()">WARP</div>
                <div class="act-btn" style="border-color:var(--danger); color:var(--danger)" ontouchstart="Core.player.shoot()">FIRE</div>
            </div>
        </div>
    </div>

    <script>
        const MAP = { W:800, H:600, R:13, C:19, TW:800/19, TH:600/13 };
        
        const Core = {
            sector: 1, active: false, entities: [], keys: {}, state: "PLAY",
            boot(resume) {
                this.ctx = document.getElementById('stage').getContext('2d');
                document.getElementById('stage').width = MAP.W;
                document.getElementById('stage').height = MAP.H;
                document.getElementById('ui-layer').style.display = 'none';
                document.getElementById('game-layer').style.display = 'flex';
                this.init(resume ? (parseInt(localStorage.getItem('sm_save')) || 1) : 1);
                this.run();
            },
            init(n) {
                if (n > 202) return; // Critical Check
                this.sector = n; this.active = true; this.entities = []; this.state = "PLAY";
                localStorage.setItem('sm_save', n);
                this.maze = this.createMaze();
                this.player = new Player(MAP.TW/2, MAP.TH/2);
                document.getElementById('val-sec').innerText = n;
                document.getElementById('boss-hud').style.display = (n===202) ? 'block' : 'none';
                
                if(n === 21) this.entities.push(new Invite(160,160), new Invite(640,160), new Invite(400,480));
                if(n === 202) this.entities.push(new Boss(400, 300));
                else if(n !== 21) {
                    for(let i=0; i<Math.min(3+n/12, 14); i++) this.entities.push(new Enemy());
                }
            },
            createMaze() {
                let m = Array.from({length:MAP.R},()=>Array(MAP.C).fill(1));
                let s = [[0,0]]; m[0][0] = 0;
                while(s.length) {
                    let [r,c] = s[s.length-1];
                    let ns = [[r-2,c],[r+2,c],[r,c-2],[r,c+2]].filter(([nr,nc])=>nr>=0&&nr<MAP.R&&nc>=0&&nc<MAP.C&&m[nr][nc]===1);
                    if(ns.length) { let [nr,nc] = ns[Math.floor(Math.random()*ns.length)]; m[nr][nc]=0; m[(r+nr)/2][(c+nc)/2]=0; s.push([nr,nc]); } else s.pop();
                }
                return m;
            },
            run() { if(this.active) { this.update(); this.draw(); } requestAnimationFrame(() => this.run()); },
            update() {
                if(this.state === "WIN") return;
                this.player.tick();
                this.entities.forEach((e,i) => { e.tick(); if(e.dead) this.entities.splice(i,1); });
                
                // Winning/Level Exit Logic
                if(this.player.x > MAP.W-45 && this.player.y > MAP.H-45) {
                    if(this.sector === 21 && this.player.invites < 3) return;
                    
                    if(this.sector === 202) {
                        if(this.entities.length === 0) { this.state = "WIN"; return; }
                        else return; 
                    }
                    
                    this.init(this.sector + 1);
                }
            },
            draw() {
                this.ctx.clearRect(0,0,MAP.W,MAP.H);
                if(this.state === "WIN") {
                    this.ctx.fillStyle = "gold"; this.ctx.textAlign = "center";
                    this.ctx.font = "40px Courier New"; this.ctx.fillText("MISSION COMPLETE", 400, 300);
                    this.ctx.font = "20px Courier New"; this.ctx.fillText("YOU SURVIVED THE 202 SECTORS", 400, 350);
                    return;
                }
                this.ctx.fillStyle = (this.sector===21) ? "#1a001a" : "#00ff41";
                for(let r=0;r<MAP.R;r++) for(let c=0;c<MAP.C;c++) if(this.maze[r][c]) this.ctx.fillRect(c*MAP.TW, r*MAP.TH, MAP.TW-1, MAP.TH-1);
                this.ctx.fillStyle = (this.sector===21 && this.player.invites < 3) ? "#222" : "#0cf";
                this.ctx.fillRect(MAP.W-MAP.TW, MAP.H-MAP.TH, MAP.TW, MAP.TH);
                this.entities.forEach(e => e.draw(this.ctx));
                this.player.draw(this.ctx);
            }
        };

        class Player {
            constructor(x,y) { this.x=x; this.y=y; this.ox=100; this.invites=0; this.trail=[]; }
            tick() {
                let mx=0, my=0;
                if(Core.keys.ArrowUp || Core.keys.KeyW) my=-1;
                if(Core.keys.ArrowDown || Core.keys.KeyS) my=1;
                if(Core.keys.ArrowLeft || Core.keys.KeyA) mx=-1;
                if(Core.keys.ArrowRight || Core.keys.KeyD) mx=1;
                if(joyOn) { mx=joyV.x; my=joyV.y; }
                if(mx||my) {
                    let nx=this.x+mx*5, ny=this.y+my*5;
                    if(!this.isW(nx, ny)) { this.x=nx; this.y=ny; }
                }
                this.ox-=0.02; if(this.ox<=0) Core.init(Core.sector);
                document.getElementById('val-ox').innerText = Math.floor(this.ox);
                this.trail.push({x:this.x, y:this.y}); if(this.trail.length > 10) this.trail.shift();
            }
            isW(x,y) { let c=Math.floor(x/MAP.TW), r=Math.floor(y/MAP.TH); return r<0||r>=MAP.R||c<0||c>=MAP.C||Core.maze[r][c]===1; }
            draw(ctx) {
                this.trail.forEach((t, i) => { ctx.fillStyle = `rgba(255,255,255,${i/10})`; ctx.beginPath(); ctx.arc(t.x, t.y, 8, 0, Math.PI*2); ctx.fill(); });
                ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(this.x,this.y,10,0,Math.PI*2); ctx.fill();
            }
            shoot() { if(this.ox>5) { Core.entities.push(new Bullet(this.x,this.y)); this.ox-=5; } }
            warp() { if(this.ox>15) { let dx=(Core.keys.ArrowRight?1:Core.keys.ArrowLeft?-1:0), dy=(Core.keys.ArrowDown?1:Core.keys.ArrowUp?-1:0); if(dx===0&&dy===0)dx=1; let nx=this.x+dx*140, ny=this.y+dy*140; if(!this.isW(nx,ny)){this.x=nx;this.y=ny;this.ox-=15;} } }
        }

        class Boss {
            constructor(x,y) { this.x=x; this.y=y; this.hp=10; this.vx=4.5; this.vy=4.5; this.isBoss=true; this.rad=45; }
            tick() {
                let nx=this.x+this.vx, ny=this.y+this.vy;
                if(this.hitW(nx, this.y)) this.vx*=-1; else this.x=nx;
                if(this.hitW(this.x, ny)) this.vy*=-1; else this.y=ny;
                document.getElementById('boss-bar').style.width = (this.hp*10)+"%";
                if(Math.hypot(Core.player.x-this.x, Core.player.y-this.y) < this.rad) Core.init(Core.sector);
            }
            hitW(nx,ny) { return [{x:nx-this.rad,y:ny},{x:nx+this.rad,y:ny},{x:nx,y:ny-this.rad},{x:nx,y:ny+this.rad}].some(p=>Core.player.isW(p.x,p.y)); }
            draw(ctx) { ctx.fillStyle="#a020f0"; ctx.beginPath(); ctx.arc(this.x,this.y,this.rad,0,Math.PI*2); ctx.fill(); ctx.strokeStyle="#fff"; ctx.lineWidth=4; ctx.stroke(); }
        }

        class Enemy {
            constructor() { let rx,ry; do{rx=Math.random()*700+50;ry=Math.random()*500+50;}while(Core.player.isW(rx,ry)); this.x=rx; this.y=ry; this.vx=(Math.random()-0.5)*5; this.vy=(Math.random()-0.5)*5; }
            tick() { this.x+=this.vx; this.y+=this.vy; if(Core.player.isW(this.x,this.y)){this.vx*=-1;this.vy*=-1;} if(Math.hypot(Core.player.x-this.x, Core.player.y-this.y)<18) Core.init(Core.sector); }
            draw(ctx) { ctx.fillStyle="#f05"; ctx.beginPath(); ctx.arc(this.x,this.y,12,0,Math.PI*2); ctx.fill(); }
        }

        class Bullet {
            constructor(x,y) { this.x=x; this.y=y; let target=Core.entities[0]||{x:800,y:600}; let ang=Math.atan2(target.y-y,target.x-x); this.vx=Math.cos(ang)*15; this.vy=Math.sin(ang)*15; }
            tick() { this.x+=this.vx; this.y+=this.vy; if(Core.player.isW(this.x,this.y)) this.dead=true; Core.entities.forEach(en=>{ if(Math.hypot(this.x-en.x,this.y-en.y)<(en.isBoss?45:25)){ if(en.isBoss)en.hp--; else en.dead=true; if(en.hp<=0)en.dead=true; this.dead=true; } }); }
            draw(ctx) { ctx.fillStyle="#ff0"; ctx.beginPath(); ctx.arc(this.x,this.y,6,0,Math.PI*2); ctx.fill(); }
        }

        class Invite { constructor(x,y) { this.x=x; this.y=y; } tick() { if(Math.hypot(Core.player.x-this.x, Core.player.y-this.y)<30){ Core.player.invites++; this.dead=true; } } draw(ctx) { ctx.fillStyle="#ffd700"; ctx.beginPath(); ctx.arc(this.x,this.y,15,0,Math.PI*2); ctx.fill(); } }

        window.onkeydown=e=>{ Core.keys[e.code]=true; if(e.code==="Space") Core.player.shoot(); };
        window.onkeyup=e=>Core.keys[e.code]=false;

        const UI = {
            setDev(d) { document.getElementById('p-pc').className=d==='pc'?'btn active':'btn'; document.getElementById('p-mo').className=d==='mobile'?'btn active':'btn'; document.getElementById('mobile-controls').style.display=d==='mobile'?'block':'none'; },
            setHand(h) { document.getElementById('move-zone').className=`zone ${h}`; document.getElementById('act-zone').className=`zone ${h=='right'?'left':'right'}`; }
        };

        let joyOn=false, joyV={x:0,y:0};
        const jB=document.getElementById('j-base'), jK=document.getElementById('j-knob');
        jB.addEventListener('touchstart', ()=> joyOn=true);
        window.addEventListener('touchmove', (e)=>{ if(!joyOn) return; let t=e.touches[0], r=jB.getBoundingClientRect(); let dx=t.clientX-(r.left+55), dy=t.clientY-(r.top+55); let d=Math.min(Math.hypot(dx,dy), 50); let a=Math.atan2(dy,dx); joyV={x:Math.cos(a)*(d/50),y:Math.sin(a)*(d/50)}; jK.style.transform=`translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px)`; });
        window.addEventListener('touchend', ()=>{ joyOn=false; joyV={x:0,y:0}; jK.style.transform='translate(0,0)'; });

        if(localStorage.getItem('sm_save')) document.getElementById('res-btn').style.display='block';
    </script>
</body>
</html>
