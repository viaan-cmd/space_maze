<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPACE MAZE</title>
    <style>
        :root { --neon: #00ff41; --warp: #00ccff; --danger: #ff0033; --gold: #ffd700; --bg: #000; --mansion: #a020f0; }
        * { box-sizing: border-box; user-select: none; touch-action: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        /* CRT SCANLINES */
        body::after { content: " "; position: absolute; inset: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%); z-index: 1000; background-size: 100% 3px; pointer-events: none; opacity: 0.15; }

        .layer { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); z-index: 10; }
        #game-layer { display: none; }

        .neon-text { text-shadow: 0 0 10px var(--neon), 0 0 20px var(--neon); }
        .neon-border { border: 2px solid var(--neon); box-shadow: 0 0 15px var(--neon); }

        /* MOBILE CONTROLS */
        #controls { position: absolute; bottom: 20px; left: 0; width: 100%; display: none; justify-content: space-between; padding: 0 30px; z-index: 500; pointer-events: none; }
        .dpad, .actions { display: grid; grid-template-columns: repeat(3, 60px); gap: 10px; pointer-events: auto; }
        .t-btn { width: 60px; height: 60px; background: rgba(0,0,0,0.6); border: 2px solid var(--neon); color: var(--neon); display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 10px; }
        .t-btn:active { background: var(--neon); color: #000; }

        #hud { position: absolute; top: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; font-size: 1rem; z-index: 100; pointer-events: none; }
        #ox-bar-container { width: 120px; height: 10px; border: 1px solid var(--neon); margin-top: 5px; }
        #ox-bar { height: 100%; width: 100%; background: var(--neon); transition: width 0.2s; }

        .card { background: rgba(0,0,0,0.95); padding: 25px; border-radius: 4px; width: 320px; text-align: center; }
        .btn { background: #000; border: 2px solid var(--neon); color: var(--neon); padding: 12px; margin: 8px 0; cursor: pointer; width: 100%; font-family: inherit; font-weight: bold; text-transform: uppercase; }

        #admin-layer, #shop-layer { display:none; z-index: 2000; }
    </style>
</head>
<body>

    <div id="ui-layer" class="layer">
        <h1 class="neon-text" style="font-size: 2.5rem;">SPACE MAZE</h1>
        <div class="card neon-border">
            <input type="text" id="username" placeholder="NAME" style="width:100%; background:#000; border:1px solid var(--neon); color:var(--neon); padding:10px; margin-bottom:10px; font-family:inherit; text-align:center;">
            <button class="btn" onclick="UI.playCutscene('intro')">START</button>
            <button class="btn" style="border-color:var(--warp); color:var(--warp);" onclick="UI.toggleShop(true)">UPGRADES</button>
            <button class="btn" id="res-btn" style="display:none; border-color:var(--gold); color:var(--gold);" onclick="Core.boot(true)">RESUME</button>
            <div id="leaderboard" style="font-size: 0.7rem; text-align: left; margin-top:10px; color:var(--warp);"></div>
        </div>
    </div>

    <div id="shop-layer" class="layer">
        <div class="card neon-border" style="border-color: var(--warp);">
            <h2 style="color:var(--warp);">SHOP</h2>
            <p>Credits: <span id="shop-credits">0</span></p>
            <button class="btn" onclick="UI.buyUpgrade('speed')">LUNGS (Speed) - 10 Cr</button>
            <button class="btn" onclick="UI.buyUpgrade('tank')">TANK (Max OX) - 15 Cr</button>
            <button class="btn" onclick="UI.toggleShop(false)">EXIT</button>
        </div>
    </div>

    <div id="admin-layer" class="layer">
        <div class="card neon-border" style="border-color: var(--danger);">
            <h2 style="color:var(--danger);">ROOT</h2>
            <button class="btn" onclick="Core.adminJump(21)">SEC 21</button>
            <button class="btn" onclick="Core.adminJump(202)">SEC 202</button>
            <button class="btn" onclick="UI.toggleAdmin(false)">BACK</button>
        </div>
    </div>

    <div id="game-layer" class="layer">
        <div id="hud">
            <div>SEC: <span id="v-sec">1</span></div>
            <div>OX: <span id="v-ox">100</span>%<div id="ox-bar-container"><div id="ox-bar"></div></div></div>
            <div onclick="UI.togglePause()" style="pointer-events: auto; border: 1px solid var(--neon); padding: 5px 10px;">||</div>
        </div>
        
        <canvas id="stage"></canvas>

        <div id="controls">
            <div class="dpad">
                <div></div><div class="t-btn" ontouchstart="Core.keys.ArrowUp=true" ontouchend="Core.keys.ArrowUp=false">↑</div><div></div>
                <div class="t-btn" ontouchstart="Core.keys.ArrowLeft=true" ontouchend="Core.keys.ArrowLeft=false">←</div>
                <div class="t-btn" ontouchstart="Core.keys.ArrowDown=true" ontouchend="Core.keys.ArrowDown=false">↓</div>
                <div class="t-btn" ontouchstart="Core.keys.ArrowRight=true" ontouchend="Core.keys.ArrowRight=false">→</div>
            </div>
            <div class="actions">
                <div class="t-btn" style="grid-column: span 3; border-color:var(--warp);" onclick="Core.player.warp()">WARP</div>
                <div class="t-btn" style="grid-column: span 3; margin-top:10px; border-color:#fff;" onclick="Core.player.shoot()">SHOOT</div>
            </div>
        </div>
    </div>

    <div id="cutscene-layer" class="layer" style="display:none; z-index: 3000;">
        <div id="typewriter" class="card neon-border" style="text-align:left; width:90%;"></div>
        <button class="btn" id="proceed-btn" style="width:200px; margin-top:20px;">PROCEED</button>
    </div>

    <script>
        const MAP = { W:window.innerWidth, H:window.innerHeight, R:13, C:13, TW:window.innerWidth/13, TH:window.innerHeight/13 };
        
        const Core = {
            sector: 1, active: false, entities: [], keys: {}, cheatSeq: "", credits: 0, 
            upgrades: JSON.parse(localStorage.getItem('sm_upgrades')) || { speed: 5, tank: 100 },
            boot(resume) {
                document.getElementById('ui-layer').style.display = 'none';
                document.getElementById('game-layer').style.display = 'flex';
                document.getElementById('controls').style.display = 'flex';
                this.ctx = document.getElementById('stage').getContext('2d');
                document.getElementById('stage').width = MAP.W;
                document.getElementById('stage').height = MAP.H;
                this.init(resume ? (parseInt(localStorage.getItem('sm_save')) || 1) : 1);
                if(!this.running) { this.run(); this.running = true; }
            },
            init(n) {
                this.sector = n; this.active = true; this.entities = [];
                localStorage.setItem('sm_save', n);
                if(n === 21 && !this.s21Seen) { UI.playCutscene('mansion'); this.s21Seen = true; return; }
                this.maze = (n === 202) ? Array.from({length:MAP.R},()=>Array(MAP.C).fill(0)) : this.createMaze();
                this.player = new Player(MAP.TW/2, MAP.TH/2);
                document.getElementById('v-sec').innerText = n;
            },
            createMaze() {
                let m = Array.from({length:MAP.R},()=>Array(MAP.C).fill(1));
                let s = [[0,0]]; m[0][0] = 0;
                while(s.length) {
                    let [r,c] = s[s.length-1];
                    let ns = [[r-2,c],[r+2,c],[r,c-2],[r,c+2]].filter(([nr,nc])=>nr>=0&&nr<MAP.R&&nc>=0&&nc<MAP.C&&m[nr][nc]===1);
                    if(ns.length) { let [nr,nc] = ns[Math.floor(Math.random()*ns.length)]; m[nr][nc]=0; m[(r+nr)/2][(c+nc)/2]=0; s.push([nr,nc]); } else s.pop();
                }
                return m;
            },
            update() {
                if(!this.active || this.paused) return;
                this.player.tick();
                this.entities.forEach((e, i) => { e.tick(); if(e.dead) this.entities.splice(i, 1); });
                if(this.player.x > MAP.W - MAP.TW && this.player.y > MAP.H - MAP.TH) {
                    if(this.sector === 21 && this.player.invites < 3) return;
                    this.credits++;
                    localStorage.setItem('sm_creds', this.credits);
                    this.init(this.sector + 1);
                }
            },
            draw() {
                this.ctx.clearRect(0,0,MAP.W,MAP.H);
                this.ctx.fillStyle = (this.sector >= 21 && this.sector < 30) ? "var(--mansion)" : "var(--neon)";
                for(let r=0; r<MAP.R; r++) {
                    for(let c=0; c<MAP.C; c++) if(this.maze[r][c]) this.ctx.fillRect(c*MAP.TW, r*MAP.TH, MAP.TW-2, MAP.TH-2);
                }
                this.ctx.fillStyle = "var(--warp)";
                this.ctx.fillRect(MAP.W-MAP.TW, MAP.H-MAP.TH, MAP.TW, MAP.TH);
                this.entities.forEach(e => e.draw(this.ctx));
                this.player.draw(this.ctx);
            },
            run() { this.update(); this.draw(); requestAnimationFrame(()=>this.run()); },
            registerAction(a) {
                this.cheatSeq = (this.cheatSeq + a).slice(-4);
                if(this.cheatSeq === "SWWS") UI.toggleAdmin(true);
            },
            adminJump(v) { this.init(v); UI.toggleAdmin(false); }
        };

        class Player {
            constructor(x,y) { this.x=x; this.y=y; this.ox=Core.upgrades.tank; this.speed=Core.upgrades.speed; this.invites=0; }
            tick() {
                let mx=0, my=0;
                if(Core.keys.ArrowUp) my=-1; if(Core.keys.ArrowDown) my=1;
                if(Core.keys.ArrowLeft) mx=-1; if(Core.keys.ArrowRight) mx=1;
                let nx=this.x+mx*this.speed, ny=this.y+my*this.speed;
                if(!this.isW(nx, ny)) { this.x=nx; this.y=ny; }
                this.ox -= 0.05; if(this.ox <= 0) location.reload();
                document.getElementById('v-ox').innerText = Math.floor(this.ox);
                document.getElementById('ox-bar').style.width = (this.ox/Core.upgrades.tank*100) + "%";
            }
            isW(x,y) {
                let c=Math.floor(x/MAP.TW), r=Math.floor(y/MAP.TH);
                return x<0||x>MAP.W||y<0||y>MAP.H||(r>=0&&r<MAP.R&&c>=0&&c<MAP.C&&Core.maze[r][c]===1);
            }
            draw(ctx) { ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(this.x,this.y,8,0,Math.PI*2); ctx.fill(); }
            shoot() { if(this.ox > 5) { this.ox -= 5; Core.registerAction('S'); } }
            warp() { if(this.ox > 10) { this.x += 100; this.ox -= 10; Core.registerAction('W'); } }
        }

        const UI = {
            toggleShop(s) { 
                document.getElementById('shop-layer').style.display = s?'flex':'none'; 
                document.getElementById('shop-credits').innerText = localStorage.getItem('sm_creds') || 0;
            },
            buyUpgrade(type) {
                let cr = parseInt(localStorage.getItem('sm_creds') || 0);
                if(type==='speed' && cr >= 10) { Core.upgrades.speed = 8; cr -= 10; }
                if(type==='tank' && cr >= 15) { Core.upgrades.tank = 200; cr -= 15; }
                localStorage.setItem('sm_creds', cr);
                localStorage.setItem('sm_upgrades', JSON.stringify(Core.upgrades));
                this.toggleShop(false);
            },
            playCutscene(type) {
                Core.paused = true;
                const layer = document.getElementById('cutscene-layer');
                const box = document.getElementById('typewriter');
                layer.style.display = 'flex';
                box.innerText = type === 'intro' ? "> MISSION: REACH SECTOR 202. WATCH YOUR OXYGEN." : "> SECTOR 21: THE MANSION. COLLECT INVITES.";
                document.getElementById('proceed-btn').onclick = () => { layer.style.display = 'none'; Core.paused = false; if(!Core.player) Core.boot(); };
            },
            toggleAdmin(s) { document.getElementById('admin-layer').style.display = s?'flex':'none'; }
        };

        window.onkeydown=e=>Core.keys[e.code]=true;
        window.onkeyup=e=>Core.keys[e.code]=false;
        if(localStorage.getItem('sm_save')) document.getElementById('res-btn').style.display='block';
    </script>
</body>
</html>
